const DIFFICULTY={EASY:'easy',MEDIUM:'medium',HARD:'hard'};

function gcd(a,b){return b===0?a:gcd(b,a%b);}
function lcm(a,b){return a*b/gcd(a,b);}
function simplify(n,d){const g=gcd(Math.abs(n),Math.abs(d));return[n/g,d/g];}

// Generate a question object: {text, visual, answers:[{text,correct}], explanation}
function makeQuestion(difficulty){
  const fns = QUESTION_BANKS[difficulty];
  const fn = fns[Math.floor(Math.random()*fns.length)];
  return fn();
}

// ─── EASY QUESTION BANK ───
const EASY_QUESTIONS=[
  // Identify unit fractions
  ()=>{
    const denoms=[2,3,4];const d=denoms[Math.floor(Math.random()*denoms.length)];
    const names={2:'half',3:'third',4:'fourth'};
    return{
      text:`A shape is divided into ${d} equal parts.\nYou have 1 part. What fraction is that?`,
      visual:{type:'fraction_shape',num:1,den:d},
      answers:shuffle([
        {text:`1/${d}`,correct:true},
        {text:`${d}/1`,correct:false},
        {text:`1/${d+1}`,correct:false},
        {text:`2/${d}`,correct:false},
      ]),
      explanation:`1 out of ${d} equal parts = 1/${d} (one ${names[d]})`
    };
  },
  // More equal parts = smaller pieces
  ()=>{
    const [a,b]=Math.random()<0.5?[2,4]:[3,6];
    return{
      text:`Which fraction has SMALLER pieces?\n1/${a} or 1/${b}?`,
      visual:{type:'compare_shapes',fracs:[[1,a],[1,b]]},
      answers:shuffle([
        {text:`1/${b} — more cuts = smaller pieces`,correct:true},
        {text:`1/${a} — fewer cuts = smaller pieces`,correct:false},
        {text:`They are equal`,correct:false},
        {text:`Can't tell without a number line`,correct:false},
      ]),
      explanation:`Dividing into more equal parts makes SMALLER pieces. 1/${b} is smaller than 1/${a}.`
    };
  },
  // Equal vs unequal partition
  ()=>{
    return{
      text:`A pizza is cut into 4 slices.\nBut 2 slices are big and 2 are tiny.\nAre the pieces EQUAL fractions?`,
      visual:{type:'pizza_unequal'},
      answers:shuffle([
        {text:'No — unequal cuts are NOT fractions',correct:true},
        {text:'Yes — 4 pieces = 4 quarters',correct:false},
        {text:'Only if you eat them the same way',correct:false},
        {text:'Yes — 2 and 2 is always equal',correct:false},
      ]),
      explanation:`Fractions require EQUAL parts. Unequal cuts cannot be called fourths.`
    };
  },
  // Identify fraction from model
  ()=>{
    const d=[2,3,4][Math.floor(Math.random()*3)];
    const n=1+Math.floor(Math.random()*(d-1));
    return{
      text:`${n} out of ${d} equal parts are shaded.\nWhat fraction is shaded?`,
      visual:{type:'fraction_shape',num:n,den:d},
      answers:shuffle([
        {text:`${n}/${d}`,correct:true},
        {text:`${d}/${n}`,correct:false},
        {text:`${d-n}/${d}`,correct:false},
        {text:`${n}/${d+1}`,correct:false},
      ]),
      explanation:`${n} shaded parts out of ${d} total equal parts = ${n}/${d}`
    };
  },
  // Number line 0 to 1
  ()=>{
    const d=[2,3,4][Math.floor(Math.random()*3)];
    const n=1+Math.floor(Math.random()*(d-1));
    return{
      text:`On a number line from 0 to 1 divided\ninto ${d} equal parts, where does ${n}/${d} sit?`,
      visual:{type:'number_line',num:n,den:d},
      answers:shuffle([
        {text:`${n} tick(s) from 0`,correct:true},
        {text:`${n} tick(s) from 1`,correct:false},
        {text:`At the very center (1/2)`,correct:n===d/2?true:false},
        {text:`Between 1 and 2`,correct:false},
      ].filter((a,i,arr)=>!a.correct||arr.filter(x=>x.correct).length===1?true:i===arr.findIndex(x=>x.correct))),
      explanation:`${n}/${d} is ${n} equal step(s) of size 1/${d} from zero.`
    };
  },
  // Real-world fraction
  ()=>{
    const items=[['cookies','plate',[2,3,4]],['apples','bag',[2,3,4]],['slices','pizza',[2,3,4]]];
    const [item,container,ds]=items[Math.floor(Math.random()*items.length)];
    const d=ds[Math.floor(Math.random()*ds.length)];
    const n=1+Math.floor(Math.random()*(d-1));
    return{
      text:`A ${container} has ${d} equal ${item}.\nYou eat ${n} of them.\nWhat fraction did you eat?`,
      visual:{type:'fraction_objects',num:n,den:d,item},
      answers:shuffle([
        {text:`${n}/${d}`,correct:true},
        {text:`${d-n}/${d}`,correct:false},
        {text:`${n}/${d+1}`,correct:false},
        {text:`${d}/${n}`,correct:false},
      ]),
      explanation:`You ate ${n} out of ${d} ${item} = ${n}/${d}`
    };
  },
  // Compare same denominator
  ()=>{
    const d=[3,4,6][Math.floor(Math.random()*3)];
    const n1=1+Math.floor(Math.random()*(d-2));
    const n2=n1+1+Math.floor(Math.random()*(d-n1-1));
    return{
      text:`Which fraction is BIGGER?\n${n1}/${d}  or  ${n2}/${d}?`,
      visual:{type:'compare_bars',fracs:[[n1,d],[n2,d]]},
      answers:shuffle([
        {text:`${n2}/${d} — bigger numerator`,correct:true},
        {text:`${n1}/${d} — smaller numerator`,correct:false},
        {text:`They are equal`,correct:false},
        {text:`Can't compare same denominator`,correct:false},
      ]),
      explanation:`Same denominator: ${n2}/${d} > ${n1}/${d} because ${n2} > ${n1}`
    };
  },
];

// ─── MEDIUM QUESTION BANK ───
const MEDIUM_QUESTIONS=[
  // Equivalent fractions
  ()=>{
    const bases=[[1,2],[1,3],[2,3],[3,4],[1,4]];
    const [n,d]=bases[Math.floor(Math.random()*bases.length)];
    const mult=2+Math.floor(Math.random()*3);
    return{
      text:`Find an equivalent fraction for ${n}/${d}.\nMultiply top and bottom by ${mult}.`,
      visual:{type:'equivalent',base:[n,d],mult},
      answers:shuffle([
        {text:`${n*mult}/${d*mult}`,correct:true},
        {text:`${n+mult}/${d+mult}`,correct:false},
        {text:`${n*mult}/${d}`,correct:false},
        {text:`${n}/${d*mult}`,correct:false},
      ]),
      explanation:`${n}/${d} × ${mult}/${mult} = ${n*mult}/${d*mult}`
    };
  },
  // Simplify
  ()=>{
    const pairs=[[2,4],[3,6],[4,8],[6,9],[4,6],[2,6],[3,9],[6,8]];
    const [n,d]=pairs[Math.floor(Math.random()*pairs.length)];
    const [sn,sd]=simplify(n,d);
    return{
      text:`Simplify the fraction ${n}/${d}.\nDivide top and bottom by their GCF.`,
      visual:{type:'simplify',num:n,den:d},
      answers:shuffle([
        {text:`${sn}/${sd}`,correct:true},
        {text:`${n-1}/${d-1}`,correct:false},
        {text:`${sn}/${d}`,correct:false},
        {text:`${n}/${sd}`,correct:false},
      ]),
      explanation:`GCF(${n},${d}) = ${gcd(n,d)}.  ${n}÷${gcd(n,d)} = ${sn},  ${d}÷${gcd(n,d)} = ${sd}`
    };
  },
  // Add like denominators
  ()=>{
    const d=[4,5,6,8][Math.floor(Math.random()*4)];
    const n1=1+Math.floor(Math.random()*(d-2));
    const n2=1+Math.floor(Math.random()*(d-1-n1));
    const sum=n1+n2;
    return{
      text:`Add the fractions:\n${n1}/${d}  +  ${n2}/${d}  = ?`,
      visual:{type:'add_bars',fracs:[[n1,d],[n2,d]]},
      answers:shuffle([
        {text:`${sum}/${d}`,correct:true},
        {text:`${sum}/${d*2}`,correct:false},
        {text:`${n1+n2+1}/${d}`,correct:false},
        {text:`${sum-1}/${d}`,correct:false},
      ]),
      explanation:`Add numerators, keep denominator: ${n1}+${n2} = ${sum}, so ${sum}/${d}`
    };
  },
  // Subtract like denominators
  ()=>{
    const d=[4,5,6,8][Math.floor(Math.random()*4)];
    const n2=1+Math.floor(Math.random()*(d-2));
    const n1=n2+1+Math.floor(Math.random()*(d-n2-1));
    const diff=n1-n2;
    return{
      text:`Subtract the fractions:\n${n1}/${d}  −  ${n2}/${d}  = ?`,
      visual:{type:'subtract_bars',fracs:[[n1,d],[n2,d]]},
      answers:shuffle([
        {text:`${diff}/${d}`,correct:true},
        {text:`${diff}/${d*2}`,correct:false},
        {text:`${n1}/${n2}`,correct:false},
        {text:`${diff+1}/${d}`,correct:false},
      ]),
      explanation:`Subtract numerators, keep denominator: ${n1}−${n2} = ${diff}, so ${diff}/${d}`
    };
  },
  // Multiply fraction × whole
  ()=>{
    const w=[2,3,4,5][Math.floor(Math.random()*4)];
    const d=[3,4,5,6][Math.floor(Math.random()*4)];
    const n=1+Math.floor(Math.random()*(d-1));
    const rn=n*w,rd=d;const[sn,sd]=simplify(rn,rd);
    const ans=sd===1?`${sn}`:(rn>rd?`${Math.floor(rn/rd)} ${rn%rd}/${rd}`:`${rn}/${rd}`);
    return{
      text:`Multiply:\n${w}  ×  ${n}/${d}  = ?`,
      visual:{type:'multiply_whole',whole:w,frac:[n,d]},
      answers:shuffle([
        {text:ans,correct:true},
        {text:`${n}/${d*w}`,correct:false},
        {text:`${n+w}/${d}`,correct:false},
        {text:`${w*n+1}/${d}`,correct:false},
      ]),
      explanation:`${w} × ${n}/${d} = ${w*n}/${d}${rn>rd?' = '+Math.floor(rn/rd)+' and '+(rn%rd)+'/'+rd:''}`
    };
  },
  // Improper ↔ mixed number
  ()=>{
    const d=[2,3,4][Math.floor(Math.random()*3)];
    const whole=1+Math.floor(Math.random()*3);
    const rem=1+Math.floor(Math.random()*(d-1));
    const imp=whole*d+rem;
    const toMixed=Math.random()<0.5;
    if(toMixed){
      return{
        text:`Convert the improper fraction:\n${imp}/${d}  to a mixed number`,
        visual:{type:'improper',num:imp,den:d},
        answers:shuffle([
          {text:`${whole} and ${rem}/${d}`,correct:true},
          {text:`${whole+1} and ${rem}/${d}`,correct:false},
          {text:`${whole} and ${rem+1}/${d}`,correct:false},
          {text:`${imp} and 1/${d}`,correct:false},
        ]),
        explanation:`${imp} ÷ ${d} = ${whole} remainder ${rem},  so ${whole} ${rem}/${d}`
      };
    }else{
      return{
        text:`Convert the mixed number:\n${whole} and ${rem}/${d}  to an improper fraction`,
        visual:{type:'mixed',whole,num:rem,den:d},
        answers:shuffle([
          {text:`${imp}/${d}`,correct:true},
          {text:`${imp-1}/${d}`,correct:false},
          {text:`${whole*rem}/${d}`,correct:false},
          {text:`${imp}/${d+1}`,correct:false},
        ]),
        explanation:`${whole} × ${d} + ${rem} = ${imp},  so ${imp}/${d}`
      };
    }
  },
  // Compare unlike denominators
  ()=>{
    const pairs=[[1,2,1,3],[3,4,2,3],[1,3,2,5],[2,3,3,5],[3,8,1,3]];
    const [n1,d1,n2,d2]=pairs[Math.floor(Math.random()*pairs.length)];
    const bigger=(n1/d1)>(n2/d2)?`${n1}/${d1}`:`${n2}/${d2}`;
    const smaller=(n1/d1)<(n2/d2)?`${n1}/${d1}`:`${n2}/${d2}`;
    return{
      text:`Compare: which fraction is bigger?\n${n1}/${d1}   vs   ${n2}/${d2}`,
      visual:{type:'compare_bars',fracs:[[n1,d1],[n2,d2]]},
      answers:shuffle([
        {text:bigger,correct:true},
        {text:smaller,correct:false},
        {text:'They are equal',correct:false},
        {text:`Need same denominator to compare`,correct:false},
      ]),
      explanation:`${n1}/${d1} = ${(n1/d1).toFixed(2)}  and  ${n2}/${d2} = ${(n2/d2).toFixed(2)}`
    };
  },
];

// ─── HARD QUESTION BANK ───
const HARD_QUESTIONS=[
  // Add unlike denominators
  ()=>{
    const pairs=[[1,2,1,3],[1,3,1,4],[2,3,1,4],[1,2,1,5],[3,4,1,3]];
    const [n1,d1,n2,d2]=pairs[Math.floor(Math.random()*pairs.length)];
    const L=lcm(d1,d2);
    const rn=n1*(L/d1)+n2*(L/d2);
    const [sn,sd]=simplify(rn,L);
    const ansStr=sn>sd?`${Math.floor(sn/sd)} and ${sn%sd}/${sd}`:`${sn}/${sd}`;
    return{
      text:`Add fractions with unlike denominators:\n${n1}/${d1}  +  ${n2}/${d2}  = ?`,
      visual:{type:'compare_bars',fracs:[[n1,d1],[n2,d2]]},
      answers:shuffle([
        {text:ansStr,correct:true},
        {text:`${n1+n2}/${d1+d2}`,correct:false},
        {text:`${n1+n2}/${Math.max(d1,d2)}`,correct:false},
        {text:`${rn+1}/${L}`,correct:false},
      ]),
      explanation:`LCD=${L}: ${n1}/${d1}=${n1*(L/d1)}/${L}, ${n2}/${d2}=${n2*(L/d2)}/${L}. Sum: ${rn}/${L} = ${ansStr}`
    };
  },
  // Subtract unlike denominators
  ()=>{
    const pairs=[[3,4,1,3],[5,6,1,4],[2,3,1,5],[7,8,1,2],[4,5,1,3]];
    const [n1,d1,n2,d2]=pairs[Math.floor(Math.random()*pairs.length)];
    const L=lcm(d1,d2);
    const rn=n1*(L/d1)-n2*(L/d2);
    const [sn,sd]=simplify(Math.abs(rn),L);
    const ansStr=`${sn}/${sd}`;
    return{
      text:`Subtract:\n${n1}/${d1}  −  ${n2}/${d2}  = ?`,
      visual:{type:'compare_bars',fracs:[[n1,d1],[n2,d2]]},
      answers:shuffle([
        {text:ansStr,correct:true},
        {text:`${n1-n2}/${d1-d2||1}`,correct:false},
        {text:`${Math.abs(rn)+1}/${L}`,correct:false},
        {text:`${n1-n2}/${d1}`,correct:false},
      ]),
      explanation:`LCD=${L}: ${n1*(L/d1)}/${L} − ${n2*(L/d2)}/${L} = ${rn}/${L} = ${ansStr}`
    };
  },
  // Multiply fraction × fraction
  ()=>{
    const fracs=[[1,2,3,4],[2,3,3,5],[1,3,2,5],[3,4,2,3],[1,2,4,5]];
    const [n1,d1,n2,d2]=fracs[Math.floor(Math.random()*fracs.length)];
    const rn=n1*n2,rd=d1*d2;const[sn,sd]=simplify(rn,rd);
    return{
      text:`Multiply the fractions:\n${n1}/${d1}  ×  ${n2}/${d2}  = ?`,
      visual:{type:'multiply_grid',frac1:[n1,d1],frac2:[n2,d2]},
      answers:shuffle([
        {text:`${sn}/${sd}`,correct:true},
        {text:`${n1+n2}/${d1+d2}`,correct:false},
        {text:`${rn+1}/${rd}`,correct:false},
        {text:`${rn}/${rd+1}`,correct:false},
      ]),
      explanation:`Multiply tops: ${n1}×${n2}=${rn}. Multiply bottoms: ${d1}×${d2}=${rd}. Simplify: ${sn}/${sd}`
    };
  },
  // Divide fraction by whole
  ()=>{
    const w=[2,3,4][Math.floor(Math.random()*3)];
    const fracs=[[3,4],[2,3],[1,2],[4,5],[3,5]];
    const [n,d]=fracs[Math.floor(Math.random()*fracs.length)];
    const [sn,sd]=simplify(n,d*w);
    return{
      text:`Divide:\n${n}/${d}  ÷  ${w}  = ?`,
      visual:{type:'divide_bar',frac:[n,d],whole:w},
      answers:shuffle([
        {text:`${sn}/${sd}`,correct:true},
        {text:`${n*w}/${d}`,correct:false},
        {text:`${n}/${d-w}`,correct:false},
        {text:`${n+w}/${d}`,correct:false},
      ]),
      explanation:`÷${w} = ×1/${w}: ${n}/${d} × 1/${w} = ${n}/${d*w} = ${sn}/${sd}`
    };
  },
  // Divide fraction by fraction
  ()=>{
    const pairs=[[1,2,1,4],[2,3,1,3],[3,4,1,2],[1,2,2,3],[3,5,3,10]];
    const [n1,d1,n2,d2]=pairs[Math.floor(Math.random()*pairs.length)];
    const rn=n1*d2,rd=d1*n2;const[sn,sd]=simplify(rn,rd);
    const ans=sd===1?`${sn}`:(sn>sd?`${Math.floor(sn/sd)} and ${sn%sd}/${sd}`:`${sn}/${sd}`);
    return{
      text:`Divide the fractions:\n${n1}/${d1}  ÷  ${n2}/${d2}  = ?`,
      visual:{type:'divide_frac',frac1:[n1,d1],frac2:[n2,d2]},
      answers:shuffle([
        {text:ans,correct:true},
        {text:`${n1*n2}/${d1*d2}`,correct:false},
        {text:`${n1}/${d1+n2}`,correct:false},
        {text:`${sn+1}/${sd}`,correct:false},
      ]),
      explanation:`Flip and multiply: ${n1}/${d1} × ${d2}/${n2} = ${rn}/${rd} = ${ans}`
    };
  },
  // Fraction to decimal
  ()=>{
    const pairs=[[1,2,0.5],[1,4,0.25],[3,4,0.75],[1,5,0.2],[2,5,0.4],[3,5,0.6],[1,8,0.125],[3,8,0.375]];
    const [n,d,dec]=pairs[Math.floor(Math.random()*pairs.length)];
    return{
      text:`Convert to decimal:\n${n}/${d}  = ?`,
      visual:{type:'number_line_dec',num:n,den:d,dec},
      answers:shuffle([
        {text:`${dec}`,correct:true},
        {text:`${(dec+0.1).toFixed(2)}`,correct:false},
        {text:`${(dec-0.1).toFixed(2)}`,correct:false},
        {text:`${d/n}`,correct:false},
      ]),
      explanation:`${n} ÷ ${d} = ${dec}`
    };
  },
  // Multi-step word problem
  ()=>{
    const d=[4,5,6][Math.floor(Math.random()*3)];
    const n1=1+Math.floor(Math.random()*2);
    const n2=1+Math.floor(Math.random()*2);
    const total=n1+n2;
    const left=d-total;
    return{
      text:`A race track is ${d} km long.\nYou drove ${n1}/${d} km, then ${n2}/${d} km more.\nHow much is left?`,
      visual:{type:'race_track',total:d,seg1:n1,seg2:n2},
      answers:shuffle([
        {text:`${left}/${d} km`,correct:true},
        {text:`${left+1}/${d} km`,correct:false},
        {text:`${total}/${d} km`,correct:false},
        {text:`${left}/${d+1} km`,correct:false},
      ]),
      explanation:`${n1}/${d} + ${n2}/${d} = ${total}/${d}.  ${d}/${d} − ${total}/${d} = ${left}/${d}`
    };
  },
];

function getPowerupForScore(score, total){
  // score = number correct out of total
  const pct=score/total;
  if(pct===1) return POWERUPS[0]; // perfect = speed boost
  if(pct>=0.8) return POWERUPS[Math.floor(Math.random()*2)];
  if(pct>=0.6) return POWERUPS[2+Math.floor(Math.random()*2)];
  if(pct>=0.4) return POWERUPS[4];
  return null; // <40% = no powerup
}

function updateMusicSpeed(speed,maxSpeed){

function scheduleDrums(tempo){
  if(!_musicActive)return;
  const c=actx(),beat=60/tempo,n=c.currentTime+0.05;

// ── TRACK ─────────────────────────────────────────────────────────────
function makeTrack(raceNum){
  const diff=0.8+raceNum*0.25;
  const ramps=[],obs=[],mud=[],nitros=[],puddles=[];
  const isWet=THEMES[raceNum]?.wet;
  let x=650,len=6500+raceNum*600;
  // Extra nitros from powerup
  const extraNitro=GS.getBoost('extra_nitro');
  while(x<len){
    const lane=Math.floor(Math.random()*LANES),r=Math.random();
    if(r<0.30)ramps.push({x,lane,w:52+Math.random()*32,h:16+Math.random()*20+diff*4});
    else if(r<0.56)obs.push({x,lane,w:15+Math.random()*9,h:24+Math.random()*18});
    else if(r<0.75)mud.push({x,lane,w:60+Math.random()*70});
    const nitroChance=extraNitro?0.30:0.20;
    if(Math.random()<nitroChance)nitros.push({x:x-60,lane:Math.floor(Math.random()*LANES),collected:false,hasMath:true});
    if(isWet&&Math.random()<0.35)puddles.push({x:x+Math.random()*100,lane:Math.floor(Math.random()*LANES),w:40+Math.random()*80});
    x+=Math.max(160,300-raceNum*12)+Math.random()*120;
  }
  // Mark ramps with math
  ramps.forEach(r=>r.hasMath=true);
  return{ramps,obs,mud,nitros,puddles,len};
}

          const bw=140,bh=22,bx=cx-bw/2,by=vy+(i*32);
          g.fillStyle(0x1a2a3a);g.fillRect(bx,by,bw,bh);
          for(let j=0;j<d;j++){const pw2=bw/d;g.fillStyle(i===0?0x00aaff:0xff6600,j<n?0.85:0.2);g.fillRect(bx+j*pw2+1,by+1,pw2-2,bh-2);}
          g.lineStyle(1.5,i===0?0x0088aa:0xcc4400,0.8);g.strokeRect(bx,by,bw,bh);
          const lbl=sc.add.text(bx-32,by+11,`${n}/${d}`,{fontSize:'13px',fontFamily:'"Courier New",monospace',color:i===0?'#00aaff':'#ff8844'}).setOrigin(0.5).setDepth(83);
          this.items.push(lbl);
        });break;
      }
      case'number_line':case'number_line_dec':{
        const lx=cx-80,rx=cx+80,ly2=vy+20;
        g.lineStyle(2,0x4488aa,1);g.beginPath();g.moveTo(lx,ly2);g.lineTo(rx,ly2);g.strokePath();
        g.fillStyle(0x4488aa);g.fillTriangle(rx-5,ly2-5,rx+8,ly2,rx-5,ly2+5);
        const den=vis.den||10;
        for(let i=0;i<=den;i++){const tx=lx+i*(rx-lx)/den;g.lineStyle(1.5,0x668899,1);g.beginPath();g.moveTo(tx,ly2-7);g.lineTo(tx,ly2+7);g.strokePath();}
        const markX=lx+vis.num*(rx-lx)/den;
        g.fillStyle(0xffcc00,1);g.fillCircle(markX,ly2,7);
        g.lineStyle(2,0x888800,1);g.strokeCircle(markX,ly2,7);
        const lt=sc.add.text(lx,ly2+14,'0',{fontSize:'11px',fontFamily:'"Courier New",monospace',color:'#888'}).setOrigin(0.5).setDepth(83);
        const rt=sc.add.text(rx,ly2+14,'1',{fontSize:'11px',fontFamily:'"Courier New",monospace',color:'#888'}).setOrigin(0.5).setDepth(83);
        const mt=sc.add.text(markX,ly2-18,vis.type==='number_line_dec'?`${vis.dec}`:`${vis.num}/${vis.den}`,{fontSize:'12px',fontFamily:'"Courier New",monospace',color:'#ffcc00',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setDepth(83);
        this.items.push(lt,rt,mt);break;
      }
      case'multiply_grid':{
        const [n1,d1]=vis.frac1,[n2,d2]=vis.frac2;
        const gw2=d1*22,gh2=d2*22,gx=cx-gw2/2,gy2=vy;
        for(let r=0;r<d2;r++)for(let c2=0;c2<d1;c2++){
          const filled=r<n2&&c2<n1;
          g.fillStyle(filled?0x00ccff:0x1a2a3a,filled?0.8:0.4);g.fillRect(gx+c2*22,gy2+r*22,21,21);
          g.lineStyle(1,0x334455,0.5);g.strokeRect(gx+c2*22,gy2+r*22,21,21);
        }
        const gl=sc.add.text(cx,vy+gh2+8,`${n1}/${d1} × ${n2}/${d2}`,{fontSize:'13px',fontFamily:'"Courier New",monospace',color:'#aaddff'}).setOrigin(0.5).setDepth(83);
        this.items.push(gl);break;
      }
      case'race_track':{
        const bw=160,bh=26,bx=cx-bw/2;
        const seg=(bw/vis.total);
        for(let i=0;i<vis.total;i++){
          let col=0x1a2a3a;
          if(i<vis.seg1)col=0x00aaff;
          else if(i<vis.seg1+vis.seg2)col=0xff8800;
          g.fillStyle(col,0.8);g.fillRect(bx+i*seg+1,vy+1,seg-2,bh-2);
          g.lineStyle(1,0x334455,0.5);g.strokeRect(bx+i*seg,vy,seg,bh);
        }
        const gl2=sc.add.text(cx,vy+bh+10,`Seg1:${vis.seg1}/${vis.total}  Seg2:${vis.seg2}/${vis.total}`,{fontSize:'11px',fontFamily:'"Courier New",monospace',color:'#888'}).setOrigin(0.5).setDepth(83);
        this.items.push(gl2);break;
      }
      default:break;
    }
  }
  select(ans,bgGfx,bx,by,bw,bh,textObj){
    if(this.answered)return;
    this.answered=true;
    const correct=ans.correct;
    GS.mathStats.totalAnswered++;
    if(correct)GS.mathStats.totalCorrect++;
    GS.lastMathCorrect=correct;
    // Flash the button
    const sc=this.scene;
    if(bgGfx){
      bgGfx.clear();bgGfx.fillStyle(correct?0x004400:0x440000,1);bgGfx.fillRoundedRect(bx,by,bw,bh,8);bgGfx.lineStyle(3,correct?0x00ff66:0xff2200,1);bgGfx.strokeRoundedRect(bx,by,bw,bh,8);
    }
    // Result text
    const W2=GW,H2=GH;
    const resultIcon=sc.add.text(W2/2,H2/2-60,correct?'✓ CORRECT!':'✗ WRONG',{fontSize:'38px',fontFamily:'"Courier New",monospace',color:correct?'#00ff88':'#ff3300',stroke:'#000',strokeThickness:6}).setOrigin(0.5).setDepth(90).setScale(0.3);
    this.items.push(resultIcon);
    sc.tweens.add({targets:resultIcon,scaleX:1,scaleY:1,duration:280,ease:'Back.easeOut'});
    // Explanation
    const exp=sc.add.text(W2/2,H2/2+10,this.question.explanation,{fontSize:'13px',fontFamily:'"Courier New",monospace',color:'#aaddff',stroke:'#000',strokeThickness:2,align:'center'}).setOrigin(0.5).setDepth(90).setAlpha(0);
    this.items.push(exp);
    sc.tweens.add({targets:exp,alpha:1,duration:300,delay:200});
    // Reward/penalty text
    const rwTxt=correct?
      (this.rewardType==='jump'?'+SPEED BOOST! ⚡':'+NITRO ACTIVATED! 💥'):
      (this.rewardType==='jump'?'💥 CRASH LANDING!':'💀 NITRO BACKFIRE!');
    const rwCol=correct?'#ffcc00':'#ff4444';
    const rw=sc.add.text(W2/2,H2/2+42,rwTxt,{fontSize:'16px',fontFamily:'"Courier New",monospace',color:rwCol,stroke:'#000',strokeThickness:3}).setOrigin(0.5).setDepth(90).setAlpha(0);
    this.items.push(rw);
    sc.tweens.add({targets:rw,alpha:1,duration:300,delay:400});
    sfx(correct?'correct':'wrong');
    // Trigger rival speech about the math result (delayed so it fires after popup closes)
    sc.time.delayedCall(300,()=>{
      if(sc.triggerRivalMathReaction)sc.triggerRivalMathReaction(correct);
    });
    // Auto-close
    sc.time.delayedCall(1800,()=>this.close(correct));
  }
  updateTimer(dt){
    if(!this.active||this.answered)return;
    this.timeLeft-=dt;
    if(this.timeLeft<=0){this.timeLeft=0;this.select({correct:false,text:''},null,0,0,0,0,null);return;}
    const pct=this.timeLeft/this.maxTime;
    const col=pct>0.5?0x00aaff:(pct>0.25?0xffaa00:0xff2200);
    if(this.timerFill){
      this.timerFill.clear();
      this.timerFill.fillStyle(col,0.9);
      this.timerFill.fillRect(this.timerPx2+8,this.timerPy2||this.timerPh?this.timerPy2+(this.timerPh||350)-20:GH/2+155,(this.timerPw-16)*pct,12);
    }
    if(this.timerText)this.timerText.setText(`${Math.ceil(this.timeLeft)}s`);
    // store for positioning
    this.timerPy2=this.timerPy2||(GH-350)/2;
  }
  close(wasCorrect){
    if(window._keyHandler)window.removeEventListener('keydown',this._keyHandler);
    window.removeEventListener('keydown',this._keyHandler);
    this.items.forEach(i=>{try{i.destroy();}catch(e){}});
    this.items=[];this.active=false;
    if(wasCorrect&&this.onCorrect)this.onCorrect();
    else if(!wasCorrect&&this.onWrong)this.onWrong();
  }
}

function mkBubble(scene,x,y,text,col){

      if(this.bikeX[i]>GW+120)this.bikeX[i]=-80-i*80;
      this.bikeGfx[i].clear();
      drawBikeSmall(this.bikeGfx[i],this.bikeX[i],GH*0.62+15+i*28,1.1,AI_DEFS[i].col);
    });
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  MATH QUIZ SCENE — GAME SHOW EDITION
// ═══════════════════════════════════════════════════════════════════════
class MathQuizScene extends Phaser.Scene{
  constructor(){super('MathQuizScene');}
  init(data){this.fromRace=data&&data.fromRace;}
  create(){
    const W=GW,H=GH;
    this.cameras.main.setBackgroundColor('#020510');
    this.questionIndex=0;this.numCorrect=0;this.totalQ=5;this.streak=0;this.maxStreak=0;
    this.questions=Array.from({length:this.totalQ},()=>makeQuestion(GS.difficulty));
    this.answeredThisQ=false;this.qItems=[];this.dots=[];
    this.hostMsgItems=[];

    // ── Scanline + star background
    const g=this.add.graphics();
    for(let i=0;i<H;i++){const t=i/H;g.fillStyle(Phaser.Display.Color.GetColor(2,5+Math.floor(t*10),16+Math.floor(t*20)));g.fillRect(0,i,W,1);}
    for(let i=0;i<80;i++){g.fillStyle(0xffffff,0.2+Math.random()*0.6);g.fillRect(Math.random()*W,Math.random()*H*0.5,1,1);}
    for(let i=0;i<H;i+=4){g.fillStyle(0x000000,0.08);g.fillRect(0,i,W,2);}

    // ── Game show header strip
    const hdr=this.add.graphics();
    hdr.fillStyle(0x110022,1);hdr.fillRect(0,0,W,58);
    hdr.lineStyle(2,0xcc00ff,0.9);hdr.strokeRect(0,58,W,0);
    // Flashing border lights
    this.borderLights=[];
    for(let i=0;i<20;i++){
      const bx=i*(W/20)+8;
      const bl=this.add.graphics();bl.fillStyle(0xffff00,0.9);bl.fillCircle(bx,10,5);
      this.borderLights.push({g:bl,phase:i*0.3,x:bx});
    }

    // Show name
    this.add.text(W/2,28,'🧮 FRACTION CHAMPIONSHIP QUIZ 🧮',{fontSize:'20px',fontFamily:'"Courier New",monospace',color:'#ff88ff',stroke:'#000',strokeThickness:4}).setOrigin(0.5);

    // Race label
    const raceLabel=`RACE ${GS.currentRace+1} PRE-SHOW`;
    this.add.text(W/2,50,raceLabel,{fontSize:'11px',fontFamily:'"Courier New",monospace',color:'#664477'}).setOrigin(0.5);

    // Streak display
    this.streakGfx=this.add.graphics().setDepth(5);
    this.streakTxt=this.add.text(W-16,66,'',{fontSize:'14px',fontFamily:'"Courier New",monospace',color:'#ffff44',stroke:'#000',strokeThickness:3}).setOrigin(1,0).setDepth(6);

    // Progress dots
    this.dots=Array.from({length:this.totalQ},(_,i)=>{
      const dg=this.add.graphics().setDepth(4);
      const dt=this.add.text(W/2-80+i*40,78,`${i+1}`,{fontSize:'11px',fontFamily:'"Courier New",monospace',color:'#334455'}).setOrigin(0.5).setDepth(5);
      return{g:dg,t:dt};
    });

    // Host intro sequence
    this.time.delayedCall(120,()=>this.hostIntro());
  }

  hostIntro(){
    const W=GW,H=GH;
    const msgs=[
      {text:"Welcome back, racers!", delay:0, col:'#ff88ff'},
      {text:`5 questions stand between you and the track!`, delay:900, col:'#ffff88'},
      {text:`Difficulty: ${GS.difficulty.toUpperCase()} — Good luck!`, delay:1900, col:'#88ffff'},
    ];
    msgs.forEach(m=>{
      this.time.delayedCall(m.delay,()=>this.showHostMsg(m.text,m.col));
    });
    sfx('gs_question');
    this.time.delayedCall(2900,()=>this.showQuestion(0));
  }

  showHostMsg(text,col){
    this.hostMsgItems.forEach(i=>{try{i.destroy();}catch(e){}});
    this.hostMsgItems=[];
    const W=GW;
    // Animated host speech bar
    const bar=this.add.graphics().setDepth(70).setAlpha(0);
    bar.fillStyle(0x1a0033,0.95);bar.fillRoundedRect(W/2-240,92,480,38,8);
    bar.lineStyle(2,0xcc00ff,0.9);bar.strokeRoundedRect(W/2-240,92,480,38,8);
    const txt=this.add.text(W/2,111,`🎙️  ${text}`,{fontSize:'14px',fontFamily:'"Courier New",monospace',color:col||'#ff88ff',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setDepth(71).setAlpha(0);
    this.hostMsgItems=[bar,txt];
    this.tweens.add({targets:[bar,txt],alpha:1,duration:200});
    this.tweens.add({targets:[bar,txt],alpha:0,duration:300,delay:700});
    sfx('gs_question');
  }

  updateDots(){
    const W=GW;
    this.dots.forEach(({g:dg,t:dt},i)=>{
      dg.clear();
      if(i<this.questionIndex){
        dg.fillStyle(0x00cc44,1);dg.fillCircle(W/2-80+i*40,78,14);
        dg.lineStyle(1.5,0x00ff66,0.9);dg.strokeCircle(W/2-80+i*40,78,14);
        dt.setColor('#00ff66');
      }else if(i===this.questionIndex){
        dg.fillStyle(0xcc00ff,1);dg.fillCircle(W/2-80+i*40,78,14);
        dg.lineStyle(2.5,0xff88ff,1);dg.strokeCircle(W/2-80+i*40,78,14);
        dt.setColor('#ffffff');
        // Pulse
        this.tweens.add({targets:dg,scaleX:1.15,scaleY:1.15,duration:400,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});
      }else{
        dg.fillStyle(0x112233,1);dg.fillCircle(W/2-80+i*40,78,14);
        dg.lineStyle(1.5,0x334455,1);dg.strokeCircle(W/2-80+i*40,78,14);
        dt.setColor('#334455');
      }
    });
  }

  updateStreakDisplay(){
    this.streakGfx.clear();
    if(this.streak>=2){
      const col=this.streak>=5?0xff4400:this.streak>=3?0xffaa00:0xffff00;
      this.streakGfx.fillStyle(col,0.2);this.streakGfx.fillRoundedRect(GW-160,62,148,22,6);
      this.streakGfx.lineStyle(1.5,col,0.8);this.streakGfx.strokeRoundedRect(GW-160,62,148,22,6);
      this.streakTxt.setText(`🔥 ${this.streak}x STREAK!`).setColor(col===0xff4400?'#ff6622':col===0xffaa00?'#ffcc44':'#ffff66');
    }else{
      this.streakTxt.setText('');
    }
  }

  showQuestion(idx){
    this.answeredThisQ=false;this.updateDots();this.updateStreakDisplay();
    const q=this.questions[idx];const W=GW,H=GH;
    this.qItems.forEach(i=>{try{i.destroy();}catch(e){}});this.qItems=[];

    // Drumroll before question appears
    sfx('gs_drumroll');

    // Question panel — slides in from top
    const pw=720,ph=420,px2=(W-pw)/2,py2=106;
    const panel=this.add.graphics().setAlpha(0).setY(-60).setDepth(3);
    panel.fillStyle(0x070d1a,1);panel.fillRoundedRect(px2,py2,pw,ph,14);
    panel.lineStyle(2.5,0x9900cc,0.9);panel.strokeRoundedRect(px2,py2,pw,ph,14);
    // Purple top accent
    panel.fillStyle(0xcc00ff,0.12);panel.fillRoundedRect(px2,py2,pw,44,{tl:14,tr:14,bl:0,br:0});
    panel.lineStyle(1,0xcc00ff,0.3);panel.strokeRect(px2,py2+44,pw,1);
    this.qItems.push(panel);
    this.tweens.add({targets:panel,alpha:1,y:0,duration:320,ease:'Back.easeOut'});

    // Q number badge
    const qnum=this.add.text(px2+16,py2+14,`QUESTION ${idx+1}`,{fontSize:'12px',fontFamily:'"Courier New",monospace',color:'#cc66ff'}).setAlpha(0).setDepth(5);
    const diffCol={easy:0x44ff88,medium:0xffcc00,hard:0xff4444}[GS.difficulty];
    const db=this.add.graphics().setAlpha(0).setDepth(5);
    db.fillStyle(diffCol,0.2);db.fillRoundedRect(px2+pw-95,py2+12,88,22,6);db.lineStyle(1,diffCol,0.7);db.strokeRoundedRect(px2+pw-95,py2+12,88,22,6);
    const dt=this.add.text(px2+pw-51,py2+23,GS.difficulty.toUpperCase(),{fontSize:'12px',fontFamily:'"Courier New",monospace',color:'#'+diffCol.toString(16).padStart(6,'0')}).setOrigin(0.5).setAlpha(0).setDepth(6);
    this.qItems.push(qnum,db,dt);
    this.tweens.add({targets:[qnum,db,dt],alpha:1,duration:200,delay:200});

    // Question text — character-by-character typewriter effect (simplified: word by word)
    const lines=q.text.split('\n');
    lines.forEach((line,i)=>{
      const qt=this.add.text(W/2,py2+54+i*30,line,{fontSize:'17px',fontFamily:'"Courier New",monospace',color:'#eef4ff',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setAlpha(0).setDepth(5);
      this.qItems.push(qt);
      this.tweens.add({targets:qt,alpha:1,duration:180,delay:280+i*80});
    });

    // Visual aid
    this.drawVisualInScene(px2,py2,pw,ph,q.visual);

    // Key hint
    const hint=this.add.text(W/2,py2+200,'[ 1 ]  [ 2 ]  [ 3 ]  [ 4 ]  — Press a number or tap',{fontSize:'11px',fontFamily:'"Courier New",monospace',color:'#334466'}).setOrigin(0.5).setAlpha(0).setDepth(5);
    this.qItems.push(hint);this.tweens.add({targets:hint,alpha:1,duration:200,delay:500});

    // Answer buttons — staggered pop-in
    const btnY=py2+222;
    q.answers.forEach((ans,i)=>{
      const bw=160,bh=54,bx=px2+20+i*(bw+15),by=btnY;
      const bg=this.add.graphics().setAlpha(0).setDepth(5).setScale(0.7);
      bg.fillStyle(0x0d1a30,1);bg.fillRoundedRect(bx,by,bw,bh,10);
      bg.lineStyle(2,0x2233aa,0.8);bg.strokeRoundedRect(bx,by,bw,bh,10);
      const numBadge=this.add.graphics().setAlpha(0).setDepth(6);
      numBadge.fillStyle(0x330066,1);numBadge.fillCircle(bx+16,by+16,12);
      numBadge.lineStyle(1.5,0xaa44ff,0.8);numBadge.strokeCircle(bx+16,by+16,12);
      const numT=this.add.text(bx+16,by+16,`${i+1}`,{fontSize:'13px',fontFamily:'"Courier New",monospace',color:'#cc88ff'}).setOrigin(0.5).setAlpha(0).setDepth(7);
      const bt2=this.add.text(bx+bw/2,by+bh/2+4,ans.text,{fontSize:'14px',fontFamily:'"Courier New",monospace',color:'#aaddff',align:'center',wordWrap:{width:bw-24}}).setOrigin(0.5).setAlpha(0).setDepth(6);
      this.qItems.push(bg,numBadge,numT,bt2);
      const delay=400+i*90;
      this.tweens.add({targets:bg,alpha:1,scaleX:1,scaleY:1,duration:220,delay,ease:'Back.easeOut'});
      this.tweens.add({targets:[numBadge,numT,bt2],alpha:1,duration:180,delay:delay+60});
      bg.setInteractive(new Phaser.Geom.Rectangle(bx,by,bw,bh),Phaser.Geom.Rectangle.Contains);
      bg.on('pointerover',()=>{if(this.answeredThisQ)return;bg.clear();bg.fillStyle(0x1a2a50,1);bg.fillRoundedRect(bx,by,bw,bh,10);bg.lineStyle(2.5,0x8844ff,1);bg.strokeRoundedRect(bx,by,bw,bh,10);});
      bg.on('pointerout',()=>{if(this.answeredThisQ)return;bg.clear();bg.fillStyle(0x0d1a30,1);bg.fillRoundedRect(bx,by,bw,bh,10);bg.lineStyle(2,0x2233aa,0.8);bg.strokeRoundedRect(bx,by,bw,bh,10);});
      bg.on('pointerdown',()=>this.selectAnswer(ans,bg,bx,by,bw,bh,q));
      bt2.setInteractive();bt2.on('pointerdown',()=>this.selectAnswer(ans,bg,bx,by,bw,bh,q));
    });

    // Timer bar
    this.timerMax=25;this.timerLeft=this.timerMax;
    const tbBg=this.add.graphics().setAlpha(0).setDepth(5);tbBg.fillStyle(0x0a0f1a,1);tbBg.fillRect(px2,py2+ph-20,pw,16);
    this.timerBar=this.add.graphics().setAlpha(0).setDepth(6);
    this.timerTxt=this.add.text(W/2,py2+ph-12,'25s',{fontSize:'11px',fontFamily:'"Courier New",monospace',color:'#556688'}).setOrigin(0.5).setAlpha(0).setDepth(7);
    this.qItems.push(tbBg,this.timerBar,this.timerTxt);
    this.tweens.add({targets:[tbBg,this.timerBar,this.timerTxt],alpha:1,duration:200,delay:600});
    this.timerPx=px2;this.timerPw=pw;this.timerPy=py2+ph-20;
    this.timerRunning=true;

    // Key handler
    this._qKey=(e)=>{const k=parseInt(e.key);if(k>=1&&k<=q.answers.length&&!this.answeredThisQ)this.selectAnswer(q.answers[k-1],null,0,0,0,0,q);};
    this.input.keyboard.on('keydown',this._qKey);
  }

  drawVisualInScene(px2,py2,pw,ph,vis){
    if(!vis)return;
    const g=this.add.graphics().setAlpha(0).setDepth(5);const W=GW;const cx=px2+pw/2,vy=py2+165,vw=160;
    this.qItems.push(g);this.tweens.add({targets:g,alpha:1,duration:200,delay:350});
    switch(vis.type){
      case'fraction_shape':case'fraction_objects':{
        const bw=200,bh=36,bx=cx-bw/2;
        g.fillStyle(0x1a2a3a);g.fillRect(bx,vy,bw,bh);
        for(let i=0;i<vis.den;i++){const pw2=bw/vis.den;g.fillStyle(i<vis.num?0x00ccff:0x223344,i<vis.num?0.85:0.5);g.fillRect(bx+i*pw2+1,vy+1,pw2-2,bh-2);}
        g.lineStyle(2,0x0088aa,0.8);g.strokeRect(bx,vy,bw,bh);
        if(vis.label){
          const vt=this.add.text(cx,vy+bh+10,`${vis.num}/${vis.den}`,{fontSize:'20px',fontFamily:'"Courier New",monospace',color:'#00ccff',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setAlpha(0).setDepth(5);
          this.qItems.push(vt);this.tweens.add({targets:vt,alpha:1,duration:200,delay:380});
        }
        break;
      }
      case'compare_bars':case'add_bars':case'subtract_bars':{
        vis.fracs.forEach(([n,d],i)=>{
          const bw=200,bh=22,bx=cx-bw/2,by=vy+(i*28)-14;
          g.fillStyle(0x1a2a3a);g.fillRect(bx,by,bw,bh);
          for(let j=0;j<d;j++){const pw2=bw/d;g.fillStyle(i===0?0x00aaff:0xff6600,j<n?0.85:0.2);g.fillRect(bx+j*pw2+1,by+1,pw2-2,bh-2);}
          g.lineStyle(1.5,i===0?0x0088aa:0xcc4400,0.8);g.strokeRect(bx,by,bw,bh);
          const lbl=this.add.text(bx-36,by+11,`${n}/${d}`,{fontSize:'13px',fontFamily:'"Courier New",monospace',color:i===0?'#00aaff':'#ff8844'}).setOrigin(0.5).setAlpha(0).setDepth(5);
          this.qItems.push(lbl);this.tweens.add({targets:lbl,alpha:1,duration:200,delay:370});
        });break;
      }
      case'number_line':case'number_line_dec':{
        const lx=cx-90,rx=cx+90,ly2=vy+14;
        g.lineStyle(2,0x4488aa,1);g.beginPath();g.moveTo(lx,ly2);g.lineTo(rx,ly2);g.strokePath();
        g.fillStyle(0x4488aa);g.fillTriangle(rx-5,ly2-5,rx+8,ly2,rx-5,ly2+5);
        const den=vis.den||10;
        for(let i=0;i<=den;i++){const tx=lx+i*(rx-lx)/den;g.lineStyle(1.5,0x668899,1);g.beginPath();g.moveTo(tx,ly2-7);g.lineTo(tx,ly2+7);g.strokePath();}
        const markX=lx+vis.num*(rx-lx)/den;
        g.fillStyle(0xffcc00,1);g.fillCircle(markX,ly2,7);
        [['0',lx],['1',rx]].forEach(([t,x])=>{const tx2=this.add.text(x,ly2+14,t,{fontSize:'11px',fontFamily:'"Courier New",monospace',color:'#888'}).setOrigin(0.5).setAlpha(0).setDepth(5);this.qItems.push(tx2);this.tweens.add({targets:tx2,alpha:1,duration:200,delay:360});});
        const mt=this.add.text(markX,ly2-20,vis.type==='number_line_dec'?`${vis.dec}`:`${vis.num}/${vis.den}`,{fontSize:'12px',fontFamily:'"Courier New",monospace',color:'#ffcc00',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setAlpha(0).setDepth(5);
        this.qItems.push(mt);this.tweens.add({targets:mt,alpha:1,duration:200,delay:370});break;
      }
      case'multiply_grid':{
        const [n1,d1]=vis.frac1,[n2,d2]=vis.frac2;
        const gw2=d1*26,gh2=d2*26,gx=cx-gw2/2,gy2=vy-gh2/2;
        for(let r=0;r<d2;r++)for(let c2=0;c2<d1;c2++){
          const filled=r<n2&&c2<n1;
          g.fillStyle(filled?0x00ccff:0x1a2a3a,filled?0.8:0.4);g.fillRect(gx+c2*26,gy2+r*26,25,25);
          g.lineStyle(1,0x334455,0.5);g.strokeRect(gx+c2*26,gy2+r*26,25,25);
        }break;
      }
      case'race_track':{
        const bw=200,bh=28,bx=cx-bw/2;
        const seg=bw/vis.total;
        for(let i=0;i<vis.total;i++){let col=0x1a2a3a;if(i<vis.seg1)col=0x00aaff;else if(i<vis.seg1+vis.seg2)col=0xff8800;g.fillStyle(col,0.8);g.fillRect(bx+i*seg+1,vy+1,seg-2,bh-2);g.lineStyle(1,0x334455,0.5);g.strokeRect(bx+i*seg,vy,seg,bh);}break;
      }
      default:break;
    }
  }

  selectAnswer(ans,bgGfx,bx,by,bw,bh,q){
    if(this.answeredThisQ)return;
    this.answeredThisQ=true;this.timerRunning=false;
    this.input.keyboard.off('keydown',this._qKey);
    const correct=ans.correct;
    GS.mathStats.totalAnswered++;
    if(correct){
      GS.mathStats.totalCorrect++;this.numCorrect++;
      this.streak++;if(this.streak>this.maxStreak)this.maxStreak=this.streak;
    }else{
      this.streak=0;
    }
    this.updateStreakDisplay();
    if(bgGfx){
      bgGfx.clear();bgGfx.fillStyle(correct?0x004422:0x440000,1);bgGfx.fillRoundedRect(bx,by,bw,bh,10);bgGfx.lineStyle(3,correct?0x00ff66:0xff2200,1);bgGfx.strokeRoundedRect(bx,by,bw,bh,10);
    }

    // ── DRAMATIC GAME SHOW REVEAL ──
    const W2=GW,H2=GH;
    sfx(correct?'gs_reveal_good':'gs_reveal_bad');

    // Screen flash
    this.cameras.main.flash(correct?200:280,correct?0:255,correct?255:0,correct?100:0,true);
    if(!correct)this.cameras.main.shake(220,0.012);

    // Big result stamp — slams in
    const stampTxt=correct?'CORRECT!':'WRONG!';
    const stampCol=correct?'#00ff88':'#ff2200';
    const stamp=this.add.text(W2/2,H2/2-30,stampTxt,{fontSize:'72px',fontFamily:'"Courier New",monospace',color:stampCol,stroke:'#000',strokeThickness:10}).setOrigin(0.5).setDepth(92).setScale(2.5).setAlpha(0).setRotation(correct?-0.08:0.06);
    this.tweens.add({targets:stamp,scaleX:1,scaleY:1,alpha:1,rotation:0,duration:260,ease:'Back.easeOut'});
    this.tweens.add({targets:stamp,alpha:0,y:H2/2-80,duration:500,delay:1100,ease:'Cubic.easeIn'});
    // Collect transient reveal objects for safe cleanup
    const _rev=[stamp];

    // Streak bonus announcement
    if(correct&&this.streak>=3){
      const streakMsgs={3:'🔥 3x STREAK!',4:'🔥🔥 4x STREAK!',5:'🌟 5x STREAK — POWER-UP UPGRADED!'};
      const smsg=streakMsgs[Math.min(this.streak,5)]||`🔥 ${this.streak}x STREAK!`;
      const st=this.add.text(W2/2,H2/2+38,smsg,{fontSize:'18px',fontFamily:'"Courier New",monospace',color:'#ff8800',stroke:'#000',strokeThickness:4}).setOrigin(0.5).setDepth(93).setAlpha(0).setScale(0.5);
      this.tweens.add({targets:st,alpha:1,scaleX:1,scaleY:1,duration:300,delay:200,ease:'Back.easeOut'});
      this.tweens.add({targets:st,alpha:0,duration:300,delay:1300});
      _rev.push(st);
      sfx('gs_fanfare');
    }

    // Host comment
    const hostComments={
      correct:["🎙️ Nailed it! Incredible!","🎙️ The crowd goes wild!","🎙️ Textbook answer!","🎙️ That's how it's done!"],
      wrong:["🎙️ Oh no, so close!","🎙️ The crowd gasps!","🎙️ Rough break, study up!","🎙️ Wrong! But don't give up!"],
    };
    const pool=correct?hostComments.correct:hostComments.wrong;
    const hc=pool[Math.floor(Math.random()*pool.length)];
    const hostBar=this.add.graphics().setDepth(91).setAlpha(0);
    hostBar.fillStyle(correct?0x001a00:0x1a0000,0.95);hostBar.fillRoundedRect(W2/2-240,H2-80,480,36,8);
    hostBar.lineStyle(2,correct?0x00cc44:0xcc0000,0.9);hostBar.strokeRoundedRect(W2/2-240,H2-80,480,36,8);
    const hostTxt=this.add.text(W2/2,H2-62,hc,{fontSize:'14px',fontFamily:'"Courier New",monospace',color:correct?'#88ffaa':'#ff8888',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setDepth(92).setAlpha(0);
    this.tweens.add({targets:[hostBar,hostTxt],alpha:1,duration:200,delay:300});
    this.tweens.add({targets:[hostBar,hostTxt],alpha:0,duration:300,delay:1500});
    _rev.push(hostBar,hostTxt);

    // Explanation
    const exp=this.add.text(W2/2,H2/2+10,q.explanation,{fontSize:'13px',fontFamily:'"Courier New",monospace',color:'#aaddff',stroke:'#000',strokeThickness:2,align:'center'}).setOrigin(0.5).setDepth(92).setAlpha(0);
    this.tweens.add({targets:exp,alpha:1,duration:300,delay:350});
    this.tweens.add({targets:exp,alpha:0,duration:300,delay:1400});
    _rev.push(exp);

    this.time.delayedCall(1750,()=>{
      _rev.forEach(o=>{try{if(o&&o.scene)o.destroy();}catch(e){}});
      this.questionIndex++;
      if(this.questionIndex<this.totalQ)this.showQuestion(this.questionIndex);
      else this.showResults();

  showResults(){

      powerup=POWERUPS[Math.min(POWERUPS.indexOf(powerup)+1,POWERUPS.length-1)];
    }

    sfx('gs_drumroll');

    // Big results panel
    const pw=600,ph=390,px2=(W-pw)/2,py2=(H-ph)/2-20;

    const grade=pct===1?'PERFECT! 🌟':pct>=0.8?'EXCELLENT! ⭐':pct>=0.6?'GOOD! 👍':pct>=0.4?'KEEP TRYING':'STUDY HARDER';
    const gradeCol=pct===1?'#ffcc00':pct>=0.8?'#00ff88':pct>=0.6?'#cc88ff':pct>=0.4?'#ffaa00':'#ff5555';
    const gt=this.add.text(W/2,py2+78,grade,{fontSize:'38px',fontFamily:'"Courier New",monospace',color:gradeCol,stroke:'#000',strokeThickness:6}).setOrigin(0.5).setAlpha(0).setScale(0.3).setDepth(3);
    this.tweens.add({targets:gt,alpha:1,scaleX:1,scaleY:1,duration:500,delay:400,ease:'Back.easeOut'});

    // Score circles (animated one by one)
    for(let i=0;i<this.totalQ;i++){
      const cx2=W/2-100+i*50,cy2=py2+126;
      this.time.delayedCall(500+i*120,()=>{
        const dg=this.add.graphics().setDepth(3).setScale(0.3);
        const wasCorrect=i<this.numCorrect;
        dg.fillStyle(wasCorrect?0x00cc44:0x440000,1);dg.fillCircle(cx2,cy2,16);dg.lineStyle(2,wasCorrect?0x00ff66:0xff2200,0.9);dg.strokeCircle(cx2,cy2,16);
        const mk=this.add.text(cx2,cy2,wasCorrect?'✓':'✗',{fontSize:'14px',fontFamily:'"Courier New",monospace',color:'#fff'}).setOrigin(0.5).setDepth(4).setAlpha(0);
        this.tweens.add({targets:dg,scaleX:1,scaleY:1,duration:220,ease:'Back.easeOut'});
        this.tweens.add({targets:mk,alpha:1,duration:180,delay:100});
        if(wasCorrect)sfx('correct');else sfx('wrong');
      });
    }

    // Streak badge
    if(this.maxStreak>=3){
      const sg=this.add.graphics().setAlpha(0).setDepth(3);
      sg.fillStyle(0xff6600,0.2);sg.fillRoundedRect(px2+30,py2+152,140,34,8);
      sg.lineStyle(2,0xff8800,0.9);sg.strokeRoundedRect(px2+30,py2+152,140,34,8);
      const st=this.add.text(px2+100,py2+169,`🔥 Best Streak: ${this.maxStreak}`,{fontSize:'13px',fontFamily:'"Courier New",monospace',color:'#ffaa44'}).setOrigin(0.5).setAlpha(0).setDepth(4);
      this.tweens.add({targets:[sg,st],alpha:1,duration:300,delay:1200});
    }

    // Power-up reveal — with dramatic box reveal animation
    if(powerup){
      const pug=this.add.graphics().setAlpha(0).setDepth(3);
      pug.fillStyle(powerup.color,0.18);pug.fillRoundedRect(px2+30,py2+196,pw-60,98,12);
      pug.lineStyle(2.5,powerup.color,0.9);pug.strokeRoundedRect(px2+30,py2+196,pw-60,98,12);
      const put=this.add.text(W/2,py2+220,'🎁 POWER-UP UNLOCKED!',{fontSize:'15px',fontFamily:'"Courier New",monospace',color:'#ffcc00',stroke:'#000',strokeThickness:2}).setOrigin(0.5).setAlpha(0).setDepth(4);
      const pun=this.add.text(W/2,py2+244,`${powerup.icon} ${powerup.name}`,{fontSize:'24px',fontFamily:'"Courier New",monospace',color:'#'+powerup.color.toString(16).padStart(6,'0'),stroke:'#000',strokeThickness:4}).setOrigin(0.5).setAlpha(0).setDepth(4).setScale(0.4);
      const pud=this.add.text(W/2,py2+270,powerup.desc,{fontSize:'13px',fontFamily:'"Courier New",monospace',color:'#aaddff'}).setOrigin(0.5).setAlpha(0).setDepth(4);
      this.tweens.add({targets:[pug,put],alpha:1,duration:350,delay:1400});
      this.tweens.add({targets:pun,alpha:1,scaleX:1,scaleY:1,duration:400,delay:1600,ease:'Back.easeOut',onComplete:()=>sfx('powerup')});
      this.tweens.add({targets:pud,alpha:1,duration:300,delay:1900});
    }else{
      const nopt=this.add.text(W/2,py2+224,'No power-up — get 2+ correct next time!',{fontSize:'14px',fontFamily:'"Courier New",monospace',color:'#334455'}).setOrigin(0.5).setAlpha(0).setDepth(3);
      this.tweens.add({targets:nopt,alpha:1,duration:300,delay:1300});
    }

    // Math accuracy
    const acc=GS.mathStats.totalAnswered>0?Math.round(GS.mathStats.totalCorrect/GS.mathStats.totalAnswered*100):0;
    this.add.text(W/2,py2+300,`Career Accuracy: ${acc}%  (${GS.mathStats.totalCorrect}/${GS.mathStats.totalAnswered})`,{fontSize:'12px',fontFamily:'"Courier New",monospace',color:'#334455'}).setOrigin(0.5).setDepth(3);

    // Continue button with pulse
    const cob=this.add.graphics().setAlpha(0).setDepth(3);
    cob.fillStyle(borderCol);cob.fillRoundedRect(W/2-125,py2+ph-60,250,50,10);
    cob.lineStyle(2,0xffffff,0.2);cob.strokeRoundedRect(W/2-125,py2+ph-60,250,50,10);
    const cot=this.add.text(W/2,py2+ph-35,'START RACE! ▶',{fontSize:'20px',fontFamily:'"Courier New",monospace',color:'#fff',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setAlpha(0).setDepth(4);
    this.tweens.add({targets:[cob,cot],alpha:1,duration:300,delay:2200});
    this.tweens.add({targets:[cob,cot],scaleX:1.05,scaleY:1.05,duration:600,yoyo:true,repeat:-1,delay:2500,ease:'Sine.easeInOut'});
    cob.setInteractive(new Phaser.Geom.Rectangle(W/2-125,py2+ph-60,250,50),Phaser.Geom.Rectangle.Contains);
    cob.on('pointerdown',()=>this.goRace());
    this.input.keyboard.on('keydown-SPACE',()=>this.goRace());
    this.input.keyboard.on('keydown-ENTER',()=>this.goRace());
  }

  goRace(){sfx('start');this.cameras.main.flash(300,255,140,0);this.time.delayedCall(260,()=>this.scene.start('PreRaceScene'));}

  update(time,delta){
    // Animate border lights
    if(this.borderLights){
      const t=time*0.003;
      this.borderLights.forEach(bl=>{
        bl.g.clear();
        const on=Math.sin(t+bl.phase)>0.3;
        const col=on?[0xffff00,0xff4400,0x00ffff,0xff00ff][Math.floor(bl.phase*2)%4]:0x333300;
        bl.g.fillStyle(col,on?0.9:0.15);bl.g.fillCircle(bl.x,10,5);
      });
    }
    if(!this.timerRunning||!this.timerBar)return;
    const dt=delta/1000;this.timerLeft-=dt;
    if(this.timerLeft<=0){this.timerLeft=0;this.timerRunning=false;const q=this.questions[this.questionIndex];if(q&&!this.answeredThisQ)this.selectAnswer({correct:false,text:''},null,0,0,0,0,q);return;}
    const pct=this.timerLeft/this.timerMax;
    const col=pct>0.5?0xcc00ff:(pct>0.25?0xffaa00:0xff2200);
    this.timerBar.clear();this.timerBar.fillStyle(col,0.9);this.timerBar.fillRect(this.timerPx,this.timerPy,(this.timerPw||720)*pct,16);
    if(this.timerTxt)this.timerTxt.setText(`${Math.ceil(this.timerLeft)}s`);
    // Urgent pulse when <6s
    if(this.timerLeft<6&&Math.floor(this.timerLeft*4)%2===0){
      this.cameras.main.flash(30,255,0,0,true);
    }
  }
}

  doCD(){

  dn(k){switch(k){case'u':return this.kU.isDown||this.t2.u;case'd':return this.kD.isDown||this.t2.d;case'l':return this.kL.isDown||this.t2.l;case'r':return this.kR.isDown||this.t2.r;case'b':return this.kB.isDown||this.t2.b;case'z':return this.kZ.isDown||this.t2.z;case'w':return this.kW.isDown||this.t2.w;}return false;}
  get px(){return 148;}

  update(time,delta){
    if(this.raceFinished)return;
    const dt=Math.min(delta/1000,0.05);
    if(!this.countdownDone){this.renderAll();return;}
    // If math popup active, pause the race (freeze player, AI keeps going slowly)
    if(this.mathPopup.active){
      this.mathPopup.updateTimer(dt);
      this.updateAI(dt*0.15); // AI slows way down during question
      this.particleUpdate(dt);
      this.renderAll();
      return;
    }
    if(!this.crashed){this.handleInput(dt);this.raceTime+=dt;}
    else{this.crashT-=dt;if(this.crashT<=0)this.respawn();}
    this.updateAI(dt);this.physics(dt);this.particleUpdate(dt);
    this.checkCollisions();this.checkNitros();this.checkDraft();this.checkFinish();
    this.updateAISpeech(dt);this.engSfx(dt);updateMusicSpeed(this.speed,this.maxSpeed);
    if(this.mathReactCD>0)this.mathReactCD-=dt;
    this.renderAll();
  }

  handleInput(dt){
    if(this.dn('z')&&this.turboMeter>=100&&!this.turboActive&&!this.overheated){
      this.turboActive=true;this.turboDur=3.0*this.turbMult;this.turboMeter=0;
      sfx('turbo');this.cameras.main.flash(240,0,180,255,true);this.spSpark(this.px,this.playerY,28,0,200,255);
    }
    if(this.turboActive){this.turboDur-=dt;if(this.turboDur<=0)this.turboActive=false;}
    if(this.overheated){this.overheatT-=dt;if(this.overheatT<=0){this.overheated=false;this.heat=15;}}
    if(this.gripTimer>0){this.gripTimer-=dt;if(this.gripTimer<=0){this.grip=1.0;this.tWet.setAlpha(0);}}
    const wetBase=this.theme.rain?175:210;let tgt=wetBase;
    const boost=this.dn('b');
    if(this.dn('r')){
      if(boost&&!this.overheated){tgt=this.maxSpeed*this.grip;this.heat=Math.min(100,this.heat+dt*36*this.heatMult);if(this.heat>=100){this.overheated=true;this.overheatT=2.6;sfx('overheat');this.cameras.main.shake(380,0.015);this.spSpark(this.px,this.playerY,14,255,80,0);}}
      else{tgt=this.maxSpeed*0.78*this.grip;this.heat=Math.max(0,this.heat-dt*10);}
    }else if(this.dn('l')){tgt=90;this.heat=Math.max(0,this.heat-dt*22);}
    else{this.heat=Math.max(0,this.heat-dt*14);}
    if(this.overheated)tgt=90;
    if(this.turboActive)tgt=Math.max(tgt,this.maxSpeed*1.35);
    if(this.draftBonus>0)tgt=Math.min(tgt+this.draftBonus,this.maxSpeed*1.12);
    this.speed=Phaser.Math.Linear(this.speed,tgt,dt*3.8);
    if(this.laneCD>0)this.laneCD-=dt;
    else if(!this.airborne){
      if(this.dn('u')&&this.playerLane>0){this.playerLane--;this.targetY=getLY(this.playerLane);this.laneCD=this.theme.wet?0.32:0.22;if(this.grip<0.85&&!this.gripPowerup)this.floatText(this.px,this.playerY-30,'SLIDING!','#88aaff',1);}
      else if(this.dn('d')&&this.playerLane<LANES-1){this.playerLane++;this.targetY=getLY(this.playerLane);this.laneCD=this.theme.wet?0.32:0.22;if(this.grip<0.85&&!this.gripPowerup)this.floatText(this.px,this.playerY-30,'SLIDING!','#88aaff',1);}
    }
    if(this.dn('w')&&!this.airborne&&!this.wheelieOn){this.wheelieOn=true;this.wheelieT=0;sfx('wheelie');}
    if(!this.dn('w')&&this.wheelieOn&&!this.airborne){const bonus=Math.min(18,this.wheelieT*9);this.turboMeter=Math.min(100,this.turboMeter+bonus);this.score+=Math.floor(bonus*12);this.wheelieOn=false;}
    if(this.wheelieOn)this.wheelieT+=dt;
  }

  physics(dt){
    this.playerY=Phaser.Math.Linear(this.playerY,this.targetY,dt*13);
    if(this.airborne){
      this.velY+=680*dt;this.airY+=this.velY*dt;
      if(this.airY>=0){this.airY=0;this.velY=0;this.airborne=false;this.wheelieOn=false;this.turboMeter=Math.min(100,this.turboMeter+14);this.score+=180;sfx('land');this.cameras.main.shake(100,0.007);this.spDust(this.px,this.playerY+14,8);}
    }

    this.turboTrail=this.turboTrail.filter(t=>t.life>0);
    if(this.theme.rain)this.rainP.forEach(r=>{r.x+=r.vx*dt;r.y+=r.vy*dt;if(r.y>GH)Object.assign(r,this.mkRainDrop());});
  }
  mkRainDrop(){return{x:Math.random()*GW,y:Math.random()*GH*0.4,vx:-35,vy:420+Math.random()*200};}

  updateAI(dt){
    const finalStretch=this.distance/this.trackLen>0.78;
    this.aiRiders.forEach(ai=>{
      if(ai.finished)return;
      const def=ai.def;
      if(ai.overheated){ai.overheatT-=dt;if(ai.overheatT<=0){ai.overheated=false;ai.heat=10;}}
      if(ai.overheated){ai.wobbleT+=dt*12;ai.wobble=Math.sin(ai.wobbleT)*4;}else ai.wobble=0;
      ai.evadeTimer-=dt;
      if(ai.evadeTimer<=0){
        ai.evadeTimer=0.3+Math.random()*0.4;
        const lookX=ai.worldX+200;let evaded=false;
        for(const o of this.track.obs){if(Math.abs(o.x-lookX)<180&&o.lane===ai.targetLane){ai.targetLane=ai.targetLane===0?1:ai.targetLane-1;evaded=true;break;}}
        if(!evaded&&Math.random()<0.14){
          if(def.type==='erratic')ai.targetLane=Math.floor(Math.random()*LANES);
          else if(def.type==='aggressive'&&Math.random()<0.5)ai.targetLane=this.playerLane;
        }
        ai.targetLane=Phaser.Math.Clamp(ai.targetLane,0,LANES-1);
      }
      if(ai.laneCD>0)ai.laneCD-=dt;else if(ai.lane!==ai.targetLane&&!ai.airborne){ai.lane+=(ai.targetLane>ai.lane?1:-1);ai.laneCD=0.26;}
      ai.y=Phaser.Math.Linear(ai.y,getLY(ai.lane),dt*10);
      let tgt=200+this.raceNum*8;
      ai.boostTimer-=dt;
      const shouldBoost=(def.type==='aggressive'&&ai.boostTimer<=0)||(def.type==='consistent'&&ai.worldX<this.worldX+150)||(def.type==='erratic'&&Math.random()<0.012);
      if(shouldBoost&&!ai.overheated){tgt*=def.baseSpeed*1.15;ai.heat=Math.min(100,ai.heat+dt*28*(1-def.heatMgmt*0.5));if(ai.heat>=100){ai.overheated=true;ai.overheatT=2.5;}if(ai.boostTimer<=0)ai.boostTimer=1.5+Math.random()*2;}
      else{tgt*=def.baseSpeed;ai.heat=Math.max(0,ai.heat-dt*15*def.heatMgmt);}
      if(ai.overheated)tgt=88;
      if(finalStretch&&ai.worldX<this.worldX-200)tgt=Math.min(tgt*1.25,this.maxSpeed*1.1);
      if(finalStretch&&ai.worldX>this.worldX+400)tgt*=0.88;
      // CALC boss gets speed from player wrong answers
      if(ai.def&&ai.def.isBoss&&ai.wrongStacks>0){
        tgt+=ai.wrongStacks*CALC_DEF.wrongAnswerBoost;
        if(ai.surgeFlash>0){ai.surgeFlash-=dt*2;ai.wobbleT+=dt*20;ai.wobble=Math.sin(ai.wobbleT)*6;}
      }
      ai.speed=Phaser.Math.Linear(ai.speed,tgt,dt*2.5);
      if(!ai.airborne){for(const r of this.track.ramps){const rx=r.x-ai.worldX;if(Math.abs(rx-148)<46&&Math.abs(getLY(r.lane)-ai.y)<LH*0.55&&def.rampSkill>Math.random()){ai.airborne=true;ai.velY=-(260+r.h*7+ai.speed*0.3);ai.speed=Math.min(ai.speed+50,this.maxSpeed*1.1);break;}}}
      if(ai.airborne){ai.velY+=680*dt;ai.airY+=ai.velY*dt;if(ai.airY>=0){ai.airY=0;ai.velY=0;ai.airborne=false;}}
      ai.worldX+=ai.speed*dt;ai.wheelRot=(ai.wheelRot||0)+ai.speed*dt*0.09;
    });
  }

  updateAISpeech(dt){
    this.aiRiders.forEach((ai,idx)=>{
      if(ai.finished)return;
      const screenX=148+(ai.worldX-this.worldX);if(screenX<80||screenX>GW-80)return;
      const bubbleY=ai.y+(ai.airY||0)-55;const def=ai.def;
      const aiAhead=ai.worldX>this.worldX;
      if(aiAhead&&!ai.wasAhead){mkBubble(this,screenX,bubbleY,def.taunts[Math.floor(Math.random()*def.taunts.length)],def.col);}
      if(!aiAhead&&ai.wasAhead){mkBubble(this,screenX,bubbleY,def.reacts[Math.floor(Math.random()*def.reacts.length)],def.col);}
      ai.wasAhead=aiAhead;
    });
  }

  // ── RIVAL MATH REACTIONS ─────────────────────────────────────────
  triggerRivalMathReaction(correct){
    if(this.mathReactCD>0)return;
    this.mathReactCD=4;
    // Pick a random nearby visible rival to react
    const visible=this.aiRiders.filter(ai=>{
      if(ai.finished)return false;
      const sx=148+(ai.worldX-this.worldX);
      return sx>50&&sx<GW-50;
    });
    if(!visible.length)return;
    const ai=visible[Math.floor(Math.random()*visible.length)];
    const def=ai.def;
    const pool=correct?def.mathRight:def.mathWrong;
    if(!pool||!pool.length)return;
    const msg=pool[Math.floor(Math.random()*pool.length)];
    const sx=148+(ai.worldX-this.worldX);
    const sy=ai.y+(ai.airY||0)-55;
    mkBubble(this,sx,sy,msg,def.col);

    // CALC special: wrong answer = POWER SURGE
    if(!correct&&this.calcRider&&!this.calcRider.finished){
      this.calcRider.wrongStacks=Math.min(
        CALC_DEF.maxBonusStack,
        (this.calcRider.wrongStacks||0)+1
      );
      GS.calcWrongStacks=this.calcRider.wrongStacks;
      sfx('calc_surge');
      this.cameras.main.shake(180,0.01);
      // Purple surge flash on CALC
      this.calcRider.surgeFlash=0.8;
      // Show CALC surge text
      const cx2=148+(this.calcRider.worldX-this.worldX);
      const cy2=this.calcRider.y-70;
      const surgeTxt=this.add.text(cx2,cy2,`⚡ POWER +${this.calcRider.wrongStacks}`,{fontSize:'15px',fontFamily:'"Courier New",monospace',color:'#ff44ff',stroke:'#000',strokeThickness:4}).setOrigin(0.5).setDepth(30);
      this.tweens.add({targets:surgeTxt,y:cy2-50,alpha:0,duration:1200,ease:'Cubic.easeOut',onComplete:()=>surgeTxt.destroy()});
    }
  }

  // ── MATH QUESTION TRIGGER ─────────────────────────────────────────
  triggerMathQuestion(type, onCorrect, onWrong){
    if(this.mathPopup.active)return;
    // Flash math challenge banner
    this.tMath.setAlpha(1);this.tweens.add({targets:this.tMath,alpha:0,duration:400,delay:600});
    this.cameras.main.flash(80,255,255,0,true);
    const q=makeQuestion(GS.difficulty);
    this.mathPopup.show(q,type,onCorrect,onWrong);

  checkCollisions(){
    if(this.crashed)return;
    if(!this.airborne&&!this.mathPopup.active){
      for(const r of this.track.ramps){
        const rx=r.x-this.worldX;if(rx<-90||rx>GW+90)continue;
        if(Math.abs(rx-this.px)<46&&Math.abs(getLY(r.lane)-this.playerY)<LH*0.55){
          // Launch into air always
          this.airborne=true;this.velY=-(280+r.h*8+this.speed*0.4);
          sfx('jump');this.cameras.main.shake(80,0.005);this.spSpark(this.px,this.playerY,12,255,200,50);
          // But reward depends on math
          this.triggerMathQuestion('jump',
            ()=>{// Correct: get speed boost + turbo
              this.speed=Math.min(this.maxSpeed*1.2,this.speed+55);
              this.turboMeter=Math.min(100,this.turboMeter+14);this.score+=150;
              this.floatText(this.px,this.playerY-30,'+SPEED BOOST! ⚡','#ffcc00',1.2);
              this.spSpark(this.px,this.playerY-50,16,255,200,0);
            },
            ()=>{// Wrong: CRASH LANDING — slam into the ground hard
              sfx('spinout');
              this.cameras.main.shake(500,0.025);
              this.cameras.main.flash(200,255,50,0,true);
              // Force a hard landing crash
              this.velY=Math.max(this.velY,400); // slam down fast
              this.speed=Math.max(80,this.speed*0.45); // lose most speed
              this.heat=Math.min(100,this.heat+25);   // overheat penalty
              this.spDebris(this.px,this.playerY);
              this.floatText(this.px,this.playerY-30,'💥 CRASH LANDING!','#ff4444',1.3);
              // Short stun after landing
              this.time.delayedCall(200,()=>{
                if(this.airY>=0){this.doCrash();}
              });
            }
          );
          break;
        }
      }
    }
    if(!this.airborne&&!this.mathPopup.active){
      for(const o of this.track.obs){
        const ox=o.x-this.worldX;if(ox<-65||ox>GW+65)continue;
        if(Math.abs(ox-this.px)<40&&Math.abs(getLY(o.lane)-this.playerY)<LH*0.5){this.doCrash();return;}
      }
    }
    for(const m of this.track.mud){
      const mx=m.x-this.worldX;if(mx<-m.w||mx>GW+80)continue;
      if(mx<this.px+24&&mx+m.w>this.px-24&&Math.abs(getLY(m.lane)-this.playerY)<LH*0.5){
        const slipFactor=this.theme.rain?0.958:0.974;
        this.speed=Math.max(60,this.speed*slipFactor);
        if(this.theme.rain&&!this.gripPowerup){this.grip=Math.max(0.65,this.grip-0.04);this.gripTimer=1.2;}
        if(Math.random()<0.25)this.spDust(this.px-15,this.playerY+12,this.theme.rain?5:3);
      }
    }
    if(this.track.puddles)for(const p of this.track.puddles){
      const px2=p.x-this.worldX;if(px2<-p.w||px2>GW+50)continue;
      if(px2<this.px+22&&px2+p.w>this.px-22&&Math.abs(getLY(p.lane)-this.playerY)<LH*0.5){
        if(this.grip>0.7&&!this.gripPowerup){this.grip=0.68;this.gripTimer=1.8;this.tWet.setAlpha(1);this.spSplash(this.px,this.playerY+15);this.cameras.main.shake(60,0.005);}
      }
    }
  }

  checkNitros(){
    for(let i=0;i<this.track.nitros.length;i++){
      const n=this.track.nitros[i];if(n.collected)continue;
      const nx=n.x-this.worldX;if(nx<-40||nx>GW+40)continue;
      if(Math.abs(nx-this.px)<36&&Math.abs(getLY(n.lane)-this.playerY)<LH*0.55){
        n.collected=true;this.nitroCount++;
        sfx('nitro');this.cameras.main.flash(100,255,220,0,true);this.spSpark(this.px,this.playerY,12,255,220,0);
        // Math question for nitro reward
        this.triggerMathQuestion('nitro',
          ()=>{// Correct: full nitro boost
            this.speed=Math.min(this.maxSpeed*1.3,this.speed+90);
            this.turboMeter=Math.min(100,this.turboMeter+25);this.score+=200;
            this.floatText(this.px,this.playerY-40,'NITRO! +200 💥','#ffff00',1.5);
            this.cameras.main.flash(150,255,220,0,true);this.spSpark(this.px,this.playerY,20,255,220,0);
          },
          ()=>{// Wrong: NITRO BACKFIRE — stun + speed loss + debris
            sfx('spinout');
            this.cameras.main.shake(420,0.022);
            this.cameras.main.flash(300,255,30,0,true);
            this.speed=Math.max(60,this.speed*0.35);   // brutal speed loss

  checkDraft(){
    let drafting=false;
    for(const ai of this.aiRiders){
      if(ai.finished)continue;
      const aix=ai.worldX-this.worldX;
      if(aix>8&&aix<95&&Math.abs(ai.y-this.playerY)<LH*0.5){drafting=true;this.draftBonus=Phaser.Math.Linear(this.draftBonus,38,0.06);break;}
    }
    if(!drafting)this.draftBonus=Phaser.Math.Linear(this.draftBonus,0,0.1);
  }

  checkFinish(){
    if(this.distance>=this.trackLen&&!this.raceFinished){
      this.raceFinished=true;this.finishPosition=this.getPosition();
      let coins=[5,3,2,1][this.finishPosition-1]||1;
      coins*=this.doubleCoins;GS.coins+=coins;
      GS.points[0]+=POINTS_TABLE[this.finishPosition-1]||0;
      this.aiRiders.forEach((ai,i)=>GS.points[i+1]+=POINTS_TABLE[this.getAIPosition(i)-1]||0);
      const best=localStorage.getItem('eb_best');if(!best||this.raceTime<parseFloat(best))localStorage.setItem('eb_best',this.raceTime.toFixed(2));
      stopMusic();sfx('podium');this.cameras.main.flash(500,255,220,50,true);
      GS.consumeBoosts();
      this.time.delayedCall(800,()=>this.scene.start('PostRaceScene',{time:this.raceTime,position:this.finishPosition,score:this.score,coins}));
    }
    this.aiRiders.forEach(ai=>{if(!ai.finished&&ai.worldX>=this.trackLen){ai.finished=true;ai.finishTime=this.raceTime;}});
  }

  getPosition(){let ahead=0;this.aiRiders.forEach(ai=>{if(!ai.finished&&ai.worldX>this.worldX)ahead++;if(ai.finished)ahead++;});return Math.min(4,ahead+1);}
  getAIPosition(aiIdx){const ai=this.aiRiders[aiIdx];let ahead=this.distance>ai.worldX?1:0;this.aiRiders.forEach((o,i)=>{if(i!==aiIdx&&o.worldX>ai.worldX)ahead++;});return Math.min(4,ahead+1);}
  doCrash(){

    const g=this.gOvl;g.clear();
    const speedPct=this.speed/this.maxSpeed;
    if(speedPct>0.7){const vigAlpha=(speedPct-0.7)/0.3*0.16;for(let i=0;i<8;i++){const y=GY+40+i*38;const lw=this.turboActive?80+Math.random()*60:30+Math.random()*30;g.fillStyle(0xffffff,vigAlpha*0.3*(this.turboActive?1.8:1));g.fillRect(0,y,lw,2);g.fillRect(GW-lw,y,lw,2);}}
    if(this.heat>70){const hAlpha=(this.heat-70)/30*(this.overheated?0.32:0.18);const pulse=this.overheated?Math.sin(this.raceTime*8)*0.5+0.5:1;for(let i=0;i<30;i++){const t=i/30;g.fillStyle(0xff2200,hAlpha*pulse*(1-t));g.fillRect(0,GY+i*8,16-i*0.4,8);g.fillRect(GW-16+i*0.4,GY+i*8,16-i*0.4,8);}}
    if(this.theme.wet&&this.grip<0.85){g.fillStyle(0x4488cc,(0.85-this.grip)/0.2*0.10);g.fillRect(0,GY,GW,GH-GY);}
    if(this.turboActive){g.fillStyle(0x0044ff,Math.sin(this.raceTime*20)*0.04+0.04);g.fillRect(0,0,GW,GH);}
    // Pause overlay when math popup active
    if(this.mathPopup&&this.mathPopup.active){g.fillStyle(0x000000,0.08);g.fillRect(0,GY,GW,GH-GY);}
  }
}

// ═══════════════════════════════════════════════════════════════════════
//  POST-RACE SCENE

class PostRaceScene extends Phaser.Scene{
  constructor(){super('PostRaceScene');}
  init(data){this.raceTime=data.time;this.position=data.position;this.score=data.score;this.coinsEarned=data.coins;}
  create(){
    const W=GW,H=GH,rn=GS.currentRace-1;
    this.cameras.main.setBackgroundColor('#050510');
    if(this.position<=2)this.time.addEvent({delay:300,repeat:12,callback:()=>this.boom()});
    const posLabels=['🥇 1ST PLACE!','🥈 2ND PLACE!','🥉 3RD PLACE!','4TH PLACE'];
    const posColors=['#ffcc00','#aaaaaa','#cc6600','#886644'];
    this.add.text(W/2,24,`RACE ${rn+1} — ${THEMES[Math.min(rn,9)].name}`,{fontSize:'13px',fontFamily:'"Courier New",monospace',color:'#888'}).setOrigin(0.5);
    const finTxt=this.add.text(W/2,54,posLabels[this.position-1],{fontSize:'40px',fontFamily:'"Courier New",monospace',color:posColors[this.position-1],stroke:'#000',strokeThickness:6}).setOrigin(0.5).setScale(0.4).setAlpha(0);
    this.tweens.add({targets:finTxt,scaleX:1,scaleY:1,alpha:1,duration:550,ease:'Back.easeOut'});
    const order=this.computeOrder(),pby=290;
    const podH=[120,90,65,40],podCols=[0xffcc00,0xaaaaaa,0xcc6600,0x554433];
    const rn2=GS.currentRace-1;
    const allNames=['YOU',...AI_DEFS.map(a=>a.name).slice(0,2),(rn2>=6?CALC_DEF.name:AI_DEFS[2].name)];
    order.forEach((pIdx,rank)=>{
      const px2=W/2-150+rank*100,bh=podH[rank],bc=podCols[rank],isP=pIdx===0;
      const bg=this.add.graphics().setAlpha(0);bg.fillStyle(bc,.85);bg.fillRect(px2-30,pby-bh,60,bh);bg.lineStyle(2,isP?0xffffff:0x555555,.35);bg.strokeRect(px2-30,pby-bh,60,bh);
      const mg=this.add.graphics().setAlpha(0);drawBikeSmall(mg,px2,pby-bh-18,0.8,isP?BIKES[GS.bikeIndex].color:AI_DEFS[pIdx-1]?.col||0xffffff);
      const nm=this.add.text(px2,pby-bh-42,allNames[pIdx],{fontSize:'11px',fontFamily:'"Courier New",monospace',color:'#'+bc.toString(16).padStart(6,'0')}).setOrigin(0.5).setAlpha(0);
      this.add.text(px2,pby-bh+10,`${rank+1}`,{fontSize:'22px',fontFamily:'"Courier New",monospace',color:'#fff',stroke:'#000',strokeThickness:3}).setOrigin(0.5);
      this.tweens.add({targets:[bg,mg,nm],alpha:1,duration:400,delay:180+rank*100});
    });
    const sx=48,sy=316;
    [{lbl:'FINISH TIME',val:`${this.raceTime.toFixed(2)}s`},{lbl:'RACE SCORE',val:`${this.score}`},{lbl:'COINS EARNED',val:`+${this.coinsEarned} 🪙`},{lbl:'CHAMP POINTS',val:`${GS.points[0]} pts (+${POINTS_TABLE[this.position-1]||0})`},{lbl:'MATH ACCURACY',val:`${GS.mathStats.totalAnswered>0?Math.round(GS.mathStats.totalCorrect/GS.mathStats.totalAnswered*100):0}% (${GS.mathStats.totalCorrect}/${GS.mathStats.totalAnswered})`}].forEach((s,i)=>{
      const bg=this.add.graphics().setAlpha(0);bg.fillStyle(0x0a1a2a,.9);bg.fillRoundedRect(sx,sy+i*46,340,40,7);bg.lineStyle(1,0x224466,.7);bg.strokeRoundedRect(sx,sy+i*46,340,40,7);
      const lbl=this.add.text(sx+12,sy+i*46+12,s.lbl,{fontSize:'13px',fontFamily:'"Courier New",monospace',color:'#6699cc'}).setAlpha(0);
      const val=this.add.text(sx+330,sy+i*46+12,s.val,{fontSize:'14px',fontFamily:'"Courier New",monospace',color:'#fff'}).setOrigin(1,0).setAlpha(0);
      this.tweens.add({targets:[bg,lbl,val],alpha:1,duration:400,delay:450+i*100});
    });
    const cx=W-295,cy=316;this.add.text(cx,cy,'STANDINGS',{fontSize:'12px',fontFamily:'"Courier New",monospace',color:'#888'});
    [0,1,2,3].sort((a,b)=>GS.points[b]-GS.points[a]).forEach((idx,rank)=>{
      const rn3=GS.currentRace-1;
      const nameList=['YOU',...AI_DEFS.map(a=>a.name).slice(0,2),(rn3>=6?CALC_DEF.name:AI_DEFS[2].name)];
      const isP=idx===0;const col=isP?0xffcc00:(idx===3&&rn3>=6)?CALC_DEF.col:AI_DEFS[idx-1]?.col||0xaaaaaa;
      const bg=this.add.graphics().setAlpha(0);bg.fillStyle(col,isP?.18:.08);bg.fillRoundedRect(cx,cy+18+rank*40,230,34,6);bg.lineStyle(1,col,.4);bg.strokeRoundedRect(cx,cy+18+rank*40,230,34,6);
      this.add.text(cx+10,cy+26+rank*40,`${rank+1}. ${nameList[idx]}`,{fontSize:'14px',fontFamily:'"Courier New",monospace',color:'#'+col.toString(16).padStart(6,'0')}).setAlpha(0);
      this.add.text(cx+220,cy+26+rank*40,`${GS.points[idx]}`,{fontSize:'14px',fontFamily:'"Courier New",monospace',color:'#aaa'}).setOrigin(1,0).setAlpha(0);
      this.tweens.add({targets:bg,alpha:1,duration:350,delay:650+rank*70});
    });
    const isLast=GS.currentRace>=10;
    const btnBg=this.add.graphics().setAlpha(0);btnBg.fillStyle(isLast?0xffcc00:0xff4400);btnBg.fillRoundedRect(W/2-118,H-78,236,52,10);btnBg.lineStyle(2,0xffaa00);btnBg.strokeRoundedRect(W/2-118,H-78,236,52,10);
    const bt=this.add.text(W/2,H-52,isLast?'CHAMPIONSHIP RESULTS':'NEXT QUIZ + RACE ▶',{fontSize:'18px',fontFamily:'"Courier New",monospace',color:isLast?'#000':'#fff',stroke:'#000',strokeThickness:3}).setOrigin(0.5).setAlpha(0);
    this.tweens.add({targets:[btnBg,bt],alpha:1,duration:400,delay:1100});
    this.tweens.add({targets:[btnBg,bt],scaleX:1.04,scaleY:1.04,duration:580,yoyo:true,repeat:-1,delay:1300,ease:'Sine.easeInOut'});
    btnBg.setInteractive(new Phaser.Geom.Rectangle(W/2-118,H-78,236,52),Phaser.Geom.Rectangle.Contains);btnBg.on('pointerdown',()=>this.next(isLast));
    this.input.keyboard.on('keydown-SPACE',()=>this.next(isLast));this.input.keyboard.on('keydown-ENTER',()=>this.next(isLast));
    sfx('podium');
    try{localStorage.setItem('eb_math_save',JSON.stringify({currentRace:GS.currentRace,bikeIndex:GS.bikeIndex,points:GS.points,upgrades:GS.upgrades,coins:GS.coins,difficulty:GS.difficulty,activeBoosts:GS.activeBoosts,mathStats:GS.mathStats}));}catch(e){}
  }
  computeOrder(){const p=this.position;const order=[1,2,3];order.splice(p-1,0,0);return order.slice(0,4);}
  boom(){const g=this.add.graphics();const fx=80+Math.random()*(GW-160),fy=40+Math.random()*280;const c=[0xff4400,0xffcc00,0x00ffcc,0xff00ff,0x00aaff][Math.floor(Math.random()*5)];for(let i=0;i<18;i++){const a=(i/18)*Math.PI*2,d=this.add.graphics();d.fillStyle(c,1);d.fillCircle(fx,fy,3+Math.random()*2);this.tweens.add({targets:d,x:Math.cos(a)*(35+Math.random()*35),y:Math.sin(a)*(35+Math.random()*35),alpha:0,duration:500+Math.random()*250,ease:'Cubic.easeOut',onComplete:()=>d.destroy()});}g.fillStyle(c,1);g.fillCircle(fx,fy,7);this.tweens.add({targets:g,alpha:0,scaleX:4,scaleY:4,duration:250,onComplete:()=>g.destroy()});this.cameras.main.flash(55,(c>>16)&0xff,(c>>8)&0xff,c&0xff,true);}
  next(isLast){sfx('start');this.cameras.main.flash(280,255,140,0);this.time.delayedCall(260,()=>this.scene.start(isLast?'ChampionshipEndScene':'MathQuizScene',{fromRace:true}));}
}

// ═══════════════════════════════════════════════════════════════════════
//  CHAMPIONSHIP END SCENE

class ChampionshipEndScene extends Phaser.Scene{
  constructor(){super('ChampionshipEndScene');}
  create(){
    const W=GW,H=GH;this.cameras.main.setBackgroundColor('#040412');

    this.time.addEvent({delay:250,repeat:22,callback:()=>this.boom()});
    const winner=[0,1,2,3].reduce((b,i)=>GS.points[i]>GS.points[b]?i:b,0);const playerWon=winner===0;
    const bb=this.add.graphics();bb.fillStyle(playerWon?0xffcc00:0x222244);bb.fillRect(0,55,W,120);
    const ht=this.add.text(W/2,115,playerWon?'★ CHAMPION! ★':'CHAMPIONSHIP OVER',{fontSize:'46px',fontFamily:'"Courier New",monospace',color:playerWon?'#000':'#fff',stroke:playerWon?'#aa7700':'#000',strokeThickness:6}).setOrigin(0.5).setScale(0.3).setAlpha(0);
    this.tweens.add({targets:ht,scaleX:1,scaleY:1,alpha:1,duration:600,ease:'Back.easeOut'});
    const acc=GS.mathStats.totalAnswered>0?Math.round(GS.mathStats.totalCorrect/GS.mathStats.totalAnswered*100):0;
    this.add.text(W/2,152,playerWon?`You won! Math accuracy: ${acc}%`:`Math accuracy: ${acc}% — ${['YOU',...AI_DEFS.map(a=>a.name)][winner]} wins!`,{fontSize:'15px',fontFamily:'"Courier New",monospace',color:playerWon?'#443300':'#aaaaaa'}).setOrigin(0.5);

    mrg.fillStyle(0x080c18,.9);mrg.fillRoundedRect(mrx,mry,360,110,10);mrg.lineStyle(2,0x00aaff,.6);mrg.strokeRoundedRect(mrx,mry,360,110,10);
    this.add.text(W/2,mry+20,'📊 MATH REPORT CARD',{fontSize:'15px',fontFamily:'"Courier New",monospace',color:'#00aaff'}).setOrigin(0.5);
    const grade=acc>=90?'A+':acc>=80?'A':acc>=70?'B':acc>=60?'C':acc>=50?'D':'F';
    const gradeCol=acc>=80?'#00ff88':acc>=60?'#ffcc00':'#ff4444';
    this.add.text(W/2,mry+48,`${GS.mathStats.totalCorrect} / ${GS.mathStats.totalAnswered} correct  —  ${acc}%`,{fontSize:'16px',fontFamily:'"Courier New",monospace',color:'#aaddff'}).setOrigin(0.5);
    this.add.text(W/2,mry+72,`Grade: ${grade}  (${GS.difficulty.toUpperCase()} difficulty)`,{fontSize:'20px',fontFamily:'"Courier New",monospace',color:gradeCol,stroke:'#000',strokeThickness:3}).setOrigin(0.5);
    const sorted=[0,1,2,3].sort((a,b)=>GS.points[b]-GS.points[a]);
    const allNames=['YOU',...AI_DEFS.map(a=>a.name).slice(0,2),CALC_DEF.name];const podX=[W/2-10,W/2-175,W/2+155,W/2+315],podH=[140,110,85,55],podCols=[0xffcc00,0xaaaaaa,0xcc6600,0x554433];const pby=420;
    sorted.forEach((idx,rank)=>{
      const px3=podX[rank],bh=podH[rank],bc=podCols[rank],isP=idx===0;
      const bg=this.add.graphics().setAlpha(0);bg.fillStyle(bc,.88);bg.fillRect(px3-38,pby-bh,76,bh);bg.lineStyle(2,isP?0xffffff:0x555555,.4);bg.strokeRoundedRect(px3-38,pby-bh,76,bh,4);
      const mg=this.add.graphics().setAlpha(0);drawBikeSmall(mg,px3,pby-bh-20,0.9,isP?BIKES[GS.bikeIndex].color:AI_DEFS[idx-1]?.col||0xffffff);
      this.add.text(px3,pby-bh-44,allNames[idx],{fontSize:'11px',fontFamily:'"Courier New",monospace',color:'#'+bc.toString(16).padStart(6,'0')}).setOrigin(0.5);
      this.add.text(px3,pby-bh+12,`${GS.points[idx]}`,{fontSize:'18px',fontFamily:'"Courier New",monospace',color:'#fff',stroke:'#000',strokeThickness:3}).setOrigin(0.5);
      this.tweens.add({targets:[bg,mg],alpha:1,duration:400,delay:300+rank*140});

    const best=localStorage.getItem('eb_best');if(best)this.add.text(W/2,452,`BEST TIME: ${parseFloat(best).toFixed(2)}s`,{fontSize:'14px',fontFamily:'"Courier New",monospace',color:'#00ffaa'}).setOrigin(0.5);
    const byb=H-62;const pb=this.add.graphics().setAlpha(0);pb.fillStyle(0xff4400);pb.fillRoundedRect(W/2-128,byb-22,256,48,10);pb.lineStyle(2,0xffaa00);pb.strokeRoundedRect(W/2-128,byb-22,256,48,10);

  boom(){const g=this.add.graphics();const fx=80+Math.random()*(GW-160),fy=40+Math.random()*340;const c=[0xff4400,0xffcc00,0x00ffcc,0xff00ff,0x00aaff][Math.floor(Math.random()*5)];for(let i=0;i<20;i++){const a=(i/20)*Math.PI*2,d=this.add.graphics();d.fillStyle(c,1);d.fillCircle(fx,fy,3+Math.random()*2);this.tweens.add({targets:d,x:Math.cos(a)*(40+Math.random()*40),y:Math.sin(a)*(40+Math.random()*40),alpha:0,duration:550+Math.random()*250,ease:'Cubic.easeOut',onComplete:()=>d.destroy()});}g.fillStyle(c,1);g.fillCircle(fx,fy,8);this.tweens.add({targets:g,alpha:0,scaleX:4,scaleY:4,duration:260,onComplete:()=>g.destroy()});this.cameras.main.flash(60,(c>>16)&0xff,(c>>8)&0xff,c&0xff,true);}
  restart(){GS.reset();try{localStorage.removeItem('eb_math_save');}catch(e){}stopMusic();sfx('start');this.cameras.main.flash(350,255,140,0);this.time.delayedCall(280,()=>this.scene.start('TitleScene'));}
}
