<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brainy Blocks: Base 10</title>
    <!-- Import playful, kid-friendly font from Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS RESET & CORE SETUP */
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Fredoka', sans-serif;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #87CEEB; /* Sky Blue */
            touch-action: none;
        }

        /* CANVAS STYLING */
        #gameCanvas {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* UI LAYER STYLING */
        #uiLayer {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .interactive {
            pointer-events: auto;
        }

        /* SCENE CONTAINERS */
        .scene {
            position: absolute;
            inset: 0;
            display: none;
            width: 100%;
            height: 100%;
        }
        .active-scene {
            display: flex;
            flex-direction: column;
        }

        /* START SCREEN */
        #startScreen {
            background: rgba(135, 206, 235, 0.95);
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .title-box {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            border: 5px solid #4ADE80;
            max-width: 90%;
        }
        h1 { margin: 0 0 10px 0; color: #3B82F6; font-size: 3rem; text-transform: uppercase; letter-spacing: 2px;}

        /* HUD */
        #gameTopBar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            width: 100%;
        }

        .hud-card {
            background: white;
            padding: 15px 30px;
            border-radius: 20px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #333;
            box-shadow: 0 6px 0px rgba(0,0,0,0.1);
            border: 3px solid #ddd;
            text-align: center;
        }

        #targetBox { border-color: #3B82F6; color: #3B82F6; }
        #currentBox { border-color: #EAB308; transition: all 0.2s; }

        #gameBottomBar {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding: 20px;
            gap: 15px;
            width: 100%;
            background: linear-gradient(to top, rgba(255,255,255,0.7), transparent);
        }

        /* BUTTON STYLES */
        .btn {
            padding: 15px 30px;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: 700;
            border: none;
            cursor: pointer;
            color: white;
            box-shadow: 0 6px 0px rgba(0,0,0,0.2);
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: uppercase;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 0px 0px rgba(0,0,0,0.2);
        }

        .btn-play { background-color: #4ADE80; font-size: 2rem; padding: 20px 50px; }
        .btn-100 { background-color: #3B82F6; }
        .btn-10 { background-color: #22C55E; }
        .btn-1 { background-color: #EAB308; color: #555;}
        .btn-clear { background-color: #EF4444; font-size: 1.2rem; }
        .btn-map { background-color: #9CA3AF; font-size: 1.2rem; }

        .key-hint {
            display: block;
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 5px;
            font-weight: 400;
        }

        /* OVERLAYS */
        #messageOverlay {
            position: absolute;
            inset: 0;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 5;
            background: rgba(255,255,255,0.4);
        }
        .message-box {
            background: white;
            padding: 30px 60px;
            border-radius: 30px;
            font-size: 3rem;
            font-weight: 700;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Responsive scaling */
        @media (max-width: 768px) {
            .btn { padding: 12px 20px; font-size: 1.2rem; }
            .hud-card { font-size: 1.4rem; padding: 10px 20px; }
            h1 { font-size: 2.2rem; }
            .key-hint { display: none; }
            #gameTopBar { flex-wrap: wrap; justify-content: center; gap: 10px; }
            .btn-map { order: -1; width: 100%; margin-bottom: 10px; }
        }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="uiLayer">
        
        <div id="startScreen" class="scene active-scene interactive">
            <div class="title-box">
                <h1>Brainy Blocks<br>Base 10</h1>
                <p style="font-size: 1.2rem; color: #666; margin-bottom: 10px;">Build towers to match the target number!</p>
                <p style="font-size: 1rem; color: #EAB308; font-weight: bold; margin-bottom: 30px;">Wait for the moving claw to center your drop!</p>
                <button class="btn btn-play" id="btnPlay">PLAY</button>
            </div>
        </div>

        <div id="mapUI" class="scene interactive" style="pointer-events: none;">
            <div style="padding: 20px;">
                <div class="hud-card" style="display:inline-block; border-color: #4ADE80; color: #22C55E;">
                    Select a Level!
                </div>
            </div>
        </div>

        <div id="gameUI" class="scene">
            <div id="gameTopBar" class="interactive">
                <button class="btn btn-map" id="btnBackMap">← Map</button>
                <div class="hud-card" id="targetBox">Target: <span id="targetText">0</span></div>
                <div class="hud-card" id="currentBox">Built: <span id="currentText">0</span></div>
            </div>

            <div id="messageOverlay">
                <div class="message-box" id="messageText">Great Job!</div>
            </div>

            <div id="gameBottomBar" class="interactive">
                <button class="btn btn-clear" id="btnClear">Clear<br><span class="key-hint">(Backspace)</span></button>
                <button class="btn btn-100" id="btn100">+100 <br><span class="key-hint">(Key: 3)</span></button>
                <button class="btn btn-10" id="btn10">+10 <br><span class="key-hint">(Key: 2)</span></button>
                <button class="btn btn-1" id="btn1">+1 <br><span class="key-hint">(Key: 1)</span></button>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // CONFIGURATION & GAME DATA
        // ==========================================
        const LEVELS = [
            3, 8, 14,      
            25, 42, 67,    
            85, 104, 132,  
            168, 215, 260, 
            341, 408, 555, 
            619, 742, 888, 
            905, 999       
        ];

        const BLOCK_DEFS = {
            100: { w: 120, h: 120, color: '#3B82F6', outline: '#1E3A8A' },
            10:  { w: 120, h: 12,  color: '#22C55E', outline: '#14532D' },
            1:   { w: 12,  h: 12,  color: '#EAB308', outline: '#713F12' }
        };

        // ==========================================
        // GLOBAL STATE
        // ==========================================
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameState = 'start';
        let unlockedLevel = parseInt(localStorage.getItem('brainyBlocksLevel')) || 0;
        let currentLevelIndex = 0;
        let targetNumber = 0;
        let currentSum = 0;
        
        // Entities
        let towerBlocks = [];   // Blocks successfully stacked
        let fallingBlocks = []; // Blocks currently dropping from claw
        let particles = [];     // Confetti and dust
        let clouds = [];
        let mapNodes = [];
        
        // Camera & Physics
        let cameraScale = 1;
        let shakeEndTime = 0;
        let towerShakeX = 0;

        // The Moving Crane (Claw)
        let crane = {
            screenX: 0,
            dir: 1,
            speed: 3
        };

        // Audio System
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol = 0.1, slideFreq = null) {
            if (!audioCtx) return;
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                if(slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, audioCtx.currentTime + duration);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        const SFX = {
            click: () => playTone(600, 'sine', 0.1, 0.1),
            drop: () => playTone(800, 'triangle', 0.2, 0.05, 300), 
            thud: () => playTone(150, 'square', 0.15, 0.1), 
            miss: () => playTone(200, 'sawtooth', 0.4, 0.1, 50), // Sad falling sound
            win: () => {
                playTone(400, 'sine', 0.2, 0.2);
                setTimeout(() => playTone(500, 'sine', 0.2, 0.2), 100);
                setTimeout(() => playTone(600, 'sine', 0.3, 0.2), 200);
                setTimeout(() => playTone(800, 'sine', 0.5, 0.3), 300);
            },
            lose: () => {
                playTone(300, 'sawtooth', 0.3, 0.1);
                setTimeout(() => playTone(250, 'sawtooth', 0.5, 0.15), 200);
            }
        };

        // ==========================================
        // CLASSES (Entities)
        // ==========================================

        class Block {
            constructor(val, startX, startY) {
                this.val = val;
                this.w = BLOCK_DEFS[val].w;
                this.h = BLOCK_DEFS[val].h;
                this.color = BLOCK_DEFS[val].color;
                this.outline = BLOCK_DEFS[val].outline;
                
                this.x = startX;
                this.y = startY;
                this.vy = 0;
                this.vr = 0; // Rotational velocity for missed blocks
                this.angle = 0;
                this.checked = false; // Has collision been checked?
            }

            draw(ctx) {
                ctx.save();
                ctx.translate(this.x, this.y - this.h/2); // Center registration point
                ctx.rotate(this.angle);
                
                // Draw relative to center
                ctx.fillStyle = this.color;
                ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
                
                ctx.strokeStyle = this.outline;
                ctx.lineWidth = 1;
                ctx.beginPath();
                
                if (this.val === 100) {
                    for(let i=1; i<10; i++) {
                        let stepX = -this.w/2 + (i * (this.w / 10));
                        let stepY = -this.h/2 + (i * (this.h / 10));
                        ctx.moveTo(stepX, -this.h/2); ctx.lineTo(stepX, this.h/2);
                        ctx.moveTo(-this.w/2, stepY); ctx.lineTo(this.w/2, stepY);
                    }
                } else if (this.val === 10) {
                    for(let i=1; i<10; i++) {
                        let stepX = -this.w/2 + (i * (this.w / 10));
                        ctx.moveTo(stepX, -this.h/2); ctx.lineTo(stepX, this.h/2);
                    }
                }
                ctx.stroke();
                ctx.lineWidth = 2;
                ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
                ctx.restore();
            }
        }

        class Particle {
            constructor(x, y, type) {
                this.x = x;
                this.y = y;
                this.type = type; // 'confetti' or 'dust'
                
                if (type === 'confetti') {
                    this.vx = (Math.random() - 0.5) * 15;
                    this.vy = (Math.random() - 1) * 20;
                    this.color = `hsl(${Math.random() * 360}, 100%, 50%)`;
                    this.size = Math.random() * 8 + 6;
                } else {
                    this.vx = (Math.random() - 0.5) * 8;
                    this.vy = (Math.random() - 1) * 5;
                    this.color = `rgba(255, 255, 255, 0.8)`;
                    this.size = Math.random() * 10 + 5;
                }
                
                this.angle = Math.random() * Math.PI * 2;
                this.vr = (Math.random() - 0.5) * 0.4;
                this.life = 1.0;
            }
            update() {
                this.vy += (this.type === 'confetti' ? 0.5 : 0.2);
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.vr;
                if (this.type === 'dust') this.life -= 0.05;
            }
            draw(ctx) {
                if (this.life <= 0) return;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                if (this.type === 'dust') {
                    ctx.globalAlpha = this.life;
                    ctx.fillStyle = this.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, this.size, 0, Math.PI*2);
                    ctx.fill();
                } else {
                    ctx.fillStyle = this.color;
                    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
                }
                ctx.restore();
            }
        }

        // ==========================================
        // INITIALIZATION
        // ==========================================
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            generateClouds();
            generateMapNodes();
            crane.screenX = canvas.width / 2;
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function generateClouds() {
            clouds = [];
            for(let i=0; i<6; i++) {
                clouds.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * (canvas.height * 0.5),
                    s: Math.random() * 0.5 + 0.5,
                    vx: Math.random() * 0.3 + 0.1
                });
            }
        }

        function generateMapNodes() {
            mapNodes = [];
            const padding = 80;
            const availableHeight = canvas.height - padding * 2;
            const stepY = availableHeight / (LEVELS.length - 1);
            
            for (let i = 0; i < LEVELS.length; i++) {
                let x = canvas.width / 2 + Math.sin(i * 0.8) * (canvas.width * 0.3);
                let y = canvas.height - padding - (i * stepY);
                mapNodes.push({ x, y, level: i });
            }
        }

        // ==========================================
        // GAME LOGIC
        // ==========================================
        function switchScene(newScene) {
            document.querySelectorAll('.scene').forEach(el => el.classList.remove('active-scene'));
            document.getElementById(newScene).classList.add('active-scene');
            gameState = newScene === 'startScreen' ? 'start' : 
                        newScene === 'mapUI' ? 'map' : 'game';
        }

        function enterMap() {
            switchScene('mapUI');
            particles = []; 
        }

        function enterGame(levelIndex) {
            currentLevelIndex = levelIndex;
            targetNumber = LEVELS[levelIndex];
            
            towerBlocks = [];
            fallingBlocks = [];
            currentSum = 0;
            cameraScale = 1;
            particles = [];
            crane.speed = 3 + (levelIndex * 0.2); // Crane gets faster!
            
            document.getElementById('targetText').innerText = targetNumber;
            updateSumUI();
            switchScene('gameUI');
        }

        function dropBlock(val) {
            if (gameState !== 'game') return;
            if (document.getElementById('messageOverlay').style.display === 'flex') return;
            
            SFX.drop();
            
            // Calculate starting position (Convert screen X to tower space X)
            let towerHeight = towerBlocks.reduce((sum, b) => sum + b.h, 0);
            let startX = (crane.screenX - canvas.width/2 - towerShakeX) / cameraScale;
            // Spawn height: well above the tower, visually right under the UI claw
            let startY = (-towerHeight) - (180 / cameraScale);
            
            fallingBlocks.push(new Block(val, startX, startY));
        }

        function clearTower() {
            if(towerBlocks.length === 0 && fallingBlocks.length === 0) return;
            SFX.click();
            towerBlocks = [];
            fallingBlocks = [];
            currentSum = 0;
            updateSumUI();
        }

        function updateSumUI() {
            const currentBox = document.getElementById('currentBox');
            document.getElementById('currentText').innerText = currentSum;
            
            if (currentSum > targetNumber) {
                currentBox.style.borderColor = '#EF4444'; 
                currentBox.style.color = '#EF4444';
            } else if (currentSum === targetNumber) {
                currentBox.style.borderColor = '#22C55E'; 
                currentBox.style.color = '#22C55E';
            } else {
                currentBox.style.borderColor = '#EAB308'; 
                currentBox.style.color = '#333';
            }
        }

        function spawnDust(x, y) {
            for(let i=0; i<15; i++) {
                particles.push(new Particle(x, y, 'dust'));
            }
        }

        function checkGameState() {
            if (currentSum === targetNumber) {
                SFX.win();
                triggerConfetti();
                showMessage(currentLevelIndex === LEVELS.length - 1 ? "Game Beaten!" : "Great Job!", '#22C55E');
                
                if (currentLevelIndex >= unlockedLevel) {
                    unlockedLevel = Math.min(currentLevelIndex + 1, LEVELS.length - 1);
                    localStorage.setItem('brainyBlocksLevel', unlockedLevel);
                }
                setTimeout(() => {
                    document.getElementById('messageOverlay').style.display = 'none';
                    if(gameState === 'game') enterMap();
                }, 3000);

            } else if (currentSum > targetNumber) {
                SFX.lose();
                shakeEndTime = Date.now() + 500; 
                showMessage("Oops! Too high!", '#EF4444');
                setTimeout(() => {
                    document.getElementById('messageOverlay').style.display = 'none';
                    clearTower();
                }, 1500);
            }
        }

        function showMessage(text, color) {
            const overlay = document.getElementById('messageOverlay');
            const msgBox = document.getElementById('messageText');
            msgBox.innerText = text;
            msgBox.style.color = color;
            overlay.style.display = 'flex';
        }

        function triggerConfetti() {
            let towerHeight = towerBlocks.reduce((sum, b) => sum + b.h, 0);
            let spawnY = canvas.height - 100 - (towerHeight * cameraScale);
            for(let i=0; i<100; i++) particles.push(new Particle(canvas.width/2, spawnY, 'confetti'));
        }

        // ==========================================
        // EVENT LISTENERS
        // ==========================================
        document.getElementById('btnPlay').addEventListener('click', () => { initAudio(); enterMap(); SFX.click(); });
        document.getElementById('btnBackMap').addEventListener('click', () => { SFX.click(); enterMap(); });
        document.getElementById('btnClear').addEventListener('click', clearTower);
        
        document.getElementById('btn100').addEventListener('click', () => dropBlock(100));
        document.getElementById('btn10').addEventListener('click', () => dropBlock(10));
        document.getElementById('btn1').addEventListener('click', () => dropBlock(1));

        window.addEventListener('keydown', (e) => {
            if (gameState !== 'game') return;
            if (e.key === '1') dropBlock(1);
            if (e.key === '2') dropBlock(10);
            if (e.key === '3') dropBlock(100);
            if (e.key === 'Backspace' || e.key === 'Escape') clearTower();
        });

        canvas.addEventListener('pointerdown', (e) => {
            if (gameState !== 'map') return;
            initAudio(); 
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            for (let i = 0; i < mapNodes.length; i++) {
                const node = mapNodes[i];
                const dist = Math.sqrt(Math.pow(mouseX - node.x, 2) + Math.pow(mouseY - node.y, 2));
                if (dist < 40 && i <= unlockedLevel) {
                    SFX.click();
                    enterGame(i);
                    break;
                }
            }
        });

        // ==========================================
        // RENDER LOOP
        // ==========================================
        function drawBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            clouds.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x, c.y, 40 * c.s, 0, Math.PI*2);
                ctx.arc(c.x + 30*c.s, c.y - 20*c.s, 50 * c.s, 0, Math.PI*2);
                ctx.arc(c.x + 70*c.s, c.y, 40 * c.s, 0, Math.PI*2);
                ctx.fill();
                c.x += c.vx;
                if(c.x > canvas.width + 100) c.x = -100;
            });
        }

        function drawMap() {
            drawBackground();
            ctx.beginPath();
            ctx.moveTo(mapNodes[0].x, mapNodes[0].y);
            for(let i=1; i<mapNodes.length; i++) ctx.lineTo(mapNodes[i].x, mapNodes[i].y);
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 15;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.stroke();

            for (let i = 0; i < mapNodes.length; i++) {
                const node = mapNodes[i];
                const isUnlocked = i <= unlockedLevel;
                const isCurrent = i === unlockedLevel;
                
                ctx.beginPath();
                ctx.arc(node.x, node.y, 25, 0, Math.PI*2);
                if (isCurrent) {
                    const pulse = Math.sin(Date.now() * 0.005) * 5;
                    ctx.fillStyle = '#4ADE80';
                    ctx.lineWidth = 6;
                    ctx.strokeStyle = '#ffffff';
                    ctx.arc(node.x, node.y, 25 + pulse, 0, Math.PI*2);
                } else if (isUnlocked) {
                    ctx.fillStyle = '#EAB308';
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#B45309';
                } else {
                    ctx.fillStyle = '#9CA3AF';
                    ctx.lineWidth = 4;
                    ctx.strokeStyle = '#6B7280';
                }
                ctx.fill(); ctx.stroke();

                ctx.fillStyle = isUnlocked ? '#fff' : '#e5e7eb';
                ctx.font = 'bold 20px Fredoka';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(i + 1, node.x, node.y + 2);
            }
        }

        function drawGame() {
            drawBackground();

            // Update Crane (Screen Space)
            crane.screenX += crane.dir * crane.speed;
            if (crane.screenX > canvas.width * 0.8) crane.dir = -1;
            if (crane.screenX < canvas.width * 0.2) crane.dir = 1;

            // Draw Ground
            const groundY = canvas.height - 100;
            ctx.fillStyle = '#4ADE80'; 
            ctx.fillRect(0, groundY, canvas.width, canvas.height - groundY);
            ctx.fillStyle = '#22C55E'; 
            ctx.fillRect(0, groundY, canvas.width, 15);

            // Dynamic Camera
            let totalHeight = towerBlocks.reduce((sum, b) => sum + b.h, 0);
            let availableHeight = canvas.height * 0.55; 
            let targetScale = totalHeight > availableHeight ? (availableHeight / totalHeight) : 1.0;
            cameraScale += (targetScale - cameraScale) * 0.1;

            // Screen Shake
            towerShakeX = Date.now() < shakeEndTime ? Math.sin(Date.now() * 0.05) * 15 : 0;

            // Draw UI Crane / Claw (Always at top, not scaled by tower zoom)
            ctx.save();
            ctx.fillStyle = '#475569'; // Dark Slate
            ctx.fillRect(crane.screenX - 25, 0, 50, 100);
            ctx.fillStyle = '#94A3B8';
            ctx.fillRect(crane.screenX - 40, 90, 80, 20); // The "Claw" bar
            // Draw a subtle wire to the top
            ctx.strokeStyle = '#333'; ctx.lineWidth = 4;
            ctx.beginPath(); ctx.moveTo(crane.screenX, 0); ctx.lineTo(crane.screenX, 100); ctx.stroke();
            ctx.restore();

            // --- TOWER SPACE ---
            ctx.save();
            ctx.translate(canvas.width / 2 + towerShakeX, groundY);
            ctx.scale(cameraScale, cameraScale);

            // Draw Stacked Blocks
            towerBlocks.forEach(block => block.draw(ctx));

            // Update & Draw Falling Blocks
            for (let i = fallingBlocks.length - 1; i >= 0; i--) {
                let b = fallingBlocks[i];
                b.vy += 2.0; // Gravity
                b.y += b.vy;
                
                // If it missed and is tumbling
                if (b.checked && !b.landed) {
                    b.x += b.vr * 10;
                    b.angle += b.vr;
                }

                // Check collision if it hasn't landed or missed yet
                let currentTowerY = -(towerBlocks.reduce((sum, bk) => sum + bk.h, 0));
                
                if (!b.checked && b.y >= currentTowerY) {
                    b.checked = true;
                    // Forgiving Tolerance: within 80 pixels of center snaps into place
                    let tolerance = 80; 
                    
                    if (Math.abs(b.x) <= tolerance) {
                        // SNAPPED / HIT!
                        b.x = 0;
                        b.y = currentTowerY;
                        b.landed = true;
                        b.angle = 0;
                        towerBlocks.push(b);
                        currentSum += b.val;
                        
                        SFX.thud();
                        spawnDust(0, currentTowerY);
                        updateSumUI();
                        checkGameState();
                        
                        fallingBlocks.splice(i, 1);
                        continue;
                    } else {
                        // MISSED!
                        SFX.miss();
                        b.vr = (b.x > 0 ? 1 : -1) * 0.15; // Spin away
                    }
                }

                b.draw(ctx);

                // Remove if falls far off screen
                if (b.y > 500 / cameraScale) {
                    fallingBlocks.splice(i, 1);
                }
            }
            ctx.restore();

            // Draw Particles (Overlay)
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.update();
                p.draw(ctx);
                if (p.y > canvas.height || p.life <= 0) particles.splice(i, 1);
            }
        }

        function mainLoop() {
            if (gameState === 'map') drawMap();
            else if (gameState === 'game') drawGame();
            else drawBackground();
            
            requestAnimationFrame(mainLoop);
        }

        mainLoop();
    </script>
</body>
</html>
