<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fraction Sweeper</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

        :root {
            --bg-color: #87CEEB;
            --panel-bg: rgba(255, 255, 255, 0.9);
            --tile-hidden: #3498db;
            --tile-hidden-hover: #2980b9;
            --tile-revealed: #ecf0f1;
            --text-color: #2c3e50;
            --accent-color: #e74c3c;
            --border-radius: 12px;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Nunito', sans-serif;
        }

        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #87CEEB 0%, #6dd5ed 100%);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            touch-action: manipulation;
            overflow-x: hidden;
        }

        h1 {
            margin: 15px 0 5px;
            font-size: 2.2rem;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            font-weight: 900;
            text-align: center;
        }

        #topbar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 500px;
            background: var(--panel-bg);
            padding: 10px 20px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            font-size: 1.2rem;
            font-weight: 700;
        }

        #game-container {
            position: relative;
            background: #bdc3c7;
            padding: 10px;
            border-radius: var(--border-radius);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.2), 0 8px 15px rgba(0,0,0,0.2);
            max-width: 95vw;
        }

        #board {
            display: grid;
            gap: 4px;
            background: #7f8c8d;
            border: 4px solid #95a5a6;
            border-radius: 8px;
            touch-action: none;
        }

        .tile {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: var(--tile-hidden);
            border-radius: 6px;
            box-shadow: inset -2px -2px 0 rgba(0,0,0,0.2), inset 2px 2px 0 rgba(255,255,255,0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            font-weight: 900;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
        }

        .tile:active:not(.revealed) {
            transform: scale(0.95);
        }

        .tile.revealed {
            background: var(--tile-revealed);
            box-shadow: inset 1px 1px 3px rgba(0,0,0,0.1);
            cursor: default;
            transform: none;
        }

        .tile.trap.revealed {
            background: #ff7675;
            font-size: 1.5rem;
        }

        .tile.flagged {
            font-size: 1.5rem;
        }

        /* Responsive font sizes based on grid */
        .board-easy .tile { font-size: 1.6rem; min-width: 40px; }
        .board-medium .tile { font-size: 1.3rem; min-width: 32px; }
        .board-hard .tile { font-size: 1.1rem; min-width: 26px; }

        /* Fraction specific styling */
        .fraction {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            line-height: 1;
        }
        .fraction .num { font-size: 0.9em; }
        .fraction .den { font-size: 0.9em; border-top: 2px solid var(--text-color); margin-top: 1px; padding-top: 1px; }
        .clue-0 { color: transparent; }
        .clue-helper {
            font-size: 0.45em;
            color: #7f8c8d;
            margin-left: 2px;
            position: absolute;
            bottom: 2px;
            right: 2px;
        }

        #controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
            max-width: 500px;
            width: 100%;
            padding: 0 10px;
        }

        button, select {
            padding: 10px 15px;
            font-size: 1rem;
            border: none;
            border-radius: 8px;
            background: white;
            color: var(--text-color);
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 4px 0 #bdc3c7;
            transition: all 0.1s;
            outline: none;
        }

        button:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #bdc3c7;
        }

        #toggleFlagBtn {
            background: #2ecc71;
            color: white;
            box-shadow: 0 4px 0 #27ae60;
            flex-grow: 1;
        }
        #toggleFlagBtn.flag-mode {
            background: #e74c3c;
            box-shadow: 0 4px 0 #c0392b;
        }

        #newGameBtn {
            background: #f39c12;
            color: white;
            box-shadow: 0 4px 0 #d35400;
        }

        #overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border-radius: var(--border-radius);
            z-index: 10;
            backdrop-filter: blur(3px);
            opacity: 1;
            transition: opacity 0.3s;
        }

        #overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #overlay h2 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 1px 1px 0px white;
        }

        #overlay button {
            font-size: 1.2rem;
            padding: 12px 24px;
            background: #3498db;
            color: white;
            box-shadow: 0 4px 0 #2980b9;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            #topbar { font-size: 1rem; padding: 8px 15px; }
            button, select { font-size: 0.9rem; padding: 8px 12px; }
        }
    </style>
</head>
<body>

    <h1>Fraction Sweeper</h1>
    
    <div id="topbar">
        <div id="mode-display">Easy Mode</div>
        <div id="flags">🚩 0 / 10</div>
        <div id="timer">⏱ 00:00</div>
    </div>

    <div id="game-container">
        <div id="board"></div>
        
        <div id="overlay" class="hidden">
            <h2 id="overlay-msg">You Win!</h2>
            <button onclick="initGame()">Play Again</button>
        </div>
    </div>

    <div id="controls">
        <button id="toggleFlagBtn" onclick="toggleMode()">Mode: 👆 Reveal</button>
        <select id="difficultySelect" onchange="initGame()">
            <option value="easy">Easy (8x8)</option>
            <option value="medium">Medium (10x10)</option>
            <option value="hard">Hard (12x12)</option>
        </select>
        <button id="helperToggleBtn" onclick="toggleHelper()">Helper: OFF</button>
        <button id="newGameBtn" onclick="initGame()">New Game</button>
    </div>

<script>
    // --- Audio System (Web Audio API) ---
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function playSound(type) {
        if (!audioCtx) {
            try { audioCtx = new AudioContext(); } catch (e) { return; }
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        const now = audioCtx.currentTime;
        
        if (type === 'reveal') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'flag') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.4, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'lose') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.5);
            gain.gain.setValueAtTime(0.5, now);
            gain.gain.linearRampToValueAtTime(0.01, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'win') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(500, now + 0.1);
            osc.frequency.setValueAtTime(600, now + 0.2);
            osc.frequency.setValueAtTime(800, now + 0.3);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.linearRampToValueAtTime(0, now + 0.6);
            osc.start(now);
            osc.stop(now + 0.6);
        }
    }

    // --- Game Configuration & Variables ---
    const difficulties = {
        easy: { rows: 8, cols: 8, traps: 10, name: "Easy Mode" },
        medium: { rows: 10, cols: 10, traps: 18, name: "Medium Mode" },
        hard: { rows: 12, cols: 12, traps: 28, name: "Hard Mode" }
    };

    let rows, cols, numTraps;
    let board = [];
    let gameOver = false;
    let flagsUsed = 0;
    let revealedSafe = 0;
    let mode = "reveal"; // "reveal" or "flag"
    let helperOn = false;
    let isFirstClick = true;
    
    let timerInterval = null;
    let secondsElapsed = 0;

    // --- Core Logic ---

    // Greatest Common Divisor for fraction reduction
    function gcd(a, b) {
        return b === 0 ? a : gcd(b, a % b);
    }

    function initGame() {
        const diffKey = document.getElementById("difficultySelect").value;
        const config = difficulties[diffKey];
        rows = config.rows;
        cols = config.cols;
        numTraps = config.traps;
        
        document.getElementById("mode-display").innerText = config.name;
        document.getElementById("overlay").classList.add("hidden");
        
        resetTimer();
        flagsUsed = 0;
        revealedSafe = 0;
        gameOver = false;
        isFirstClick = true;
        updateUI();
        
        // Setup Grid CSS
        const boardEl = document.getElementById("board");
        boardEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        boardEl.className = `board-${diffKey}`;
        
        // Generate initial empty board (traps placed on first click)
        createEmptyBoard();
        renderBoard();
    }

    function createEmptyBoard() {
        board = [];
        for (let r = 0; r < rows; r++) {
            let row = [];
            for (let c = 0; c < cols; c++) {
                row.push({
                    r: r, c: c,
                    isTrap: false, isRevealed: false, isFlagged: false,
                    trapCount: 0, neighborCount: 0,
                    clueNum: 0, clueDen: 1, clueText: "0"
                });
            }
            board.push(row);
        }
    }

    function generateBoard(safeR, safeC) {
        const diffKey = document.getElementById("difficultySelect").value;
        let acceptable = false;
        let attempts = 0;

        // Loop to satisfy "Easy Mode" fraction constraints
        while (!acceptable && attempts < 50) {
            attempts++;
            createEmptyBoard();
            
            // Place Traps randomly (avoid safeR, safeC)
            let trapsPlaced = 0;
            while (trapsPlaced < numTraps) {
                let r = Math.floor(Math.random() * rows);
                let c = Math.floor(Math.random() * cols);
                // Ensure 3x3 area around first click is safe
                if (!board[r][c].isTrap && Math.abs(r - safeR) > 1 && Math.abs(c - safeC) > 1) {
                    board[r][c].isTrap = true;
                    trapsPlaced++;
                }
            }

            // Calculate numbers and fractions
            let goodFractions = 0;
            let totalSafe = 0;

            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let tile = board[r][c];
                    if (tile.isTrap) continue;

                    let nTraps = 0;
                    let nNeighbors = 0;

                    // Check 8 neighbors
                    for (let dr = -1; dr <= 1; dr++) {
                        for (let dc = -1; dc <= 1; dc++) {
                            if (dr === 0 && dc === 0) continue;
                            let nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                                nNeighbors++;
                                if (board[nr][nc].isTrap) nTraps++;
                            }
                        }
                    }

                    tile.neighborCount = nNeighbors;
                    tile.trapCount = nTraps;

                    let g = gcd(nTraps, nNeighbors);
                    tile.clueNum = nTraps / g;
                    tile.clueDen = nNeighbors / g;

                    if (tile.clueNum === 0) {
                        tile.clueText = "0";
                        goodFractions++;
                    } else {
                        tile.clueText = `${tile.clueNum}/${tile.clueDen}`;
                        // For easy mode, check if denominator is nice (2, 4, 8)
                        if ([1, 2, 4, 8].includes(tile.clueDen)) {
                            goodFractions++;
                        }
                    }
                    totalSafe++;
                }
            }

            // Acceptance rule for Easy mode: >85% readable denominators
            if (diffKey === 'easy') {
                if ((goodFractions / totalSafe) >= 0.85) acceptable = true;
            } else {
                acceptable = true; // Medium/Hard accept any board
            }
        }
    }

    function renderBoard() {
        const boardEl = document.getElementById("board");
        boardEl.innerHTML = "";
        
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const tileObj = board[r][c];
                const btn = document.createElement("div");
                btn.className = "tile";
                btn.dataset.r = r;
                btn.dataset.c = c;
                
                // Events
                btn.addEventListener('click', (e) => handleInteraction(r, c));
                btn.addEventListener('contextmenu', (e) => {
                    e.preventDefault();
                    if (!gameOver) toggleFlag(r, c);
                });

                updateTileVisual(btn, tileObj);
                boardEl.appendChild(btn);
            }
        }
    }

    function updateTileVisual(el, tile) {
        if (!tile.isRevealed) {
            el.className = "tile" + (tile.isFlagged ? " flagged" : "");
            el.innerHTML = tile.isFlagged ? "🚩" : "";
        } else {
            el.className = "tile revealed";
            if (tile.isTrap) {
                el.classList.add("trap");
                el.innerHTML = "👾";
            } else {
                if (tile.clueNum === 0) {
                    el.innerHTML = ""; // Empty safe spot
                } else {
                    // Create fraction display
                    el.innerHTML = `
                        <div class="fraction">
                            <span class="num">${tile.clueNum}</span>
                            <span class="den">${tile.clueDen}</span>
                        </div>
                    `;
                    // Colors based on denominator to help visual distinction
                    if (tile.clueDen === 2) el.style.color = "#2980b9";
                    else if (tile.clueDen === 3) el.style.color = "#d35400";
                    else if (tile.clueDen === 4) el.style.color = "#27ae60";
                    else if (tile.clueDen === 6) el.style.color = "#8e44ad";
                    else if (tile.clueDen === 8) el.style.color = "#c0392b";
                    else el.style.color = "#2c3e50";

                    // Helper logic
                    if (helperOn) {
                        el.innerHTML += `<div class="clue-helper">(${tile.trapCount})</div>`;
                    }
                }
            }
        }
    }

    // --- Interaction Logic ---

    function handleInteraction(r, c) {
        if (gameOver) return;
        
        // Start audio context on first user interaction if not started
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();

        if (mode === "flag") {
            toggleFlag(r, c);
        } else {
            if (isFirstClick) {
                startTimer();
                generateBoard(r, c);
                isFirstClick = false;
                // Update all tiles because they were re-rendered as empty initially
                renderBoard(); 
            }
            revealTile(r, c);
        }
        updateUI();
    }

    function toggleFlag(r, c) {
        let tile = board[r][c];
        if (tile.isRevealed) return;
        
        if (!tile.isFlagged) {
            if (flagsUsed >= numTraps) return; // Prevent over-flagging
            tile.isFlagged = true;
            flagsUsed++;
            playSound('flag');
        } else {
            tile.isFlagged = false;
            flagsUsed--;
            playSound('flag');
        }
        
        const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
        updateTileVisual(el, tile);
    }

    function revealTile(r, c) {
        let tile = board[r][c];
        if (tile.isRevealed || tile.isFlagged) return;

        tile.isRevealed = true;
        const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);

        if (tile.isTrap) {
            updateTileVisual(el, tile);
            triggerLose();
            return;
        }

        playSound('reveal');
        revealedSafe++;
        updateTileVisual(el, tile);

        // Flood fill logic for "0"
        if (tile.trapCount === 0) {
            let queue = [{r, c}];
            
            while (queue.length > 0) {
                let current = queue.shift();
                
                for (let dr = -1; dr <= 1; dr++) {
                    for (let dc = -1; dc <= 1; dc++) {
                        if (dr === 0 && dc === 0) continue;
                        let nr = current.r + dr, nc = current.c + dc;
                        
                        if (nr >= 0 && nr < rows && nc >= 0 && nc < cols) {
                            let nTile = board[nr][nc];
                            if (!nTile.isRevealed && !nTile.isFlagged && !nTile.isTrap) {
                                nTile.isRevealed = true;
                                revealedSafe++;
                                const nEl = document.querySelector(`.tile[data-r="${nr}"][data-c="${nc}"]`);
                                updateTileVisual(nEl, nTile);
                                
                                if (nTile.trapCount === 0) {
                                    queue.push({r: nr, c: nc});
                                }
                            }
                        }
                    }
                }
            }
        }

        checkWin();
    }

    function checkWin() {
        if (revealedSafe === (rows * cols) - numTraps) {
            gameOver = true;
            stopTimer();
            playSound('win');
            
            // Auto flag remaining traps
            for (let r=0; r<rows; r++) {
                for (let c=0; c<cols; c++) {
                    if (board[r][c].isTrap && !board[r][c].isFlagged) {
                        board[r][c].isFlagged = true;
                        flagsUsed++;
                        const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
                        updateTileVisual(el, board[r][c]);
                    }
                }
            }
            updateUI();
            
            const overlay = document.getElementById("overlay");
            const msg = document.getElementById("overlay-msg");
            msg.innerText = "You Win! 🎉";
            msg.style.color = "#27ae60";
            overlay.classList.remove("hidden");
        }
    }

    function triggerLose() {
        gameOver = true;
        stopTimer();
        playSound('lose');
        
        // Reveal all traps
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                if (board[r][c].isTrap) {
                    board[r][c].isRevealed = true;
                    const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
                    updateTileVisual(el, board[r][c]);
                } else if (board[r][c].isFlagged && !board[r][c].isTrap) {
                    // Wrong flag
                    const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
                    el.innerHTML = "❌"; 
                }
            }
        }
        
        const overlay = document.getElementById("overlay");
        const msg = document.getElementById("overlay-msg");
        msg.innerText = "Oh no! A trap! 👾";
        msg.style.color = "#e74c3c";
        overlay.classList.remove("hidden");
    }

    // --- Controls & UI ---

    function toggleMode() {
        mode = mode === "reveal" ? "flag" : "reveal";
        const btn = document.getElementById("toggleFlagBtn");
        if (mode === "flag") {
            btn.innerText = "Mode: 🚩 Flag";
            btn.classList.add("flag-mode");
        } else {
            btn.innerText = "Mode: 👆 Reveal";
            btn.classList.remove("flag-mode");
        }
    }

    function toggleHelper() {
        helperOn = !helperOn;
        const btn = document.getElementById("helperToggleBtn");
        btn.innerText = helperOn ? "Helper: ON" : "Helper: OFF";
        btn.style.background = helperOn ? "#f1c40f" : "white";
        // re-render visually to add/remove little counts
        if(!isFirstClick) {
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    if (board[r][c].isRevealed) {
                        const el = document.querySelector(`.tile[data-r="${r}"][data-c="${c}"]`);
                        updateTileVisual(el, board[r][c]);
                    }
                }
            }
        }
    }

    function updateUI() {
        document.getElementById("flags").innerText = `🚩 ${flagsUsed} / ${numTraps}`;
    }

    // --- Timer ---

    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            secondsElapsed++;
            const mins = String(Math.floor(secondsElapsed / 60)).padStart(2, '0');
            const secs = String(secondsElapsed % 60).padStart(2, '0');
            document.getElementById("timer").innerText = `⏱ ${mins}:${secs}`;
        }, 1000);
    }

    function stopTimer() {
        if (timerInterval) clearInterval(timerInterval);
    }

    function resetTimer() {
        stopTimer();
        secondsElapsed = 0;
        document.getElementById("timer").innerText = `⏱ 00:00`;
    }

    // Start
    initGame();

</script>
</body>
</html>
