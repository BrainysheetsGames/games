    this.txtLives =this.add.text(210,H+26,'',{fontSize:'18px',color:'#ff8888',fontStyle:'bold'});
    this.txtWave  =this.add.text(294,H+26,'',{fontSize:'18px',color:'#aaddff',fontStyle:'bold'});
    this.txtScore =this.add.text(294,H+50,'',{fontSize:'8px',color:'#aaffaa'});

    // ── Tower buttons: 5 towers × 66px + 3px gap = 342px, range 370→712
    const keys=Object.keys(TOWER_DEF);
    const bW=66,bH=60,bGap=3,bStartX=370;
    this._towerBtns=[];
    keys.forEach((key,i)=>{
      const def=TOWER_DEF[key];
      const bx=bStartX+i*(bW+bGap), by=H+4;
      const bg=this.add.graphics();
      this.add.image(bx+12,by+30,`tower_${key}`).setScale(0.55);
      this.add.text(bx+27,by+7,def.name,{fontSize:'8px',color:'#ffffff',fontStyle:'bold'});
      this.add.text(bx+27,by+19,`$${def.cost}`,{fontSize:'10px',color:'#f0a500',fontStyle:'bold'});
      this.add.text(bx+3,by+47,towerStats(key,1).desc.substring(0,13),{fontSize:'7px',color:'#777799'});
      const draw=(sel)=>{
        bg.clear();bg.fillStyle(sel?0x2a2a5a:0x14142e,1);bg.fillRoundedRect(bx,by,bW,bH,5);
        bg.lineStyle(2,sel?0xf0a500:0x333366);bg.strokeRoundedRect(bx,by,bW,bH,5);
      };
      draw(false);
      bg.setInteractive(new Phaser.Geom.Rectangle(bx,by,bW,bH),Phaser.Geom.Rectangle.Contains);
      bg.on('pointerdown',()=>{ this.selectedTowerKey=(this.selectedTowerKey===key)?null:key; this._deselectPlacedTower(); this._refreshTowerBar(); });
      bg.on('pointerover',()=>{ if(this.selectedTowerKey!==key){bg.clear();bg.fillStyle(0x1e1e44,1);bg.fillRoundedRect(bx,by,bW,bH,5);bg.lineStyle(2,0x6666aa);bg.strokeRoundedRect(bx,by,bW,bH,5);}});
      bg.on('pointerout', ()=>draw(this.selectedTowerKey===key));
      bg._key=key;bg._draw=draw;this._towerBtns.push(bg);
    });

    // ── 📚 Study btn  716→775 ─────────────────────────────────
    const sb2=this.add.graphics();
    const ds=(h)=>{ sb2.clear();sb2.fillStyle(h?0x1a3300:0x0d1a00,1);sb2.fillRoundedRect(716,H+4,59,62,5);sb2.lineStyle(2,h?0x88ff44:0x447700);sb2.strokeRoundedRect(716,H+4,59,62,5); };
    ds(false);
    this.add.text(745,H+13,'📚',{fontSize:'20px'}).setOrigin(0.5,0).setDepth(32);
    this.add.text(745,H+39,'STUDY',{fontSize:'8px',color:'#66cc22',fontStyle:'bold'}).setOrigin(0.5,0).setDepth(32);
    this.add.text(745,H+50,'+GOLD',{fontSize:'7px',color:'#448800'}).setOrigin(0.5,0).setDepth(32);
    sb2.setInteractive(new Phaser.Geom.Rectangle(716,H+4,59,62),Phaser.Geom.Rectangle.Contains);
    sb2.on('pointerover',()=>ds(true)); sb2.on('pointerout',()=>ds(false));
    sb2.on('pointerdown',()=>{ if(!this.gameOver) this._startPracticeQuestion(); });

    // ── ⚡ Lightning btn  779→838 ─────────────────────────────
    const lhx=779, lhy=H+4;
    this._lightningBg=this.add.graphics().setDepth(30);
    this._lightningLbl=this.add.text(lhx+29,lhy+22,'⚡',{fontSize:'22px'}).setOrigin(0.5).setDepth(31);
    this._lightningCount=this.add.text(lhx+45,lhy+7,'×0',{fontSize:'10px',color:'#888888',fontStyle:'bold'}).setDepth(31);
    this._lightningHint=this.add.text(lhx+29,lhy+49,'STRIKE',{fontSize:'7px',color:'#555577'}).setOrigin(0.5).setDepth(31);
    this._drawLightningBtn(false);
    this._lightningBg.setInteractive(new Phaser.Geom.Rectangle(lhx,lhy,59,62),Phaser.Geom.Rectangle.Contains);
    this._lightningBg.on('pointerover',()=>{ if(this._lightningCharges>0) this._drawLightningBtn(true); });
    this._lightningBg.on('pointerout',()=>this._drawLightningBtn(false));
    this._lightningBg.on('pointerdown',()=>{ if(this._lightningCharges>0&&!this.gameOver) this._fireLightning(); });

    // ── ▶ Wave btn  842→862 (top half) ───────────────────────
    const wb=this.add.graphics();
    const dw=(h)=>{ wb.clear();wb.fillStyle(h?0x553300:0x2a1600,1);wb.fillRoundedRect(842,H+4,20,29,3);wb.lineStyle(2,h?0xffaa00:0xf0a500);wb.strokeRoundedRect(842,H+4,20,29,3); };
    dw(false);
    this.add.text(852,H+18,'▶',{fontSize:'11px',color:'#f0a500',fontStyle:'bold'}).setOrigin(0.5).setDepth(32);
    wb.setInteractive(new Phaser.Geom.Rectangle(842,H+4,20,29),Phaser.Geom.Rectangle.Contains);
    wb.on('pointerover',()=>dw(true)); wb.on('pointerout',()=>dw(false));
    wb.on('pointerdown',()=>{ if(!this.waveActive&&!this.gameOver) this._startWave(); });

    // ── ⏩ Speed toggle  842→862 (bottom half) ───────────────
    this._speedFast = false;
    this._speedBg = this.add.graphics().setDepth(30);
    this._speedLbl = this.add.text(852,H+51,'1×',{fontSize:'10px',color:'#888888',fontStyle:'bold'}).setOrigin(0.5).setDepth(32);
    this._drawSpeedBtn(false);
    this._speedBg.setInteractive(new Phaser.Geom.Rectangle(842,H+37,20,29),Phaser.Geom.Rectangle.Contains);
    this._speedBg.on('pointerover',()=>this._drawSpeedBtn(true));
    this._speedBg.on('pointerout', ()=>this._drawSpeedBtn(false));
    this._speedBg.on('pointerdown',()=>this._toggleSpeed());

    this._refreshHUD();
  }

  _drawSpeedBtn(hover) {
    const fast = this._speedFast;
    this._speedBg.clear();
    this._speedBg.fillStyle(fast ? (hover?0x334400:0x223300) : (hover?0x222200:0x0d0d00), 1);
    this._speedBg.fillRoundedRect(842,H+37,20,29,3);
    this._speedBg.lineStyle(2, fast ? 0xccff00 : 0x444422);
    this._speedBg.strokeRoundedRect(842,H+37,20,29,3);
    this._speedLbl.setText(fast ? '2×' : '1×');
    this._speedLbl.setStyle({color: fast ? '#ccff00' : '#666644'});
  }

  _toggleSpeed() {
    this._speedFast = !this._speedFast;
    this.time.timeScale = this._speedFast ? 2 : 1;
    this.physics && this.physics.world && (this.physics.world.timeScale = this._speedFast ? 0.5 : 1);
    this._drawSpeedBtn(false);
    this._flash(this._speedFast ? '⏩  2× Speed!' : '▶  Normal Speed', this._speedFast ? 0xccff00 : 0xaaaaaa);
  }

  _refreshHUD() {
    this.txtGold.setText(`${this.gold}`);
    this.txtLives.setText(`${this.lives}`);
    this.txtWave.setText(`${this.wave}/${WAVE_SCRIPTS.length}`);
    this.txtScore.setText(`Score: ${this.score}`);
  }

  _refreshTowerBar(){ this._towerBtns.forEach(b=>b._draw(b._key===this.selectedTowerKey)); }

  _buildTowerPanel() {
    this.panel=this.add.container(0,0).setVisible(false);
    const pb=this.add.graphics();
    pb.fillStyle(0x0a0a22,0.96);pb.fillRoundedRect(0,0,210,222,8);
    pb.lineStyle(2,0xf0a500);pb.strokeRoundedRect(0,0,210,222,8);
    this.panel.add(pb);
    this.panelIcon =this.add.image(30,35,'tower_archer').setScale(0.9);
    this.panelName =this.add.text(60,12,'',{fontSize:'14px',color:'#ffffff',fontStyle:'bold'});
    this.panelLevel=this.add.text(60,30,'',{fontSize:'11px',color:'#f0a500'});
    this.panelStats=this.add.text(10,60,'',{fontSize:'10px',color:'#aaaacc',lineSpacing:4});
    this.panelDesc =this.add.text(10,130,'',{fontSize:'9px',color:'#888899',wordWrap:{width:190}});

    const ub=this.add.graphics();
    ub.fillStyle(0x224422,1);ub.fillRoundedRect(8,157,90,28,5);ub.lineStyle(2,0x44aa44);ub.strokeRoundedRect(8,157,90,28,5);
    this.panelUpgLabel=this.add.text(53,171,'UPGRADE',{fontSize:'11px',color:'#44ff44',fontStyle:'bold'}).setOrigin(0.5);
    ub.setInteractive(new Phaser.Geom.Rectangle(8,157,90,28),Phaser.Geom.Rectangle.Contains);
    ub.on('pointerdown',()=>this._upgradeTower());
    ub.on('pointerover',()=>{ub.clear();ub.fillStyle(0x336633,1);ub.fillRoundedRect(8,157,90,28,5);ub.lineStyle(2,0x66cc66);ub.strokeRoundedRect(8,157,90,28,5);});
    ub.on('pointerout', ()=>{ub.clear();ub.fillStyle(0x224422,1);ub.fillRoundedRect(8,157,90,28,5);ub.lineStyle(2,0x44aa44);ub.strokeRoundedRect(8,157,90,28,5);});
    this.panelUpgCost=this.add.text(53,185,'',{fontSize:'9px',color:'#aaffaa'}).setOrigin(0.5);

    const sb=this.add.graphics();
    sb.fillStyle(0x442222,1);sb.fillRoundedRect(105,157,95,28,5);sb.lineStyle(2,0xaa4444);sb.strokeRoundedRect(105,157,95,28,5);
    this.panelSellLabel=this.add.text(152,171,'SELL',{fontSize:'11px',color:'#ff6666',fontStyle:'bold'}).setOrigin(0.5);
    sb.setInteractive(new Phaser.Geom.Rectangle(105,157,95,28),Phaser.Geom.Rectangle.Contains);
    sb.on('pointerdown',()=>this._sellTower());
    sb.on('pointerover',()=>{sb.clear();sb.fillStyle(0x663333,1);sb.fillRoundedRect(105,157,95,28,5);sb.lineStyle(2,0xcc6666);sb.strokeRoundedRect(105,157,95,28,5);});
    sb.on('pointerout', ()=>{sb.clear();sb.fillStyle(0x442222,1);sb.fillRoundedRect(105,157,95,28,5);sb.lineStyle(2,0xaa4444);sb.strokeRoundedRect(105,157,95,28,5);});
    this.panelSellVal=this.add.text(152,185,'',{fontSize:'9px',color:'#ffaaaa'}).setOrigin(0.5);

    const cb=this.add.text(195,5,'✕',{fontSize:'14px',color:'#888',fontStyle:'bold'}).setInteractive({useHandCursor:true});
    cb.on('pointerdown',()=>this._deselectAll());cb.on('pointerover',()=>cb.setStyle({color:'#fff'}));cb.on('pointerout',()=>cb.setStyle({color:'#888'}));
    this.panel.add([this.panelIcon,this.panelName,this.panelLevel,this.panelStats,this.panelDesc,
                    ub,this.panelUpgLabel,this.panelUpgCost,sb,this.panelSellLabel,this.panelSellVal,cb]);
    this.panel.setDepth(100);
  }

  _selectPlacedTower(tower) {
    this._deselectPlacedTower();
    this.selectedPlacedTower=tower;
    tower.rangeCircle?.setVisible(true);
    let px=tower.x+30,py=tower.y-120;
    if(px+220>W) px=tower.x-230;
    if(py<0) py=10;if(py+240>H) py=H-240;
    this.panel.setPosition(px,py).setVisible(true);
    this._refreshPanel(tower);
    SFX.menuClick();
  }

  _refreshPanel(tower) {
    if(!tower) return;
    const def=TOWER_DEF[tower.key], lvl=tower.level;
    const stats=towerStats(tower.key, lvl);
    const sell=Math.floor(tower.totalSpent/2);
    const tk=`tower_${tower.key}${lvl>1?'_'+lvl:''}`;
    if(this.textures.exists(tk)) this.panelIcon.setTexture(tk);
    this.panelName.setText(def.name);
    this.panelLevel.setText(`Level ${lvl} / 5`);
    if(tower.key==='barracks'){
      const active=this.soldiers.filter(s=>s.tower===tower&&s.alive).length;
      this.panelStats.setText(`🪖  Soldiers: ${active}/1\n🛡️  Blocks path completely\n⏱  Respawn: ${(stats.respawn/1000).toFixed(0)}s`);
    } else {
      this.panelStats.setText(`⚔  Damage: ${stats.damage}\n🎯  Range:  ${stats.range.toFixed(1)} tiles\n⏱  Rate:   ${(1000/stats.rate).toFixed(1)}/s`);
    }
    this.panelDesc.setText(stats.desc);
    if(lvl<5){
      const cost=upgradeCost(tower.key, tower.totalSpent);
      this.panelUpgLabel.setText('UPGRADE');
      this.panelUpgCost.setText(`Cost: $${cost}`);
      this.panelUpgLabel.setStyle({color:this.gold>=cost?'#44ff44':'#888888'});
    } else {
      this.panelUpgLabel.setText('MAX LVL');
      this.panelUpgCost.setText('');
    }
    this.panelSellVal.setText(`+$${sell}`);
  }

  _deselectPlacedTower() {
    if(this.selectedPlacedTower){ this.selectedPlacedTower.rangeCircle?.setVisible(false);this.selectedPlacedTower=null; }
    this.panel.setVisible(false);
  }
  _deselectAll(){ this.selectedTowerKey=null;this._refreshTowerBar();this._deselectPlacedTower();this._deselectHero(); }

  _placeTower(col,row) {
    const key=`${col},${row}`;
    if(this.pathSet.has(key)||this.occupiedTiles.has(key)) return;
    if(col<0||col>=COLS||row<0||row>=ROWS) return;
    const def=TOWER_DEF[this.selectedTowerKey];
    if(this.gold<def.cost){ SFX.noGold();this._flash('Not enough gold!',0xff4444);return; }
    this.gold-=def.cost; this.occupiedTiles.add(key);
    const x=col*TILE+TILE/2, y=row*TILE+TILE/2;
    const stats=towerStats(this.selectedTowerKey, 1);
    const sprite=this.add.image(x,y,`tower_${this.selectedTowerKey}`).setDepth(5);
    const rc=this.add.graphics().setDepth(4).setVisible(false);
    rc.lineStyle(1,stats.color,0.4); rc.strokeCircle(x,y,stats.range*TILE);
    rc.fillStyle(stats.color,0.05); rc.fillCircle(x,y,stats.range*TILE);
    const badge=this.add.text(x+12,y-18,'L1',{fontSize:'9px',color:'#fff',fontStyle:'bold',stroke:'#000',strokeThickness:2}).setDepth(6);
    this.towers.push({col,row,x,y,key:this.selectedTowerKey,level:1,totalSpent:def.cost,
      range:stats.range,damage:stats.damage,rate:stats.rate,color:stats.color,
      sprite,rangeCircle:rc,badge,lastFired:0});
    if(this.tileSprites[key]) this.tileSprites[key].setTint(0xbbbbbb);
    SFX.placeTower(); this._refreshHUD(); this._flash(`${def.name} placed!`,stats.color);
    const newTower=this.towers[this.towers.length-1];
    if(this.selectedTowerKey==='barracks') this._spawnSoldiersForBarracks(newTower);
  }

  _upgradeTower() {
    const t=this.selectedPlacedTower; if(!t||t.level>=5) return;
    const cost=upgradeCost(t.key, t.totalSpent);
    if(this.gold<cost){ SFX.noGold(); this._flash('Not enough gold!',0xff4444); return; }
    this.gold-=cost; t.totalSpent+=cost; t.level++;
    const s=towerStats(t.key, t.level);
    t.range=s.range; t.damage=s.damage; t.rate=s.rate; t.color=s.color;
    // Use levelled texture if it exists, else stay on base
    const lvlTextures={2:'_2',3:'_3',4:'_4',5:'_5'};
    const tk=`tower_${t.key}${lvlTextures[t.level]||''}`;
    if(this.textures.exists(tk)) t.sprite.setTexture(tk);
    const badgeColor=t.level===5?'#ffcc00':t.level>=3?'#ffaa44':'#fff';
    t.badge.setText(`L${t.level}`).setStyle({color:badgeColor});
    t.rangeCircle.clear();
    t.rangeCircle.lineStyle(1,s.color,0.4); t.rangeCircle.strokeCircle(t.x,t.y,s.range*TILE);
    t.rangeCircle.fillStyle(s.color,0.05); t.rangeCircle.fillCircle(t.x,t.y,s.range*TILE);
    this._particles(t.x,t.y,s.color,12);
    SFX.upgrade(); this._flash(`${TOWER_DEF[t.key].name} → Lv${t.level}!`,s.color);
    this._refreshHUD(); this._refreshPanel(t);
    if(t.key==='barracks') this._spawnSoldiersForBarracks(t);
  }

  _sellTower() {
    const t=this.selectedPlacedTower; if(!t) return;
    const sell=Math.floor(t.totalSpent/2);
    this.gold+=sell;
    const key=`${t.col},${t.row}`; this.occupiedTiles.delete(key);
    if(this.tileSprites[key]) this.tileSprites[key].clearTint();
    t.sprite.destroy(); t.rangeCircle.destroy(); t.badge.destroy();
    this.towers=this.towers.filter(x=>x!==t);
    this.soldiers=this.soldiers.filter(s=>{
      if(s.tower!==t) return true;
      try{s.sprite.destroy();s.hpBar.destroy();s.hpBarBg.destroy();}catch(e){}
      return false;
    });
    this._deselectPlacedTower(); SFX.sell(); this._flash(`Sold for $${sell}`,0xffcc00); this._refreshHUD();
  }

  _startWave() {
    if(this.waveActive||this.gameOver) return;
    if(this.wave>=WAVE_SCRIPTS.length){ this._endGame(true);return; }
    // Always show a question before each wave
    this._showQuestion(() => this._launchWave());
  }

  _showQuestion(afterFn) {
    this._questionPending = true;
    // Pass scene reference so modal can call back into game
    const modalScene = { add: this.add, tweens: this.tweens, time: this.time, gameScene: this };
    const modal = new QuestionModal(modalScene, this._qm);
    this._qModal = modal;
    modal.show(() => {
      this._questionPending = false;
      this._qModal = null;
      afterFn();
    });
  }

  _startPracticeQuestion() {
    if (this._questionPending) return;
    this._questionPending = true;
    this._gamePaused = true;
    this._pausedAt = this.time.now;

    // Dim overlay + pause label
    this._pauseOverlay = this.add.graphics().setDepth(195);
    this._pauseOverlay.fillStyle(0x000000, 0.45);
    this._pauseOverlay.fillRect(0, 0, W, H);
    this._pauseLabel = this.add.text(W/2, H/2 - 130, '⏸  STUDY BREAK  —  Earn Gold!', {
      fontSize:'15px', color:'#88ff44', fontStyle:'bold', stroke:'#000', strokeThickness:3
    }).setOrigin(0.5).setDepth(196);

    const modalScene = { add: this.add, tweens: this.tweens, time: this.time, gameScene: this };
    const modal = new QuestionModal(modalScene, this._qm);
    this._qModal = modal;
    modal.show(() => {
      this._questionPending = false;
      this._gamePaused = false;
      this._qModal = null;
      if (this._pauseOverlay) { this._pauseOverlay.destroy(); this._pauseOverlay = null; }
      if (this._pauseLabel)   { this._pauseLabel.destroy();   this._pauseLabel = null; }
      // Compensate timers so game doesn't skip forward
      const dt = this.time.now - this._pausedAt;
      this.enemies.forEach(e => { if (e.slowTimer > 0) e.slowTimer = Math.max(0, e.slowTimer - dt); });
      this.towers.forEach(t => { t.lastFired += dt; });
      if (this._hero) this._hero.lastAttack += dt;
    });
  }

  _launchWave() {
    this.wave++;this.waveActive=true;this._refreshHUD();
    SFX.waveStart();this._flash(`⚔  Wave ${this.wave} incoming!`,0xff8800);
    const script=WAVE_SCRIPTS[this.wave-1];
    this.spawnQueue=[];
    script.forEach(group=>{ for(let i=0;i<group.count;i++) this.spawnQueue.push({type:group.type,delay:group.delay*i+this.spawnQueue.length*18}); });
    this.spawnQueue.sort((a,b)=>a.delay-b.delay);
    this._processSpawn();
  }

  _processSpawn() {
    if(this.spawnQueue.length===0) return;
    const n=this.spawnQueue.shift();
    this.time.delayedCall(Math.max(n.delay,50),()=>{ this._spawnEnemy(n.type);this._processSpawn(); });
  }

  _spawnEnemy(type) {
    const ed=ENEMY_DEF[type], ws=1+(this.wave-1)*0.25;
    const mapDef = this._mapDef;
    const hp=Math.round(ed.hpMul*50*ws*mapDef.waveHpMul);
    const speed=ed.speedMul*75*mapDef.waveSpeedMul;
    const s=this.pathPixels[0];
    const sprite=this.add.image(s.x,s.y,`enemy_${type}`).setDepth(10);
    const hbb=this.add.graphics().setDepth(11),hb=this.add.graphics().setDepth(11);
    this.enemies.push({type,x:s.x,y:s.y,hp,maxHp:hp,speed,pathIndex:0,alive:true,sprite,hpBarBg:hbb,hpBar:hb,reward:ed.reward,slowTimer:0,size:ed.size});
  }

  _fireBullet(tower,enemy) {
    const stats=towerStats(tower.key, tower.level);
    const b=this.add.image(tower.x,tower.y,`bullet_${stats.bullet}`).setDepth(15);
    b.setRotation(Phaser.Math.Angle.Between(tower.x,tower.y,enemy.x,enemy.y));
    this.bullets.push({x:tower.x,y:tower.y,target:enemy,damage:tower.damage,speed:380,sprite:b,alive:true,
      applySlow:tower.key==='mage',chain:tower.key==='mage'&&tower.level>=3,towerKey:tower.key});
    tower.lastFired=this.time.now;
    switch(tower.key){case'archer':SFX.shootArrow();break;case'cannon':SFX.shootCannon();break;case'mage':SFX.shootMage();break;case'sniper':SFX.shootSniper();break;}
  }

  _particles(x,y,color,n) {
    for(let i=0;i<n;i++){
      const p=this.add.image(x,y,'particle').setDepth(20).setTint(color);
      const a=(Math.PI*2/n)*i+Math.random()*0.4,spd=40+Math.random()*60;
      this.tweens.add({targets:p,x:x+Math.cos(a)*spd,y:y+Math.sin(a)*spd,alpha:0,scaleX:0.5,scaleY:0.5,duration:400+Math.random()*300,onComplete:()=>p.destroy()});
    }
  }

  update(time,delta) {
    if(this.gameOver) return;
    if(this._gamePaused) return; // frozen during practice question
    const dt=delta/1000;

    // Hero
    this._heroAttack(time);
    if(this._hero&&this._hero.alive) this._updateHeroHpBar();
    if(this._hero&&this._hero.alive&&this._hero.selected) this._refreshHeroPanel();

    // Reset blocked flags first, then soldiers will re-set them
    this.enemies.forEach(e=>{ if(e.alive) e.blocked=false; });

    // Soldiers (sets e.blocked=true for enemies in contact)
    this._updateSoldiers(delta);

    for(let i=this.enemies.length-1;i>=0;i--){
      const e=this.enemies[i];
      if(!e.alive){this.enemies.splice(i,1);continue;}
      const tgt=this.pathPixels[e.pathIndex+1];
      if(!tgt){
        e.alive=false;e.sprite.destroy();e.hpBar.destroy();e.hpBarBg.destroy();
        this.lives=Math.max(0,this.lives-1);SFX.loseLife();this._refreshHUD();this._flash('-1 Life!',0xff2222);
        if(this.lives<=0) this._endGame(false);continue;
      }
      const dx=tgt.x-e.x,dy=tgt.y-e.y,dist=Math.sqrt(dx*dx+dy*dy);
      const sl=e.slowTimer>0?0.5:1;if(e.slowTimer>0) e.slowTimer-=delta;
      if(!e.blocked){
        const mv=e.speed*sl*dt;
        if(dist<=mv){e.x=tgt.x;e.y=tgt.y;e.pathIndex++;}else{e.x+=dx/dist*mv;e.y+=dy/dist*mv;}
      }
      e.sprite.setPosition(e.x,e.y);if(dx!==0) e.sprite.setFlipX(dx<0);
      e.sprite.setTint(e.slowTimer>0?0x8888ff:0xffffff);
      const bw=e.size*2+6;
      e.hpBarBg.clear();e.hpBarBg.fillStyle(0x220000,0.9);e.hpBarBg.fillRect(e.x-bw/2,e.y-e.size-7,bw,4);
      e.hpBar.clear();const pct=e.hp/e.maxHp;
      e.hpBar.fillStyle(pct>0.6?0x33ff33:pct>0.3?0xffaa00:0xff2222,1);e.hpBar.fillRect(e.x-bw/2,e.y-e.size-7,bw*pct,4);
    }

    this.towers.forEach(tw=>{
      if(tw.key==='barracks') return; // barracks uses soldiers, not bullets
      if(time-tw.lastFired<tw.rate) return;
      let best=null,bp=-1;
      this.enemies.forEach(e=>{ if(!e.alive) return;const dx=e.x-tw.x,dy=e.y-tw.y;if(Math.sqrt(dx*dx+dy*dy)>tw.range*TILE) return;if(e.pathIndex>bp){bp=e.pathIndex;best=e;} });
      if(best) this._fireBullet(tw,best);
    });

    for(let i=this.bullets.length-1;i>=0;i--){
      const b=this.bullets[i];
      if(!b.alive){this.bullets.splice(i,1);continue;}
      if(!b.target.alive){b.alive=false;b.sprite.destroy();continue;}
      const dx=b.target.x-b.x,dy=b.target.y-b.y,dist=Math.sqrt(dx*dx+dy*dy),mv=b.speed*dt;
      if(dist<=mv+5){
        b.target.hp-=b.damage;if(b.applySlow) b.target.slowTimer=2000;
        b.alive=false;b.sprite.destroy();
        this._particles(b.target.x,b.target.y,0xffaa44,4);
        if(b.chain){ let ch=0;this.enemies.forEach(e=>{ if(e===b.target||!e.alive||ch>=2) return;const cdx=e.x-b.target.x,cdy=e.y-b.target.y;if(Math.sqrt(cdx*cdx+cdy*cdy)<80){e.hp-=b.damage*0.5;e.slowTimer=1500;ch++;} }); }
        if(b.target.hp<=0&&b.target.alive){
          b.target.alive=false;b.target.sprite.destroy();b.target.hpBar.destroy();b.target.hpBarBg.destroy();
          this._particles(b.target.x,b.target.y,0xff8800,10);SFX.enemyDie();
          this.score+=b.target.reward*3;this._refreshHUD();
        }
      } else {
        b.x+=dx/dist*mv;b.y+=dy/dist*mv;b.sprite.setPosition(b.x,b.y);b.sprite.setRotation(Math.atan2(dy,dx));
      }
    }

    if(this.waveActive&&this.spawnQueue.length===0&&this.enemies.length===0){
      this.waveActive=false;this._refreshHUD();
      SFX.waveClear();this._flash(`✔  Wave ${this.wave} cleared!`,0xf0a500);
      if(this.wave>=WAVE_SCRIPTS.length) this.time.delayedCall(1500,()=>this._endGame(true));
    }
    if(this.selectedPlacedTower&&this.panel.visible) this._refreshPanel(this.selectedPlacedTower);
  }

  // ── Question rewards & powers ──────────────────────────────────────────────
  _awardQuestion(correct, goldBonus, streak) {
    if (correct) {
      this.gold += goldBonus;
      this.score += goldBonus * 2;
      // Every 2 correct answers = 1 lightning charge (max 3)
      if (this._qm.totalCorrect % 2 === 0 && this._lightningCharges < 3) {
        this._lightningCharges++;
        this._drawLightningBtn(false);
        this._flash('⚡ Lightning Strike charged!', 0x88ccff);
      }
      // Hero rewards: heal on correct answer, charge power on streak
      if (this._hero && this._hero.alive) {
        this._heroHeal(20);
        if (streak > 0 && streak % 2 === 0 && !this._hero.powerCharged) {
          this._heroChargePower();
        }
      }
      this._refreshHUD();
      this._updateStreakHUD(streak);
      // Gold shower particle burst at center
      for (let i = 0; i < 16; i++) {
        const p = this.add.image(
          Phaser.Math.Between(W*0.3, W*0.7),
          Phaser.Math.Between(H*0.2, H*0.6),
          'particle'
        ).setDepth(25).setTint(0xffcc00).setScale(1.5);
        this.tweens.add({
          targets: p, y: p.y + Phaser.Math.Between(40, 100),
          alpha: 0, duration: Phaser.Math.Between(600, 1200),
          delay: Phaser.Math.Between(0, 400),
          onComplete: () => p.destroy()
        });
      }
    } else {
      // Wrong: small gold penalty
      const penalty = 10;
      this.gold = Math.max(0, this.gold - penalty);
      this._refreshHUD();
      this._updateStreakHUD(0);
    }
  }

  _triggerStreakPower(streak) {
    if (streak === 3) this._freezeAllEnemies(3000);
    else if (streak === 6) { this._freezeAllEnemies(2000); this.gold += 50; this._refreshHUD(); }
    else if (streak >= 9) { this._freezeAllEnemies(4000); this.gold += 100; this.lives = Math.min(this.lives + 2, 20); this._refreshHUD(); }

    const msgs = {3:'❄️  FREEZE! All enemies slowed!', 6:'💥  POWER SURGE! +$50 gold!', 9:'🌟  LEGENDARY! +$100 & +2 lives!'};
    const msgText = msgs[streak] || msgs[9];
    const pt = this.add.text(W/2, H/2 + 40, msgText, {
      fontSize:'22px', color:'#00ccff', fontStyle:'bold',
      stroke:'#003355', strokeThickness:5
    }).setOrigin(0.5).setDepth(55);
    this.tweens.add({ targets:pt, y:H/2-20, alpha:0, duration:2500, ease:'Power2', onComplete:()=>pt.destroy() });
  }

  _freezeAllEnemies(duration) {
    this._freezeActive = true;
    this.enemies.forEach(e => { e.slowTimer = Math.max(e.slowTimer, duration); });
    this.time.delayedCall(duration, () => { this._freezeActive = false; });
    // Blue screen flash
    const flash = this.add.graphics().setDepth(19);
    flash.fillStyle(0x0088ff, 0.18);
    flash.fillRect(0, 0, W, H);
    this.tweens.add({ targets:flash, alpha:0, duration:800, onComplete:()=>flash.destroy() });
  }

  // ── Hero System ───────────────────────────────────────────────────────────
  _spawnHero() {
    if (this._hero) {
      try { this._hero.sprite.destroy(); this._hero.hpBarBg.destroy(); this._hero.hpBar.destroy(); this._hero.rangeCircle.destroy(); } catch(e){}
    }
    const mapDef = this._mapDef;
    const [sc, sr] = mapDef.startTile;
    // Place hero one tile above or beside the start tile (on grass)
    const startCandidates = [
      [sc, sr - 1], [sc - 1, sr], [sc, sr + 1], [sc + 1, sr]
    ].filter(([c,r]) => c>=0&&c<COLS&&r>=0&&r<ROWS && !this.pathSet.has(`${c},${r}`) && !this.occupiedTiles.has(`${c},${r}`));
    const [hc, hr] = startCandidates.length ? startCandidates[0] : [sc, Math.max(0, sr-1)];
    const hx = hc*TILE+TILE/2, hy = hr*TILE+TILE/2;

    const sprite = this.add.image(hx, hy, 'hero').setDepth(12);
    const hpBarBg = this.add.graphics().setDepth(13);
    const hpBar = this.add.graphics().setDepth(13);
    const rangeCircle = this.add.graphics().setDepth(3).setVisible(false);
    rangeCircle.lineStyle(1, 0xffcc44, 0.35); rangeCircle.strokeCircle(hx, hy, 2.5*TILE);
    rangeCircle.fillStyle(0xffcc44, 0.03); rangeCircle.fillCircle(hx, hy, 2.5*TILE);

    this._hero = {
      x: hx, y: hy, col: hc, row: hr,
      hp: 120, maxHp: 120, alive: true,
      range: 2.5*TILE, damage: 25,
      rate: 1200, lastAttack: 0,
      sprite, hpBarBg, hpBar, rangeCircle,
      selected: false, moving: false,
      powerCharged: false,
    };
    this._updateHeroHpBar();

    // Hero is clickable to select / right-click to move (handled by pointer)
    sprite.setInteractive();
    sprite.on('pointerdown', (p) => { p.stopPropagation(); this._selectHero(); });
    sprite.on('pointerover', () => { if(!this._hero.selected) sprite.setTint(0xffffcc); });
    sprite.on('pointerout',  () => { if(!this._hero.selected) sprite.clearTint(); });
  }

  _showHeroTutorial() {
    if (!this._hero || this._heroTutorialSeen) return;
    this._heroTutorialSeen = true;
    const h = this._hero;

    // Pulsing glow ring around hero
    const ring = this.add.graphics().setDepth(18);
    const drawRing = (alpha) => {
      ring.clear();
      ring.lineStyle(3, 0xffff44, alpha);
      ring.strokeCircle(h.x, h.y, 28);
    };
    drawRing(0.9);
    this.tweens.add({ targets:{v:0.9}, v:0.2, duration:600, yoyo:true, repeat:5,
      onUpdate:(tw)=>drawRing(tw.targets[0].v), onComplete:()=>ring.destroy() });

    // Speech-bubble tooltip
    const bx = h.x + 10, by = h.y - 52;
    const bubble = this.add.graphics().setDepth(19);
    bubble.fillStyle(0xffff88, 0.95); bubble.fillRoundedRect(bx-4, by-4, 172, 38, 7);
    bubble.lineStyle(2, 0xcc9900); bubble.strokeRoundedRect(bx-4, by-4, 172, 38, 7);
    // Tail pointing down to hero
    bubble.fillStyle(0xffff88, 0.95);
    bubble.fillTriangle(bx+14, by+34, bx+24, by+34, bx+19, by+44);

    const txt1 = this.add.text(bx+82, by+6,  '⚔  I\'m your Hero!', {fontSize:'10px',color:'#332200',fontStyle:'bold'}).setOrigin(0.5,0).setDepth(20);
    const txt2 = this.add.text(bx+82, by+20, 'Click me, then a tile to move', {fontSize:'9px',color:'#554400'}).setOrigin(0.5,0).setDepth(20);

    // Dismiss on click anywhere, or after 5s
    const dismiss = () => {
      [bubble,txt1,txt2].forEach(o=>{ this.tweens.add({targets:o,alpha:0,duration:300,onComplete:()=>o.destroy()}); });
    };
    this.time.delayedCall(5000, dismiss);
    this.input.once('pointerdown', dismiss);
  }

  _selectHero() {
    if (!this._hero || !this._hero.alive) return;
    this._deselectAll();
    this._hero.selected = true;
    this._hero.sprite.setTint(0xffff88);
    this._hero.rangeCircle.setVisible(true);
    this._showHeroPanel();
  }

  _deselectHero() {
    if (!this._hero) return;
    this._hero.selected = false;
    this._hero.sprite.clearTint();
    if (this._hero.powerCharged) this._hero.sprite.setTint(0xffaa00);
    this._hero.rangeCircle.setVisible(false);
    this._hideHeroPanel();
  }

  _showHeroPanel() {
    if (!this._heroPanel) this._buildHeroPanel();
    this._refreshHeroPanel();
    this._heroPanel.setVisible(true);
  }

  _hideHeroPanel() {
    if (this._heroPanel) this._heroPanel.setVisible(false);
  }

  _buildHeroPanel() {
    this._heroPanel = this.add.container(0, 0).setDepth(100).setVisible(false);
    const pb = this.add.graphics();
    pb.fillStyle(0x0a0a22,0.97); pb.fillRoundedRect(0,0,190,170,8);
    pb.lineStyle(2,0xffcc44); pb.strokeRoundedRect(0,0,190,170,8);
    this._heroPanel.add(pb);
    this._heroIcon = this.add.image(26,30,'hero').setScale(1.1);
    this._heroName = this.add.text(54,8,'⚔  HERO',{fontSize:'14px',color:'#ffcc44',fontStyle:'bold'});
    this._heroHpText = this.add.text(10,52,'',{fontSize:'10px',color:'#ff8888',lineSpacing:3});
    this._heroStatsText = this.add.text(10,90,'',{fontSize:'10px',color:'#aaaacc',lineSpacing:3});
    this._heroPowerText = this.add.text(10,130,'',{fontSize:'10px',color:'#ffaa00',fontStyle:'bold'});

    // Move here button
    const mb = this.add.graphics();
    mb.fillStyle(0x1a2200,1); mb.fillRoundedRect(8,146,174,18,4);
    mb.lineStyle(1,0x557700); mb.strokeRoundedRect(8,146,174,18,4);
    this._heroMoveHint = this.add.text(95,155,'Click any grass tile to move hero',{fontSize:'8px',color:'#88aa44'}).setOrigin(0.5);
    this._heroPanel.add([this._heroIcon,this._heroName,this._heroHpText,this._heroStatsText,this._heroPowerText,mb,this._heroMoveHint]);

    // Set up tile click to move hero when selected
    this.input.on('pointerdown', (ptr) => {
      if (!this._hero || !this._hero.selected || ptr.y >= H) return;
      const col = Math.floor(ptr.x/TILE), row = Math.floor(ptr.y/TILE);
      const key = `${col},${row}`;
      // Don't intercept clicks on towers or path
      if (this.pathSet.has(key) || this.occupiedTiles.has(key)) return;
      if (col<0||col>=COLS||row<0||row>=ROWS) return;
      this._moveHero(col, row);
    });
  }

  _refreshHeroPanel() {
    if (!this._hero || !this._heroPanel) return;
    const h = this._hero;
    this._heroHpText.setText(`❤️  HP: ${h.hp}/${h.maxHp}`);
    this._heroStatsText.setText(`⚔  Damage: ${h.damage}${h.powerCharged?' (×3 READY!)':''}\n🎯  Range:  2.5 tiles\n⏱  Rate:   ${(1000/h.rate).toFixed(1)}/s`);
    this._heroPowerText.setText(h.powerCharged ? '✨ POWER STRIKE READY!' : 'Answer correctly to power up!');
    this._heroPowerText.setStyle({color: h.powerCharged ? '#ffcc00' : '#666688'});
    if (this._heroIcon) this._heroIcon.setTexture(h.powerCharged ? 'hero_power' : 'hero');
    let px = h.x + 36, py = h.y - 180;
    if (px+200 > W) px = h.x - 205;
    if (py < 0) py = 8; if (py+180 > H) py = H-180;
    this._heroPanel.setPosition(px, py);
  }

  _moveHero(col, row) {
    const h = this._hero;
    if (!h || !h.alive || h.moving) return;
    const tx = col*TILE+TILE/2, ty = row*TILE+TILE/2;
    h.moving = true;
    this.tweens.add({
      targets: h.sprite,
      x: tx, y: ty,
      duration: Math.sqrt(Math.pow(tx-h.x,2)+Math.pow(ty-h.y,2)) * 3.5,
      ease: 'Linear',
      onComplete: () => {
        h.x = tx; h.y = ty; h.col = col; h.row = row;
        h.moving = false;
        // Redraw range circle at new position
        h.rangeCircle.clear();
        h.rangeCircle.lineStyle(1,0xffcc44,0.35); h.rangeCircle.strokeCircle(tx,ty,2.5*TILE);
        h.rangeCircle.fillStyle(0xffcc44,0.03); h.rangeCircle.fillCircle(tx,ty,2.5*TILE);
        if (h.selected) this._refreshHeroPanel();
      }
    });
    this._deselectHero();
  }

  _updateHeroHpBar() {
    if (!this._hero) return;
    const h = this._hero;
    h.hpBarBg.clear(); h.hpBarBg.fillStyle(0x220000,0.9); h.hpBarBg.fillRect(h.x-16,h.y-20,32,4);
    h.hpBar.clear();
    const pct = h.hp/h.maxHp;
    h.hpBar.fillStyle(pct>0.6?0x44ff44:pct>0.3?0xffaa00:0xff2222,1);
    h.hpBar.fillRect(h.x-16,h.y-20,32*pct,4);
    // Gold border to distinguish from enemies
    h.hpBarBg.lineStyle(1,0xffcc44,0.8); h.hpBarBg.strokeRect(h.x-16,h.y-20,32,4);
  }

  _heroAttack(time) {
    const h = this._hero;
    if (!h || !h.alive || h.moving) return;
    if (time - h.lastAttack < h.rate) return;
    // Find nearest enemy in range
    let best = null, bestDist = Infinity;
    this.enemies.forEach(e => {
      if (!e.alive) return;
      const dx=e.x-h.x, dy=e.y-h.y, d=Math.sqrt(dx*dx+dy*dy);
      if (d < h.range && d < bestDist) { bestDist = d; best = e; }
    });
    if (!best) return;
    h.lastAttack = time;
    const isPower = h.powerCharged;
    const dmg = isPower ? h.damage * 3 : h.damage;
    best.hp -= dmg;
    if (isPower) {
      h.powerCharged = false;
      h.sprite.setTexture('hero');
      h.sprite.clearTint();
      SFX.heroPowerStrike();
      this._particles(best.x, best.y, 0xffcc00, 14);
      // Power strike arc effect
      const arc = this.add.graphics().setDepth(16);
      arc.lineStyle(3,0xffcc00,0.9);
      arc.beginPath(); arc.arc(h.x,h.y,40,Math.atan2(best.y-h.y,best.x-h.x)-0.5,Math.atan2(best.y-h.y,best.x-h.x)+0.5);
      arc.strokePath();
      this.tweens.add({targets:arc,alpha:0,duration:300,onComplete:()=>arc.destroy()});
    } else {
      SFX.heroSwing();
      // Sword swing line effect
      const sw = this.add.image(h.x+(best.x-h.x)*0.4, h.y+(best.y-h.y)*0.4, 'sword_swing').setDepth(16);
      sw.setRotation(Math.atan2(best.y-h.y,best.x-h.x));
      this.tweens.add({targets:sw,alpha:0,scaleX:0.5,duration:200,onComplete:()=>sw.destroy()});
    }
    this._particles(best.x,best.y,0xffcc44,3);
    if (best.hp <= 0 && best.alive) {
      best.alive=false; best.sprite.destroy(); best.hpBar.destroy(); best.hpBarBg.destroy();
      this._particles(best.x,best.y,0xff8800,10); SFX.enemyDie();
      this.score+=best.reward*3; this._refreshHUD();
    }
    if (h.selected) this._refreshHeroPanel();
  }

  _heroTakeDamage(dmg) {
    const h = this._hero;
    if (!h || !h.alive) return;
    h.hp = Math.max(0, h.hp - dmg);
    this._updateHeroHpBar();
    SFX.heroHurt();
    this.tweens.add({targets:h.sprite,alpha:0.3,duration:80,yoyo:true,repeat:2});
    if (h.hp <= 0) this._heroDie();
  }

  _heroDie() {
    const h = this._hero;
    h.alive = false;
    h.sprite.setTexture('hero_dead');
    h.sprite.setAlpha(0.5);
    h.hpBar.clear();
    this._deselectHero();
    SFX.heroDead();
    this._flash('⚔ Hero fallen! Respawning...', 0xff6644);
    this._heroRespawnTimer = this.time.delayedCall(10000, () => {
      if (!this.gameOver) this._spawnHero();
    });
  }

  _heroHeal(amount) {
    const h = this._hero;
    if (!h || !h.alive) return;
    h.hp = Math.min(h.maxHp, h.hp + amount);
    this._updateHeroHpBar();
    SFX.heroHeal();
    // Green sparkles
    for(let i=0;i<6;i++){
      const p=this.add.image(h.x+Phaser.Math.Between(-10,10),h.y+Phaser.Math.Between(-10,10),'particle').setDepth(16).setTint(0x44ff88);
      this.tweens.add({targets:p,y:p.y-20,alpha:0,duration:600,onComplete:()=>p.destroy()});
    }
    if (h.selected) this._refreshHeroPanel();
  }

  _heroChargePower() {
    const h = this._hero;
    if (!h || !h.alive) return;
    h.powerCharged = true;
    h.sprite.setTexture('hero_power');
    h.sprite.setTint(0xffaa00);
    // Pulsing tween
    this.tweens.add({targets:h.sprite,scaleX:1.25,scaleY:1.25,duration:300,yoyo:true,repeat:2});
    this._flash('✨ Hero Power Strike charged!', 0xffcc00);
    if (h.selected) this._refreshHeroPanel();
  }

  // ── Barracks & Soldier System ─────────────────────────────────────────────
  _spawnSoldiersForBarracks(tower) {
    if(TOWER_DEF[tower.key].name !== 'Barracks') return;
    // Remove old soldiers for this tower
    this.soldiers = this.soldiers.filter(s => {
      if(s.tower !== tower) return true;
      try{s.sprite.destroy();s.hpBar.destroy();s.hpBarBg.destroy();}catch(e){}
      return false;
    });
    const stats = towerStats('barracks', tower.level);
    // Find the closest path tile to this barracks
    let bestTile=null, bestDist=Infinity;
    this._mapDef.path.forEach(([c,r]) => {
      const px=c*TILE+TILE/2, py=r*TILE+TILE/2;
      const d=Math.sqrt(Math.pow(px-tower.x,2)+Math.pow(py-tower.y,2));
      if(d<bestDist){ bestDist=d; bestTile=[c,r]; }
    });
    if(!bestTile) return;
    const [sc,sr]=bestTile;
    const sx=sc*TILE+TILE/2, sy=sr*TILE+TILE/2;
    // Sprite fills the tile
    const sprite=this.add.image(sx,sy,'soldier').setDepth(9)
      .setDisplaySize(TILE-4, TILE-4);
    const hpBarBg=this.add.graphics().setDepth(10);
    const hpBar=this.add.graphics().setDepth(10);
    const pathIdx=this._mapDef.path.findIndex(([c,r])=>c===sc&&r===sr);
    const soldier={x:sx,y:sy,col:sc,row:sr,hp:stats.soldierHp,maxHp:stats.soldierHp,
      alive:true,sprite,hpBarBg,hpBar,tower,respawnTimer:null,pathIndex:pathIdx,_lastEnemyHit:{}};
    this._drawSoldierHpBar(soldier);
    this.soldiers.push(soldier);
  }

  _drawSoldierHpBar(s) {
    const hw=TILE-8;
    s.hpBarBg.clear(); s.hpBarBg.fillStyle(0x000000,0.75); s.hpBarBg.fillRect(s.x-hw/2,s.y-TILE/2-6,hw,5);
    s.hpBarBg.lineStyle(1,0x888888,0.6); s.hpBarBg.strokeRect(s.x-hw/2,s.y-TILE/2-6,hw,5);
    s.hpBar.clear();
    const pct=s.hp/s.maxHp;
    s.hpBar.fillStyle(pct>0.5?0x44ff44:pct>0.25?0xffaa00:0xff2222,1);
    s.hpBar.fillRect(s.x-hw/2,s.y-TILE/2-6,hw*pct,5);
  }

  _updateSoldiers(delta) {
    this.soldiers.forEach(s => {
      if(!s.alive) return;
      // Hard-block any enemy that reaches this tile
      this.enemies.forEach(e => {
        if(!e.alive) return;
        const dx=e.x-s.x, dy=e.y-s.y;
        if(Math.sqrt(dx*dx+dy*dy) > TILE*0.55) return; // within tile radius
        // BLOCK — freeze enemy on the tile before the soldier
        e.blocked = true;
        // Enemy attacks soldier at its own speed (~once per 700ms per enemy id)
        const now=this.time.now;
        const eid=e.sprite ? e.sprite._id || (e.sprite._id=Math.random()) : Math.random();
        if(!s._lastEnemyHit[eid] || now-s._lastEnemyHit[eid] > 700) {
          s._lastEnemyHit[eid]=now;
          // Damage scales with enemy type HP
          const dmgByType={goblin:6,harpy:5,orc:12,troll:25,warlock:18};
          s.hp -= dmgByType[e.type]||8;
          this._drawSoldierHpBar(s);
          if(s.hp<=0) {
            s.alive=false;
            s.sprite.setTexture('soldier_dead').setAlpha(0.5);
            s.hpBar.clear();
            // Unblock enemies waiting here
            this.enemies.forEach(e2=>{ if(e2.blocked) e2.blocked=false; });
            SFX.soldierDie();
            const respawnMs=towerStats('barracks',s.tower.level).respawn;
            s.respawnTimer=this.time.delayedCall(respawnMs,()=>{
              if(this.gameOver||!s.tower) return;
              const ns=towerStats('barracks',s.tower.level);
              s.hp=ns.soldierHp; s.maxHp=ns.soldierHp;
              s.alive=true;
              s.sprite.setTexture('soldier').setAlpha(1).setDisplaySize(TILE-4,TILE-4);
              s._lastEnemyHit={};
              this._drawSoldierHpBar(s);
            });
          }
        }
      });
    });
  }

  _updateStreakHUD(streak) {
    if (this._streakLbl) {
      this._streakLbl.setText(`🔥 ${streak} streak  ✅ ${this._qm.totalCorrect}/${this._qm.totalAnswered}`);
      if (streak > 0) this.tweens.add({ targets: this._streakLbl, scaleX: 1.2, scaleY: 1.2, duration: 150, yoyo: true });
    }
  }

  _drawLightningBtn(hover) {
    const lhx=779, lhy=H+4;
    const hasCharge=this._lightningCharges>0;
    this._lightningBg.clear();
    this._lightningBg.fillStyle(hover&&hasCharge?0x223355:hasCharge?0x111a2a:0x0a0a14,1);
    this._lightningBg.fillRoundedRect(lhx,lhy,59,62,5);
    this._lightningBg.lineStyle(2,hasCharge?(hover?0x88ccff:0x4477aa):0x333344);
    this._lightningBg.strokeRoundedRect(lhx,lhy,59,62,5);
    if(hasCharge){this._lightningBg.fillStyle(0x4488ff,0.08);this._lightningBg.fillRoundedRect(lhx,lhy,59,62,5);}
    this._lightningCount.setText(`×${this._lightningCharges}`);
    this._lightningCount.setStyle({color:hasCharge?'#88ccff':'#444466'});
    this._lightningLbl.setAlpha(hasCharge?1.0:0.3);
    this._lightningHint.setStyle({color:hasCharge?'#6699cc':'#333355'});
  }

  _fireLightning() {
    if (this._lightningCharges <= 0) return;
    this._lightningCharges--;
    this._drawLightningBtn(false);
    SFX.powerUnlocked();

    // Hit all enemies for heavy damage + screen flash
    let killed = 0;
    this.enemies.forEach(e => {
      if (!e.alive) return;
      const dmg = Math.floor(e.maxHp * 0.6);
      e.hp -= dmg;
      this._particles(e.x, e.y, 0x88ccff, 6);
      if (e.hp <= 0 && e.alive) {
        e.alive=false; e.sprite.destroy(); e.hpBar.destroy(); e.hpBarBg.destroy();
        this._particles(e.x, e.y, 0x88ccff, 6);
        this.score+=e.reward*3; killed++;
      }
    });
    this.enemies = this.enemies.filter(e=>e.alive);

    // Blue-white screen flash
    const flash = this.add.graphics().setDepth(55);
    flash.fillStyle(0xaaccff,0.35); flash.fillRect(0,0,W,H);
    this.tweens.add({targets:flash,alpha:0,duration:400,onComplete:()=>flash.destroy()});

    this._refreshHUD();
    const msg = killed>0 ? `⚡ LIGHTNING STRIKE! ${killed} slain!` : '⚡ LIGHTNING STRIKE!';
    this._flash(msg, 0x88ccff);
  }

  _flash(msg,color) {
    if (this._questionPending) return; // don't flash during question modal
    const t=this.add.text(W/2,H/2-20,msg,{fontSize:'20px',color:'#'+color.toString(16).padStart(6,'0'),fontStyle:'bold',stroke:'#000',strokeThickness:4}).setOrigin(0.5).setDepth(50);
    this.tweens.add({targets:t,y:H/2-80,alpha:0,duration:1600,ease:'Power2',onComplete:()=>t.destroy()});
  }

  _endGame(won) {
    this.gameOver = true;
    // Reset speed to normal when game ends
    this.time.timeScale = 1;
    if (this._speedFast) { this._speedFast = false; this._drawSpeedBtn(false); }

    // Save progress
    if (won) {
      const mapIdx = MAPS.findIndex(m=>m.id===this._mapDef.id);
      const nextMap = mapIdx < MAPS.length-1 ? MAPS[mapIdx+1].id : null;
      SaveSystem.recordVictory(GAME_STATE.grade, this._mapDef.id, this.score, nextMap);
    }
    SaveSystem.addQuestionStats(this._qm.totalCorrect, this._qm.totalAnswered);

    const mapIdx2  = MAPS.findIndex(m=>m.id===this._mapDef.id);
    const nextMap2 = won && mapIdx2 < MAPS.length-1 ? MAPS[mapIdx2+1] : null;
    const prevBest = SaveSystem.getBestScore(GAME_STATE.grade, this._mapDef.id);
    const isNewBest = won && this.score >= prevBest;
    const pct   = this._qm.totalAnswered > 0 ? Math.round(this._qm.totalCorrect/this._qm.totalAnswered*100) : 0;
    const grade = pct>=90?'🌟 A+':pct>=80?'🎉 B':pct>=70?'👍 C':pct>=60?'📚 D':'💪 Keep Going';

    // ── Phase 1: full-screen colour flash (immediate) ────────
    won ? SFX.victory() : SFX.defeat();
    const flashColor = won ? 0x88ff44 : 0xff3322;
    const screenFlash = this.add.graphics().setDepth(58);
    screenFlash.fillStyle(flashColor, 0.55); screenFlash.fillRect(0,0,W,H);
    this.tweens.add({ targets:screenFlash, alpha:0, duration:500, onComplete:()=>screenFlash.destroy() });

    // ── Phase 2: dim overlay fades in ───────────────────────
    const dim = this.add.graphics().setDepth(59).setAlpha(0);
    dim.fillStyle(0x000000, 0.82); dim.fillRect(0,0,W,TOTAL_H);
    this.tweens.add({ targets:dim, alpha:1, duration:600 });

    // Victory: gold particle shower; Defeat: red fragments
    if (won) {
      for (let i=0; i<40; i++) {
        const px2 = Phaser.Math.Between(W*0.1,W*0.9);
        const py2 = Phaser.Math.Between(0, H*0.6);
        const p = this.add.image(px2,-20,'particle').setDepth(70)
          .setTint(Phaser.Math.RND.pick([0xffcc00,0xffee44,0xff8800,0xffffff]))
          .setScale(Phaser.Math.FloatBetween(1,2.5));
        this.tweens.add({ targets:p, y:py2+Phaser.Math.Between(60,200), alpha:0,
          duration:Phaser.Math.Between(800,1800), delay:Phaser.Math.Between(0,700),
          ease:'Power1', onComplete:()=>p.destroy() });
      }
    } else {
      // Screen shake
      this.cameras.main.shake(600, 0.012);
      for (let i=0; i<20; i++) {
        const p = this.add.image(Phaser.Math.Between(W*0.2,W*0.8), Phaser.Math.Between(H*0.2,H*0.7),'particle')
          .setDepth(70).setTint(0xff3322).setScale(2);
        this.tweens.add({ targets:p, scaleX:0, scaleY:0, alpha:0,
          duration:Phaser.Math.Between(400,900), delay:Phaser.Math.Between(0,400),
          onComplete:()=>p.destroy() });
      }
    }

    // ── Phase 3: panel drops in after 400ms ─────────────────
    this.time.delayedCall(400, () => {
      const pW=480, pH=340, px=(W-pW)/2, py=(H-pH)/2-10;
      const borderCol = won ? 0x44ff44 : 0xff4444;
      const fillCol   = won ? 0x061a06 : 0x1a0606;

      // Panel background (starts above, drops in)
      const panel = this.add.graphics().setDepth(61).setAlpha(0);
      panel.setY(-30);
      panel.fillStyle(fillCol, 0.97); panel.fillRoundedRect(px,py,pW,pH,16);
      panel.lineStyle(3, borderCol); panel.strokeRoundedRect(px,py,pW,pH,16);
      // Inner glow border
      panel.lineStyle(1, borderCol, 0.3); panel.strokeRoundedRect(px+5,py+5,pW-10,pH-10,12);
      this.tweens.add({ targets:panel, alpha:1, y:0, duration:420, ease:'Back.easeOut' });

      // Corner decorations
      const corners = this.add.graphics().setDepth(62).setAlpha(0);
      [[px,py],[px+pW,py],[px,py+pH],[px+pW,py+pH]].forEach(([cx,cy])=>{
        corners.fillStyle(borderCol,0.35); corners.fillCircle(cx,cy,10);
      });
      this.tweens.add({ targets:corners, alpha:1, duration:400, delay:200 });

      // ── Title (bounces in) ───────────────────────────────
      const titleTxt = won ? '🏆  VICTORY!' : '💀  DEFEAT';
      const titleCol = won ? '#88ff88' : '#ff6666';
      const title = this.add.text(W/2, py+50, titleTxt, {
        fontSize:'44px', color:titleCol, fontStyle:'bold', stroke:'#000', strokeThickness:7
      }).setOrigin(0.5).setDepth(63).setAlpha(0).setScale(1.6);
      this.tweens.add({ targets:title, alpha:1, scaleX:1, scaleY:1, duration:380, delay:100, ease:'Back.easeOut' });

      // Winning title gets a shimmer pulse
      if (won) {
        this.tweens.add({ targets:title, scaleX:1.04, scaleY:1.04, duration:700, delay:600, yoyo:true, repeat:-1 });
      }

      // ── Score line ───────────────────────────────────────
      const scoreLbl = this.add.text(W/2, py+106,
        `${isNewBest?'🌟 NEW BEST!  ':''}Score: ${this.score.toLocaleString()}`, {
        fontSize:'22px', color:isNewBest?'#ffcc00':'#ffffff', stroke:'#000', strokeThickness:3
      }).setOrigin(0.5).setDepth(63).setAlpha(0);
      this.tweens.add({ targets:scoreLbl, alpha:1, y:`-=8`, duration:300, delay:300 });

      const mapLbl = this.add.text(W/2, py+130,
        `${this._mapDef.emoji}  ${this._mapDef.name}  ·  ${this._gradeInfo.label}`, {
        fontSize:'12px', color:'#aa9977'
      }).setOrigin(0.5).setDepth(63).setAlpha(0);
      this.tweens.add({ targets:mapLbl, alpha:1, duration:300, delay:380 });

      // ── Unlock banner ────────────────────────────────────
      if (nextMap2) {
        const ubg = this.add.graphics().setDepth(62).setAlpha(0);
        ubg.fillStyle(0x0a1a2a,1); ubg.fillRoundedRect(px+20,py+148,pW-40,28,6);
        ubg.lineStyle(2,0x4488ff); ubg.strokeRoundedRect(px+20,py+148,pW-40,28,6);
        const uLbl = this.add.text(W/2, py+162,
          `🔓  Unlocked: ${nextMap2.emoji} ${nextMap2.name}!`, {
          fontSize:'13px', color:'#88bbff', fontStyle:'bold'
        }).setOrigin(0.5).setDepth(63).setAlpha(0);
        this.tweens.add({ targets:[ubg,uLbl], alpha:1, duration:300, delay:440 });
      }

      // ── Math grade card ──────────────────────────────────
      const qbg = this.add.graphics().setDepth(62).setAlpha(0);
      qbg.fillStyle(0x0a0a22,0.95); qbg.fillRoundedRect(px+20,py+185,pW-40,60,8);
      qbg.lineStyle(1,0x333366); qbg.strokeRoundedRect(px+20,py+185,pW-40,60,8);
      const qLbl1 = this.add.text(W/2, py+198,
        `📖  ${this._qm.totalCorrect}/${this._qm.totalAnswered} correct  (${pct}%)   ${grade}`, {
        fontSize:'13px', color:'#aaddff'
      }).setOrigin(0.5).setDepth(63).setAlpha(0);
      const qLbl2 = this.add.text(W/2, py+218,
        `Best streak: 🔥${this._qm.streak}   Waves cleared: ${this.wave}/${WAVE_SCRIPTS.length}`, {
        fontSize:'11px', color:'#aa9977'
      }).setOrigin(0.5).setDepth(63).setAlpha(0);
      this.tweens.add({ targets:[qbg,qLbl1,qLbl2], alpha:1, duration:300, delay:500 });

      // ── Buttons (staggered fade-up) ──────────────────────
      const btnY = py+pH-52;
      const btns = [
        { label:'↺  RETRY',   col:'#88ff88', bCol:0x44aa44, fill:0x0a2a0a, action:()=>{ SFX.menuClick(); this.time.timeScale=1; this.scene.restart(); } },
        { label:'🗺  MAPS',   col:'#88ccff', bCol:0x4488aa, fill:0x0a1a2a, action:()=>{ SFX.menuClick(); this.cameras.main.fade(400,0,0,0,false,(c,p)=>{ if(p===1){ this.time.timeScale=1; this.scene.start('MapSelectScene'); } }); } },
        { label:'⚔  GRADES', col:'#f0c030', bCol:0xaa8800, fill:0x1a1a0a, action:()=>{ SFX.menuClick(); this.cameras.main.fade(400,0,0,0,false,(c,p)=>{ if(p===1){ this.time.timeScale=1; this.scene.start('GradeSelectScene'); } }); } },
      ];
      const btnW = (pW-60) / 3;
      btns.forEach((b,i) => {
        const bx = px+20 + i*(btnW+10);
        const bg = this.add.graphics().setDepth(62).setAlpha(0);
        bg.fillStyle(b.fill,1); bg.fillRoundedRect(bx,btnY,btnW,38,7);
        bg.lineStyle(2,b.bCol); bg.strokeRoundedRect(bx,btnY,btnW,38,7);
        const lbl = this.add.text(bx+btnW/2, btnY+19, b.label,
          {fontSize:'13px',color:b.col,fontStyle:'bold'}).setOrigin(0.5).setDepth(63).setAlpha(0);
        this.tweens.add({ targets:[bg,lbl], alpha:1, y:`-=10`, duration:280, delay:620+i*80 });
        bg.setInteractive(new Phaser.Geom.Rectangle(bx,btnY,btnW,38), Phaser.Geom.Rectangle.Contains);
        bg.on('pointerover',()=>{ bg.clear(); bg.fillStyle(b.bCol,0.35); bg.fillRoundedRect(bx,btnY,btnW,38,7); bg.lineStyle(2,b.bCol); bg.strokeRoundedRect(bx,btnY,btnW,38,7); lbl.setStyle({color:'#ffffff'}); });
        bg.on('pointerout', ()=>{ bg.clear(); bg.fillStyle(b.fill,1); bg.fillRoundedRect(bx,btnY,btnW,38,7); bg.lineStyle(2,b.bCol); bg.strokeRoundedRect(bx,btnY,btnW,38,7); lbl.setStyle({color:b.col}); });
        bg.on('pointerdown', b.action);
      });
    });
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  QUESTION MANAGER
// ══════════════════════════════════════════════════════════════════════════════
class QuestionManager {
  constructor(gradeId) {
    const bank = QUESTION_BANK[gradeId] || QUESTION_BANK['3'];
    this._pool = [...bank].sort(() => Math.random() - 0.5);
    this._used = [];
    this.streak = 0;
    this.totalCorrect = 0;
    this.totalAnswered = 0;
  }

  next() {
    if (this._pool.length === 0) {
      this._pool = [...this._used].sort(() => Math.random() - 0.5);
      this._used = [];
    }
    const q = this._pool.shift();
    this._used.push(q);
    // Shuffle choices, track correct answer text
    const shuffled = q.choices.map((c, i) => ({ text: c, correct: i === q.answer }))
      .sort(() => Math.random() - 0.5);
    return { ...q, shuffledChoices: shuffled };
  }

  recordAnswer(correct) {
    this.totalAnswered++;
    if (correct) {
      this.totalCorrect++;
      this.streak++;
    } else {
      this.streak = 0;
    }
    return this.streak;
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  QUESTION MODAL  (Phaser overlay shown between waves)
// ══════════════════════════════════════════════════════════════════════════════
class QuestionModal {
  constructor(scene, questionManager) {
    this._scene = scene;
    this._qm = questionManager;
    this._container = null;
    this._answered = false;
    this._onComplete = null;
    this._timerEvent = null;
    this._timerBar = null;
    this._timerBg = null;
    this._timeLeft = 0;
    this._totalTime = 18000; // 18 seconds
  }

  show(onComplete) {
    this._onComplete = onComplete;
    this._answered = false;
    const q = this._qm.next();
    this._currentQ = q;
    SFX.questionAppear();
    this._build(q);
  }

  _build(q) {
    const scene = this._scene;
    if (this._container) { this._container.destroy(); this._container = null; }

    const mW = 580, mH = 340;
    const mx = (W - mW) / 2, my = (H - mH) / 2 - 10;

    // dim overlay
    const dim = scene.add.graphics().setDepth(200);
    dim.fillStyle(0x000000, 0.72);
    dim.fillRect(0, 0, W, TOTAL_H);
    dim.setAlpha(0);
    scene.tweens.add({ targets: dim, alpha: 1, duration: 220 });

    // panel
    const panel = scene.add.graphics().setDepth(201);
    panel.fillStyle(0x06101e, 0.98);
    panel.fillRoundedRect(mx, my, mW, mH, 14);
    panel.lineStyle(3, 0xc8a200, 1);
    panel.strokeRoundedRect(mx, my, mW, mH, 14);
    panel.lineStyle(1, 0xc8a200, 0.25);
    panel.strokeRoundedRect(mx+4, my+4, mW-8, mH-8, 11);

    // Glow corners
    [[mx,my],[mx+mW,my],[mx,my+mH],[mx+mW,my+mH]].forEach(([cx,cy])=>{
      panel.fillStyle(0xc8a200,0.2);panel.fillCircle(cx,cy,10);
    });

    // Topic badge
    const topicBg = scene.add.graphics().setDepth(202);
    topicBg.fillStyle(0x1a1000, 1);
    topicBg.fillRoundedRect(mx + mW/2 - 70, my - 16, 140, 32, 16);
    topicBg.lineStyle(2, 0xc8a200, 0.8);
    topicBg.strokeRoundedRect(mx + mW/2 - 70, my - 16, 140, 32, 16);
    const topicT = scene.add.text(mx + mW/2, my, `📖  ${q.topic}`, {
      fontSize: '12px', color: '#f5e06e', fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(203);

    // Streak bar
    const streakBg = scene.add.graphics().setDepth(202);
    streakBg.fillStyle(0x111122, 1);
    streakBg.fillRoundedRect(mx + mW - 130, my + 10, 120, 22, 5);
    const streakT = scene.add.text(mx + mW - 70, my + 21,
      `🔥 Streak: ${this._qm.streak}`, { fontSize: '11px', color: '#ff8844', fontStyle: 'bold' }
    ).setOrigin(0.5).setDepth(203);

    // Question text
    const qText = scene.add.text(mx + mW/2, my + 52, q.q, {
      fontSize: '20px', color: '#ffffff', fontStyle: 'bold',
      align: 'center', wordWrap: { width: mW - 60 },
      stroke: '#000', strokeThickness: 3
    }).setOrigin(0.5, 0).setDepth(202);

    // Timer bar track
    const tbY = my + 110;
    this._timerBg = scene.add.graphics().setDepth(202);
    this._timerBg.fillStyle(0x111122, 1);
    this._timerBg.fillRoundedRect(mx + 20, tbY, mW - 40, 8, 4);

    this._timerBar = scene.add.graphics().setDepth(203);
    this._timeLeft = this._totalTime;
    this._drawTimerBar(1.0);

    // Answer buttons  — 2×2 grid
    const btnW = 256, btnH = 50, gap = 12;
    const bStartX = mx + (mW - (btnW*2 + gap)) / 2;
    const bStartY = my + 130;
    this._answerBtns = [];

    q.shuffledChoices.forEach((choice, i) => {
      const col = i % 2, row = Math.floor(i / 2);
      const bx = bStartX + col * (btnW + gap);
      const by = bStartY + row * (btnH + 10);

      const bg = scene.add.graphics().setDepth(202);
      const lbl = scene.add.text(bx + btnW/2, by + btnH/2, choice.text, {
        fontSize: '16px', color: '#ffffff', fontStyle: 'bold',
        align: 'center', wordWrap: { width: btnW - 20 }
      }).setOrigin(0.5).setDepth(203);

      const letters = ['A','B','C','D'];
      const badge = scene.add.text(bx + 16, by + btnH/2, letters[i], {
        fontSize: '13px', color: '#c8a200', fontStyle: 'bold'
      }).setOrigin(0.5).setDepth(203);

      const drawBtn = (state) => { // 'normal','hover','correct','wrong'
        bg.clear();
        const fills = { normal:0x0d1a2a, hover:0x1a3050, correct:0x0a2a0a, wrong:0x2a0a0a };
        const borders = { normal:0x334466, hover:0x6688bb, correct:0x44ff44, wrong:0xff4444 };
        bg.fillStyle(fills[state] || 0x0d1a2a, 1);
        bg.fillRoundedRect(bx, by, btnW, btnH, 8);
        bg.lineStyle(state==='normal'?1:2, borders[state] || 0x334466);
        bg.strokeRoundedRect(bx, by, btnW, btnH, 8);
        if (state === 'correct') { bg.fillStyle(0x44ff44, 0.08); bg.fillRoundedRect(bx, by, btnW, btnH, 8); }
        if (state === 'wrong')   { bg.fillStyle(0xff4444, 0.08); bg.fillRoundedRect(bx, by, btnW, btnH, 8); }
      };
      drawBtn('normal');

      bg.setInteractive(new Phaser.Geom.Rectangle(bx, by, btnW, btnH), Phaser.Geom.Rectangle.Contains);
      bg.on('pointerover', () => { if (!this._answered) drawBtn('hover'); });
      bg.on('pointerout',  () => { if (!this._answered) drawBtn('normal'); });
      bg.on('pointerdown', () => {
        if (this._answered) return;
        this._answered = true;
        this._stopTimer();
        this._handleAnswer(choice.correct, i, drawBtn, q.shuffledChoices);
      });

      this._answerBtns.push({ bg, lbl, badge, drawBtn, choice });
    });

    // Collect all objects
    this._objects = [dim, panel, topicBg, topicT, streakBg, streakT, qText, this._timerBg, this._timerBar,
      ...this._answerBtns.flatMap(b => [b.bg, b.lbl, b.badge])];

    // Animate panel in
    const panelGroup = [panel, topicBg, topicT, streakBg, streakT, qText, this._timerBg, this._timerBar,
      ...this._answerBtns.flatMap(b => [b.bg, b.lbl, b.badge])];
    panelGroup.forEach(o => { o.setAlpha(0); o.y -= 20; });
    scene.tweens.add({ targets: panelGroup, alpha: 1, y: '+=20', duration: 280, ease: 'Back.easeOut' });

    // Start countdown timer
    this._startTimer();
  }

  _drawTimerBar(frac) {
    if (!this._timerBar || !this._timerBg) return;
    const scene = this._scene;
    const mW = 580, mx = (W - mW) / 2, my = (H - 340) / 2 - 10;
    const tbY = my + 110;
    const barW = (mW - 40) * Math.max(0, frac);
    const color = frac > 0.6 ? 0x44cc44 : frac > 0.3 ? 0xffaa00 : 0xff3333;
    this._timerBar.clear();
    this._timerBar.fillStyle(color, 1);
    if (barW > 0) this._timerBar.fillRoundedRect(mx + 20, tbY, barW, 8, 4);
  }

  _startTimer() {
    this._timerEvent = this._scene.time.addEvent({
      delay: 100,
      repeat: this._totalTime / 100 - 1,
      callback: () => {
        this._timeLeft -= 100;
        this._drawTimerBar(this._timeLeft / this._totalTime);
        if (this._timeLeft <= 0) {
          this._answered = true;
          this._stopTimer();
          this._handleAnswer(false, -1, null, this._currentQ.shuffledChoices, true);
        }
      }
    });
  }

  _stopTimer() {
    if (this._timerEvent) { this._timerEvent.remove(); this._timerEvent = null; }
    if (this._timerBar) { this._timerBar.clear(); }
  }

  _handleAnswer(correct, chosenIdx, chosenDrawFn, allChoices, timedOut = false) {
    const scene = this._scene;
    const streak = this._qm.recordAnswer(correct);

    // Reveal correct/wrong colors on all buttons
    this._answerBtns.forEach((btn, i) => {
      if (btn.choice.correct) btn.drawBtn('correct');
      else if (i === chosenIdx) btn.drawBtn('wrong');
    });

    // Disable all buttons
    this._answerBtns.forEach(b => b.bg.removeInteractive());

    // Result overlay text inside modal
    const mW = 580, mH = 340;
    const mx = (W - mW) / 2, my = (H - mH) / 2 - 10;

    if (correct) {
      SFX.correctAnswer();
      const goldBonus = 20 + streak * 10;
      scene.gameScene._awardQuestion(true, goldBonus, streak);
      const msg = streak >= 3
        ? `✨ CORRECT! +$${goldBonus} gold  🔥 ${streak} streak!`
        : `✅ CORRECT! +$${goldBonus} gold`;
      const rt = scene.add.text(mx + mW/2, my + mH - 30, msg, {
        fontSize: '16px', color: '#88ff88', fontStyle: 'bold',
        stroke: '#000', strokeThickness: 3
      }).setOrigin(0.5).setDepth(204).setAlpha(0);
      scene.tweens.add({ targets: rt, alpha: 1, duration: 300 });
      this._objects.push(rt);

      if (streak > 0 && streak % 3 === 0) {
        SFX.powerUnlocked();
        scene.gameScene._triggerStreakPower(streak);
      }
    } else {
      SFX.wrongAnswer();
      scene.gameScene._awardQuestion(false, 0, 0);
      const correctAnswer = allChoices.find(c => c.correct)?.text || '';
      const msg = timedOut ? `⏰ TIME'S UP!  Answer: ${correctAnswer}` : `❌ Incorrect.  Answer: ${correctAnswer}`;
      const rt = scene.add.text(mx + mW/2, my + mH - 30, msg, {
        fontSize: '14px', color: '#ff8888', fontStyle: 'bold',
        stroke: '#000', strokeThickness: 3
      }).setOrigin(0.5).setDepth(204).setAlpha(0);
      scene.tweens.add({ targets: rt, alpha: 1, duration: 300 });
      this._objects.push(rt);
    }

    // Auto-close after 2 seconds
    scene.time.delayedCall(2000, () => this._close());
  }

  _close() {
    const scene = this._scene;
    if (!this._objects) return;
    scene.tweens.add({
      targets: this._objects, alpha: 0, y: '-=15', duration: 250, ease: 'Power2',
      onComplete: () => {
        this._objects.forEach(o => { try { o.destroy(); } catch(e){} });
        this._objects = null;
        this._answerBtns = null;
        this._timerBar = null;
        this._timerBg = null;
        if (this._onComplete) this._onComplete();
      }
    });
  }

  destroy() {
    this._stopTimer();
    if (this._objects) {
      this._objects.forEach(o => { try { o.destroy(); } catch(e){} });
      this._objects = null;
    }
  }
}

  width: W,
  height: TOTAL_H,
  backgroundColor: '#050810',
  parent: 'game-container',
  scene: [PreloadScene, TitleScene, GradeSelectScene, MapSelectScene, GameScene],
});
</script>
