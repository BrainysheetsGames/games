class SoundEngine {
  constructor() { this._ctx = null; this._master = null; this.enabled = true; }

  _getCtx() {
    if (!this._ctx) {
      this._ctx = new (window.AudioContext || window.webkitAudioContext)();
      this._master = this._ctx.createGain();
      this._master.gain.value = 0.32;
      this._master.connect(this._ctx.destination);
    }
    if (this._ctx.state === 'suspended') this._ctx.resume();
    return this._ctx;
  }

  _p(fn) { if (!this.enabled) return; try { fn(this._getCtx(), this._master); } catch(e){} }

  _osc(ctx, out, type, freqFn, volFn, dur) {
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = type; o.connect(g); g.connect(out);
    freqFn(o.frequency, ctx.currentTime);
    volFn(g.gain, ctx.currentTime);
    o.start(ctx.currentTime); o.stop(ctx.currentTime + dur);
  }

  _noise(ctx, out, dur, filterFreq, filterType, vol) {
    const sz = Math.floor(ctx.sampleRate * dur);
    const buf = ctx.createBuffer(1, sz, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0; i<sz; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/sz, 2);
    const src = ctx.createBufferSource(), g = ctx.createGain();
    const f = ctx.createBiquadFilter();
    f.type = filterType; f.frequency.value = filterFreq;
    src.buffer = buf; src.connect(f); f.connect(g); g.connect(out);
    g.gain.setValueAtTime(vol, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    src.start(ctx.currentTime);
  }

  placeTower() {
    this._p((ctx, out) => {
      this._osc(ctx, out, 'square',
        (f,t) => { f.setValueAtTime(220,t); f.exponentialRampToValueAtTime(440,t+0.08); f.exponentialRampToValueAtTime(330,t+0.16); },
        (g,t) => { g.setValueAtTime(0.4,t); g.exponentialRampToValueAtTime(0.001,t+0.22); }, 0.25);
    });
  }

  shootArrow() {

// Compute stats for a given tower key at a given level (1-5)
function towerStats(key, level) {
  const b = TOWER_BASE[key];
  if (key === 'barracks') {
    // Barracks: each level adds more soldier HP and faster respawn
    const hpTable   = [80, 140, 220, 340, 500];
    const respTable = [15000, 13000, 11000, 9000, 7000];
    return { ...b, soldierHp: hpTable[level-1], respawn: respTable[level-1],
             color: [0xffaa44,0xffbb55,0xffcc66,0xffdd77,0xffee88][level-1] };
  }
  const n = level - 1;
  const damage = Math.round(b.damage * Math.pow(2.5, n));
  const range  = +(b.range + 0.15 * n).toFixed(2);
  const rate   = Math.round(b.rate * Math.pow(0.95, n));
  const colors = [b.color,
    Phaser.Display ? undefined : b.color, // resolved at runtime
    b.color, b.color, b.color];
  return { ...b, damage, range, rate };
}

// Upgrade cost for going from current level to next: double total spent so far
// totalSpent = cost + sum of upgrade costs paid
function upgradeCost(key, totalSpent) {
  return totalSpent * 2;
}

const SaveSystem = {
  _key: 'kok_save_v1',

  load() {
    try {
      const raw = localStorage.getItem(this._key);
      return raw ? JSON.parse(raw) : this._default();
    } catch(e) { return this._default(); }
  },

  save(data) {
    try { localStorage.setItem(this._key, JSON.stringify(data)); } catch(e) {}
  },

  _default() {
    return {
      unlockedMaps: ['forest'],
      bestScores: {},   // key: `${gradeId}_${mapId}` → score
      totalCorrect: 0,
      totalAnswered: 0,
    };
  },

  getBestScore(gradeId, mapId) {
    const d = this.load();
    return d.bestScores[`${gradeId}_${mapId}`] || 0;
  },

  recordVictory(gradeId, mapId, score, nextMapId) {
    const d = this.load();
    const key = `${gradeId}_${mapId}`;
    if (!d.bestScores[key] || score > d.bestScores[key]) d.bestScores[key] = score;
    if (nextMapId && !d.unlockedMaps.includes(nextMapId)) d.unlockedMaps.push(nextMapId);
    this.save(d);
  },

  isUnlocked(mapId) {
    if (mapId === 'forest') return true;
    const d = this.load();
    return d.unlockedMaps.includes(mapId);
  },

  addQuestionStats(correct, answered) {
    const d = this.load();
    d.totalCorrect = (d.totalCorrect||0) + correct;
    d.totalAnswered = (d.totalAnswered||0) + answered;
    this.save(d);
  }
};

function makePx(scene, key, w, h, fn) {
  if (scene.textures.exists(key)) return;
  const c = document.createElement('canvas');
  c.width = w; c.height = h;
  fn(c.getContext('2d'));
  scene.textures.addCanvas(key, c);
}

// ══════════════════════════════════════════════════════════════════════════════
//  TITLE SCENE
// ══════════════════════════════════════════════════════════════════════════════
class TitleScene extends Phaser.Scene {
  constructor() { super('TitleScene'); }

  create() {
    this._buildBg();
    this._buildCastle();
    this._buildTitle();
    this._buildPlayBtn();
    this._buildFooter();
  }

  _buildBg() {
    const bg = this.add.graphics();
    bg.fillGradientStyle(0x020408,0x020408,0x050d1a,0x050d1a,1);
    bg.fillRect(0,0,W,TOTAL_H);
    // Stars
    for(let i=0;i<120;i++){
      const s=this.add.image(Phaser.Math.Between(0,W),Phaser.Math.Between(0,TOTAL_H*0.65),'star_px')
        .setScale(Math.random()*0.8+0.2).setAlpha(Math.random()*0.6+0.2);
      this.tweens.add({targets:s,alpha:Math.random()*0.3+0.1,duration:Phaser.Math.Between(800,2500),yoyo:true,repeat:-1,delay:Phaser.Math.Between(0,2000)});
    }
    // Ground
    const g=this.add.graphics();
    g.fillStyle(0x0d1f0d,1);
    g.beginPath();g.moveTo(0,TOTAL_H*0.72);
    for(let x=0;x<=W;x+=40) g.lineTo(x,TOTAL_H*0.72-Math.sin(x*0.012)*30-Math.sin(x*0.005)*20);
    g.lineTo(W,TOTAL_H);g.lineTo(0,TOTAL_H);g.closePath();g.fillPath();
    // Moon
    const moon=this.add.graphics();
    moon.fillStyle(0xeeeebb,1);moon.fillCircle(W-90,70,36);
    moon.fillStyle(0xd4d4aa,1);moon.fillCircle(W-80,60,8);moon.fillCircle(W-100,78,5);
    moon.fillStyle(0xeeeebb,0.07);moon.fillCircle(W-90,70,60);
  }

  _buildCastle() {
    this.add.image(W/2,TOTAL_H*0.68,'castle').setScale(2.2).setOrigin(0.5,1).setAlpha(0.85);
    [[W/2-100,TOTAL_H*0.68-140],[W/2+100,TOTAL_H*0.68-140]].forEach(([tx,ty])=>{
      const t=this.add.image(tx,ty,'torch_px').setScale(1.5);
      this.tweens.add({targets:t,scaleX:1.3,scaleY:1.6,duration:120,yoyo:true,repeat:-1,delay:Math.random()*200});
      const gw=this.add.graphics();gw.fillStyle(0xff6600,0.07);gw.fillCircle(tx,ty,40);
      this.tweens.add({targets:gw,alpha:0.03,duration:200,yoyo:true,repeat:-1});
    });
  }

  _buildTitle() {
    // Ornamental lines
    const line=this.add.graphics();
    line.lineStyle(2,0xc8a200,0.6);
    line.lineBetween(W/2-210,100,W/2+210,100);
    line.lineBetween(W/2-210,202,W/2+210,202);
    [[W/2-210,100],[W/2+210,100],[W/2-210,202],[W/2+210,202]].forEach(([x,y])=>{
      line.fillStyle(0xc8a200,0.8);line.fillRect(x-3,y-3,6,6);
    });

    this.add.text(W/2,76,'⚔  A TOWER DEFENSE ADVENTURE  ⚔',{fontSize:'12px',color:'#c8a200',letterSpacing:3}).setOrigin(0.5).setAlpha(0.8);

    const title=this.add.text(W/2,152,'Kingdom of\nKnowledge',{
      fontSize:'56px',color:'#f5e06e',fontStyle:'bold',align:'center',
      stroke:'#3a1a00',strokeThickness:8,
      shadow:{offsetX:2,offsetY:4,color:'#000',blur:8,fill:true}
    }).setOrigin(0.5);
    this.tweens.add({targets:title,y:149,duration:3000,yoyo:true,repeat:-1,ease:'Sine.easeInOut'});

    this.add.text(W/2,218,'Defend the realm. Master your grade.',{
      fontSize:'15px',color:'#d4b896',fontStyle:'italic'
    }).setOrigin(0.5).setAlpha(0.9);
  }

  _buildPlayBtn() {
    const by=278;
    const btnBg=this.add.graphics();
    const draw=(h)=>{
      btnBg.clear();
      btnBg.fillStyle(h?0x4a2200:0x2a1400,0.95);btnBg.fillRoundedRect(W/2-140,by-22,280,54,10);
      btnBg.lineStyle(2,h?0xffcc44:0xc8a200);btnBg.strokeRoundedRect(W/2-140,by-22,280,54,10);
    };
    draw(false);
    const lbl=this.add.text(W/2,by+6,'⚔  CHOOSE YOUR GRADE  ⚔',{
      fontSize:'17px',color:'#f5e06e',fontStyle:'bold'
    }).setOrigin(0.5);
    btnBg.setInteractive(new Phaser.Geom.Rectangle(W/2-140,by-22,280,54),Phaser.Geom.Rectangle.Contains);

//  GRADE SELECT SCENE
// ══════════════════════════════════════════════════════════════════════════════
class GradeSelectScene extends Phaser.Scene {
  constructor() { super('GradeSelectScene'); }

  create() {
    this._sel = GAME_STATE.grade;
    this._buildBg();
    this._buildHeader();
    this._buildCards();
    this._buildButtons();
  }

  _buildBg() {
    const bg=this.add.graphics();
    bg.fillGradientStyle(0x020408,0x020408,0x080e20,0x080e20,1);
    bg.fillRect(0,0,W,TOTAL_H);
    // Grid lines
    const grid=this.add.graphics();
    grid.lineStyle(1,0x111833,0.4);
    for(let x=0;x<W;x+=60) grid.lineBetween(x,0,x,TOTAL_H);
    for(let y=0;y<TOTAL_H;y+=60) grid.lineBetween(0,y,W,y);
    // Border
    const bdr=this.add.graphics();
    bdr.lineStyle(3,0xc8a200,0.5);bdr.strokeRect(10,10,W-20,TOTAL_H-20);
    bdr.lineStyle(1,0xc8a200,0.2);bdr.strokeRect(16,16,W-32,TOTAL_H-32);
    [[18,18],[W-18,18],[18,TOTAL_H-18],[W-18,TOTAL_H-18]].forEach(([cx,cy])=>{
      bdr.fillStyle(0xc8a200,0.8);bdr.fillCircle(cx,cy,4);
      bdr.fillStyle(0xc8a200,0.15);bdr.fillCircle(cx,cy,10);
    });
  }

  _buildHeader() {
    this.add.text(W/2,40,'SELECT YOUR GRADE',{
      fontSize:'28px',color:'#f5e06e',fontStyle:'bold',stroke:'#3a1a00',strokeThickness:5
    }).setOrigin(0.5);
    this.add.text(W/2,74,'Each grade unlocks age-appropriate educational challenges',{
      fontSize:'13px',color:'#a08060',fontStyle:'italic'
    }).setOrigin(0.5);
    const d=this.add.graphics();d.lineStyle(2,0xc8a200,0.4);d.lineBetween(60,92,W-60,92);
  }

  _buildCards() {
    this._cards=[];
    const cW=175,cH=82,cols=3,gap=14;
    const startX=(W-(cols*cW+(cols-1)*gap))/2;
    const startY=105;

    GRADES.forEach((grade,i)=>{
      const col=i%cols, row=Math.floor(i/cols);
      const cx=startX+col*(cW+gap), cy=startY+row*(cH+10);
      const bg=this.add.graphics();
      const isSel=this._sel===grade.id;
      this._drawCard(bg,cx,cy,cW,cH,grade,isSel,false);
      bg.setInteractive(new Phaser.Geom.Rectangle(cx,cy,cW,cH),Phaser.Geom.Rectangle.Contains);

      const icon=this.add.text(cx+22,cy+cH/2,grade.emoji,{fontSize:'22px'}).setOrigin(0.5);
      const nameT=this.add.text(cx+42,cy+13,grade.label,{fontSize:'13px',color:grade.color,fontStyle:'bold'});
      const descT=this.add.text(cx+42,cy+31,grade.desc,{fontSize:'11px',color:'#887766'});
      const subT=this.add.text(cx+42,cy+52,`Grade ${grade.id}`,{fontSize:'10px',color:'#555577'});
      const check=this.add.text(cx+cW-18,cy+13,'✔',{fontSize:'14px',color:'#44ff88',fontStyle:'bold'}).setVisible(isSel);

      bg.on('pointerover',()=>{ if(this._sel!==grade.id) this._drawCard(bg,cx,cy,cW,cH,grade,false,true); });
      bg.on('pointerout', ()=>this._drawCard(bg,cx,cy,cW,cH,grade,this._sel===grade.id,false));
      bg.on('pointerdown',()=>{ SFX.gradeSelect(); this._selectGrade(grade.id); });

      this._cards.push({bg,icon,nameT,descT,subT,check,grade,cx,cy,cW,cH});
    });
  }

  _drawCard(g,cx,cy,cw,ch,grade,sel,hov) {
    g.clear();
    const col=parseInt(grade.color.replace('#',''),16);
    if(sel){
      g.fillStyle(0x0a1a2a,1);g.fillRoundedRect(cx,cy,cw,ch,8);
      g.lineStyle(2,col,1);g.strokeRoundedRect(cx,cy,cw,ch,8);
      g.lineStyle(1,col,0.3);g.strokeRoundedRect(cx+3,cy+3,cw-6,ch-6,6);
      g.fillStyle(col,0.07);g.fillRoundedRect(cx,cy,cw,ch,8);
    } else if(hov){
      g.fillStyle(0x080f1a,1);g.fillRoundedRect(cx,cy,cw,ch,8);
      g.lineStyle(1.5,col,0.5);g.strokeRoundedRect(cx,cy,cw,ch,8);
      g.fillStyle(col,0.03);g.fillRoundedRect(cx,cy,cw,ch,8);
    } else {
      g.fillStyle(0x060d18,1);g.fillRoundedRect(cx,cy,cw,ch,8);
      g.lineStyle(1,0x1e2244,1);g.strokeRoundedRect(cx,cy,cw,ch,8);
    }
  }

  _selectGrade(id) {
    this._sel=id; GAME_STATE.grade=id;
    this._cards.forEach(card=>{
      const s=card.grade.id===id;
      this._drawCard(card.bg,card.cx,card.cy,card.cW,card.cH,card.grade,s,false);
      card.check.setVisible(s);
    });
    if(this._startLbl) {
      this._startLbl.setStyle({color:'#88ff88'});
      this._startBg.setVisible(true);
      this._startLbl.setVisible(true);
    }
  }

  _buildButtons() {
    const by=TOTAL_H-62;
    // Start btn
    const has=!!this._sel;
    const sbg=this.add.graphics().setVisible(has);
    const drawS=(h)=>{
      sbg.clear();
      sbg.fillStyle(h?0x1a4a1a:0x0a2a0a,0.95);sbg.fillRoundedRect(W/2-155,by-22,310,54,10);
      sbg.lineStyle(2,h?0x88ff88:0x44aa44);sbg.strokeRoundedRect(W/2-155,by-22,310,54,10);
    };
    drawS(false);
    const slbl=this.add.text(W/2,by+6,'⚔  BEGIN ADVENTURE  ⚔',{
      fontSize:'18px',color:has?'#88ff88':'#445544',fontStyle:'bold'
    }).setOrigin(0.5).setVisible(has);
    sbg.setInteractive(new Phaser.Geom.Rectangle(W/2-155,by-22,310,54),Phaser.Geom.Rectangle.Contains);
    sbg.on('pointerover',()=>{drawS(true);slbl.setStyle({color:'#ffffff'});});
    sbg.on('pointerout', ()=>{drawS(false);slbl.setStyle({color:'#88ff88'});});
    sbg.on('pointerdown',()=>{
      if(!this._sel) return;
      SFX.gradeSelect();
      this.cameras.main.fade(500,0,0,0,false,(cam,p)=>{ if(p===1) this.scene.start('MapSelectScene'); });
    });
    this._startBg=sbg; this._startLbl=slbl;

    if(!has){
      this.add.text(W/2,by+6,'← Select a grade above to begin →',{
        fontSize:'14px',color:'#554433',fontStyle:'italic'
      }).setOrigin(0.5);
    }

    // Back btn
    const bbg=this.add.graphics();
    bbg.fillStyle(0x1a1a0a,0.9);bbg.fillRoundedRect(20,TOTAL_H-52,110,36,6);
    bbg.lineStyle(1,0x443322);bbg.strokeRoundedRect(20,TOTAL_H-52,110,36,6);
    const blbl=this.add.text(75,TOTAL_H-34,'◀  Back',{fontSize:'13px',color:'#887755'}).setOrigin(0.5);
    bbg.setInteractive(new Phaser.Geom.Rectangle(20,TOTAL_H-52,110,36),Phaser.Geom.Rectangle.Contains);
    bbg.on('pointerover',()=>blbl.setStyle({color:'#c8a200'}));
    bbg.on('pointerout', ()=>blbl.setStyle({color:'#887755'}));
    bbg.on('pointerdown',()=>{ SFX.menuClick(); this.cameras.main.fade(300,0,0,0,false,(c,p)=>{ if(p===1) this.scene.start('TitleScene'); }); });
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  MAP SELECT SCENE
// ══════════════════════════════════════════════════════════════════════════════
class MapSelectScene extends Phaser.Scene {
  constructor() { super('MapSelectScene'); }

  create() {
    this._sel = GAME_STATE.map || 'forest';
    this._buildBg();
    this._buildHeader();
    this._buildCards();
    this._buildButtons();
  }

  _buildBg() {
    const bg = this.add.graphics();
    bg.fillGradientStyle(0x020408,0x020408,0x060e18,0x060e18,1);
    bg.fillRect(0,0,W,TOTAL_H);
    const grid = this.add.graphics();
    grid.lineStyle(1,0x0a1428,0.8);
    for(let x=0;x<W;x+=60) grid.lineBetween(x,0,x,TOTAL_H);
    for(let y=0;y<TOTAL_H;y+=60) grid.lineBetween(0,y,W,y);
    const bdr = this.add.graphics();
    bdr.lineStyle(3,0xc8a200,0.5); bdr.strokeRect(10,10,W-20,TOTAL_H-20);
    bdr.lineStyle(1,0xc8a200,0.2); bdr.strokeRect(16,16,W-32,TOTAL_H-32);
    [[18,18],[W-18,18],[18,TOTAL_H-18],[W-18,TOTAL_H-18]].forEach(([cx,cy])=>{
      bdr.fillStyle(0xc8a200,0.8); bdr.fillCircle(cx,cy,4);
      bdr.fillStyle(0xc8a200,0.15); bdr.fillCircle(cx,cy,10);
    });
  }

  _buildHeader() {
    const gi = GRADES.find(g=>g.id===GAME_STATE.grade) || GRADES[2];
    this.add.text(W/2,36,'SELECT YOUR BATTLEFIELD',{
      fontSize:'26px',color:'#f5e06e',fontStyle:'bold',stroke:'#3a1a00',strokeThickness:5
    }).setOrigin(0.5);
    this.add.text(W/2,68,`${gi.emoji}  Playing as: ${gi.label}  —  ${gi.desc}`,{
      fontSize:'13px',color:gi.color,fontStyle:'italic'
    }).setOrigin(0.5);
    const d=this.add.graphics(); d.lineStyle(2,0xc8a200,0.4); d.lineBetween(60,88,W-60,88);
  }

  _buildCards() {
    this._cards = [];
    const cW = 240, cH = 300, gap = 28;
    const startX = (W - (3*cW + 2*gap)) / 2;
    const cy = 112;

    MAPS.forEach((map, i) => {
      const cx = startX + i*(cW+gap);
      const unlocked = SaveSystem.isUnlocked(map.id);
      const bestScore = SaveSystem.getBestScore(GAME_STATE.grade, map.id);
      const isSel = this._sel === map.id && unlocked;

      const bg = this.add.graphics();
      this._drawMapCard(bg, cx, cy, cW, cH, map, isSel, false, unlocked);

      // Map path preview
      this._drawPathPreview(cx+12, cy+12, cW-24, 130, map, unlocked);

      // Map name
      const nameColor = unlocked ? '#f5e06e' : '#555566';
      this.add.text(cx+cW/2, cy+150, (unlocked?'':' 🔒 ')+map.name, {
        fontSize:'14px', color:nameColor, fontStyle:'bold', align:'center',
        wordWrap:{width:cW-16}
      }).setOrigin(0.5,0);

      this.add.text(cx+cW/2, cy+170, map.subtitle, {
        fontSize:'10px', color:unlocked?'#887755':'#444455', fontStyle:'italic'
      }).setOrigin(0.5,0);

      // Difficulty stars
      const stars = '★'.repeat(map.difficulty) + '☆'.repeat(3-map.difficulty);
      const starColors = ['#44ff88','#ffcc00','#ff6644'];
      this.add.text(cx+cW/2, cy+188, stars, {
        fontSize:'18px', color:unlocked?starColors[map.difficulty-1]:'#333344'
      }).setOrigin(0.5,0);

      // HP / Speed multiplier badges
      if (unlocked) {
        const tags = [`⚔ HP ×${map.waveHpMul}`, `⚡ Spd ×${map.waveSpeedMul}`];
        tags.forEach((tag,ti)=>{
          const tbg = this.add.graphics();
          tbg.fillStyle(ti===0?0x2a0a0a:0x0a0a2a,1);
          tbg.fillRoundedRect(cx+8+ti*114, cy+214, 108, 22, 4);
          tbg.lineStyle(1, ti===0?0x882222:0x222288);
          tbg.strokeRoundedRect(cx+8+ti*114, cy+214, 108, 22, 4);
          this.add.text(cx+62+ti*114, cy+225, tag, {
            fontSize:'10px', color:ti===0?'#ff8888':'#8888ff', fontStyle:'bold'
          }).setOrigin(0.5);
        });
      }

      // Best score
      if (unlocked && bestScore > 0) {
        this.add.text(cx+cW/2, cy+244, `🏆 Best: ${bestScore.toLocaleString()}`, {
          fontSize:'11px', color:'#f0c030', fontStyle:'bold'
        }).setOrigin(0.5,0);
      } else if (!unlocked) {
        this.add.text(cx+cW/2, cy+244, 'Beat previous map to unlock', {
          fontSize:'10px', color:'#443344', fontStyle:'italic',
          align:'center', wordWrap:{width:cW-20}
        }).setOrigin(0.5,0);
      }

      // Start gold badge
      if (unlocked) {
        const sgbg = this.add.graphics();
        sgbg.fillStyle(0x1a1400,1); sgbg.fillRoundedRect(cx+cW/2-50,cy+270,100,22,5);
        sgbg.lineStyle(1,0xc8a200,0.6); sgbg.strokeRoundedRect(cx+cW/2-50,cy+270,100,22,5);
        this.add.text(cx+cW/2,cy+281,`💰 Start: $${map.startGold}`,{
          fontSize:'10px',color:'#f0c030',fontStyle:'bold'
        }).setOrigin(0.5);
      }

      if (unlocked) {
        bg.setInteractive(new Phaser.Geom.Rectangle(cx,cy,cW,cH), Phaser.Geom.Rectangle.Contains);
        bg.on('pointerover',()=>{ if(this._sel!==map.id) this._drawMapCard(bg,cx,cy,cW,cH,map,false,true,true); });
        bg.on('pointerout', ()=>this._drawMapCard(bg,cx,cy,cW,cH,map,this._sel===map.id,false,true));
        bg.on('pointerdown',()=>{ SFX.menuClick(); this._selectMap(map.id); });
      }

      // Selected check
      const check = this.add.text(cx+cW-18, cy+12, '✔', {
        fontSize:'16px', color:'#44ff88', fontStyle:'bold'
      }).setVisible(isSel);

      this._cards.push({bg,check,map,cx,cy,cW,cH,unlocked});
    });
  }

  _drawPathPreview(px, py, pw, ph, map, unlocked) {
    const prev = this.add.graphics();
    // Background
    const bgCol = unlocked ? parseInt(map.grassA.replace('#',''),16) : 0x0a0a14;
    prev.fillStyle(bgCol, 1);
    prev.fillRect(px,py,pw,ph);
    prev.lineStyle(1, unlocked?0x222222:0x111122);
    prev.strokeRect(px,py,pw,ph);

    if (!unlocked) {
      this.add.text(px+pw/2, py+ph/2, '🔒', {fontSize:'32px'}).setOrigin(0.5);
      return;
    }

    // Draw simplified path
    const pts = map.preview;
    const pathColor = parseInt(map.pathColor.replace('#',''),16);
    prev.lineStyle(6, pathColor, 0.9);
    prev.beginPath();
    pts.forEach(([xPct,yPct],i) => {
      const rx = px + xPct/100*pw, ry = py + yPct/100*ph;
      if(i===0) prev.moveTo(rx,ry); else prev.lineTo(rx,ry);
    });
    prev.strokePath();

    // Start/end dots
    const s=pts[0], e=pts[pts.length-1];
    prev.fillStyle(0x44ff44,1); prev.fillCircle(px+s[0]/100*pw, py+s[1]/100*ph, 5);
    prev.fillStyle(0xff4444,1); prev.fillCircle(px+e[0]/100*pw, py+e[1]/100*ph, 5);
    this.add.text(px+s[0]/100*pw+7, py+s[1]/100*ph-8, 'S', {fontSize:'9px',color:'#44ff44',fontStyle:'bold'});
    this.add.text(px+e[0]/100*pw+7, py+e[1]/100*ph-8, 'E', {fontSize:'9px',color:'#ff4444',fontStyle:'bold'});
  }

  _drawMapCard(g, cx, cy, cw, ch, map, sel, hov, unlocked) {
    g.clear();
    const borderCol = unlocked ? (sel ? 0xc8a200 : hov ? 0x886622 : 0x332211) : 0x1e1e2a;
    const fillCol   = unlocked ? (sel ? 0x12100a : hov ? 0x0e0c06 : 0x080604) : 0x060610;
    g.fillStyle(fillCol, 1); g.fillRoundedRect(cx,cy,cw,ch,10);
    g.lineStyle(sel?3:1, borderCol); g.strokeRoundedRect(cx,cy,cw,ch,10);
    if (sel) { g.fillStyle(0xc8a200,0.06); g.fillRoundedRect(cx,cy,cw,ch,10); }
  }

  _selectMap(id) {
    this._sel = id; GAME_STATE.map = id;
    this._cards.forEach(card => {
      this._drawMapCard(card.bg,card.cx,card.cy,card.cW,card.cH,card.map,card.map.id===id,false,card.unlocked);
      card.check.setVisible(card.map.id===id && card.unlocked);
    });
    if (this._startBg) { this._startBg.setVisible(true); this._startLbl.setVisible(true); }
  }

  _buildButtons() {
    const by = TOTAL_H - 62;
    const has = !!this._sel;

    const sbg = this.add.graphics().setVisible(has);
    const drawS = (h) => {
      sbg.clear();
      sbg.fillStyle(h?0x1a4a1a:0x0a2a0a,0.95); sbg.fillRoundedRect(W/2-160,by-22,320,54,10);
      sbg.lineStyle(2,h?0x88ff88:0x44aa44); sbg.strokeRoundedRect(W/2-160,by-22,320,54,10);
    };
    drawS(false);
    const slbl = this.add.text(W/2,by+6,'⚔  ENTER THE BATTLEFIELD  ⚔',{
      fontSize:'18px',color:'#88ff88',fontStyle:'bold'
    }).setOrigin(0.5).setVisible(has);
    sbg.setInteractive(new Phaser.Geom.Rectangle(W/2-160,by-22,320,54), Phaser.Geom.Rectangle.Contains);
    sbg.on('pointerover',()=>{drawS(true);slbl.setStyle({color:'#ffffff'});});
    sbg.on('pointerout', ()=>{drawS(false);slbl.setStyle({color:'#88ff88'});});
    sbg.on('pointerdown',()=>{
      if(!this._sel) return;
      SFX.gradeSelect();
      this.cameras.main.fade(500,0,0,0,false,(cam,p)=>{ if(p===1) this.scene.start('GameScene'); });
    });
    this._startBg = sbg; this._startLbl = slbl;

    if (!has) {
      this.add.text(W/2,by+6,'← Select a map above to begin →',{
        fontSize:'14px',color:'#554433',fontStyle:'italic'
      }).setOrigin(0.5);
    }

    // Back btn
    const bbg = this.add.graphics();
    bbg.fillStyle(0x1a1a0a,0.9); bbg.fillRoundedRect(20,TOTAL_H-52,110,36,6);
    bbg.lineStyle(1,0x443322); bbg.strokeRoundedRect(20,TOTAL_H-52,110,36,6);
    const blbl = this.add.text(75,TOTAL_H-34,'◀  Back',{fontSize:'13px',color:'#887755'}).setOrigin(0.5);
    bbg.setInteractive(new Phaser.Geom.Rectangle(20,TOTAL_H-52,110,36), Phaser.Geom.Rectangle.Contains);
    bbg.on('pointerover',()=>blbl.setStyle({color:'#c8a200'}));
    bbg.on('pointerout', ()=>blbl.setStyle({color:'#887755'}));
    bbg.on('pointerdown',()=>{ SFX.menuClick(); this.cameras.main.fade(300,0,0,0,false,(c,p)=>{ if(p===1) this.scene.start('GradeSelectScene'); }); });
  }
}

// ══════════════════════════════════════════════════════════════════════════════
//  GAME SCENE
// ══════════════════════════════════════════════════════════════════════════════
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  create() {
    // Re-generate textures in case this scene was restarted
    makeAllTextures(this);

    // Load selected map
    this._mapDef = MAPS.find(m=>m.id===GAME_STATE.map) || MAPS[0];
    const mapDef = this._mapDef;

    this.gold=mapDef.startGold; this.lives=20; this.wave=0; this.score=0;
    this.selectedTowerKey=null; this.selectedPlacedTower=null;
    this.towers=[]; this.enemies=[]; this.bullets=[]; this.soldiers=[];
    this.waveActive=false; this.gameOver=false; this.spawnQueue=[];
    this._lightningCharges = 0;
    this._hero = null;
    this._heroPowerCharged = false;
    this._heroRespawnTimer = null;

    this.pathSet=new Set(mapDef.path.map(([c,r])=>`${c},${r}`));
    this.pathPixels=mapDef.path.map(([c,r])=>({x:c*TILE+TILE/2,y:r*TILE+TILE/2}));
    this.occupiedTiles=new Set();

    this._gradeInfo=GRADES.find(g=>g.id===GAME_STATE.grade)||GRADES[2];
    this._qm = new QuestionManager(GAME_STATE.grade || '3');
    this._qModal = null;
    this._questionPending = false;
    this._freezeActive = false;

    this._buildMap();
    this._buildHUD();
    this._buildTowerPanel();
    this._spawnHero();
    this.time.delayedCall(900, () => this._showHeroTutorial());

    this.input.on('pointerdown',(p)=>{
      if(p.y>=H) return;
      const col=Math.floor(p.x/TILE), row=Math.floor(p.y/TILE);
      // Check if clicking the hero
      if(this._hero && this._hero.alive) {
        const hCol=Math.floor(this._hero.x/TILE), hRow=Math.floor(this._hero.y/TILE);
        if(col===hCol && row===hRow) { this._selectHero(); return; }
      }
      if(this.selectedTowerKey) this._placeTower(col,row);
      else {
        // Check if it's a barracks — show barracks panel
        const t=this.towers.find(t=>t.col===col&&t.row===row);
        if(t) this._selectPlacedTower(t); else this._deselectAll();
      }
    });
    this.input.keyboard.on('keydown-ESC',()=>this._deselectAll());

    this.cameras.main.fadeIn(600,0,0,0);
    this.time.delayedCall(1800,()=>this._startWave());
  }

  _buildMap() {
    const mapDef = this._mapDef;
    // Regenerate terrain textures with map-specific colors
    const makePxLocal = (key, w, h, fn) => {
      if (this.textures.exists(key)) this.textures.remove(key);
      const c = document.createElement('canvas'); c.width=w; c.height=h;
      fn(c.getContext('2d')); this.textures.addCanvas(key,c);
    };
    makePxLocal('grass_a',TILE,TILE,(ctx)=>{
      ctx.fillStyle=mapDef.grassA; ctx.fillRect(0,0,TILE,TILE);
      ctx.fillStyle=mapDef.grassB;
      for(let i=0;i<18;i++) ctx.fillRect(Math.floor(Math.random()*TILE),Math.floor(Math.random()*TILE),2,3);
      ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;ctx.strokeRect(0,0,TILE,TILE);
    });
    makePxLocal('grass_b',TILE,TILE,(ctx)=>{
      ctx.fillStyle=mapDef.grassB; ctx.fillRect(0,0,TILE,TILE);
      ctx.fillStyle=mapDef.grassA;
      for(let i=0;i<14;i++) ctx.fillRect(Math.floor(Math.random()*TILE),Math.floor(Math.random()*TILE),3,2);
      ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;ctx.strokeRect(0,0,TILE,TILE);
    });
    makePxLocal('path',TILE,TILE,(ctx)=>{
      const pc=mapDef.pathColor;
      ctx.fillStyle=pc; ctx.fillRect(0,0,TILE,TILE);
      ctx.fillStyle='rgba(0,0,0,0.15)';
      for(let i=0;i<14;i++) ctx.fillRect(Math.floor(Math.random()*TILE),Math.floor(Math.random()*TILE),4,2);
      ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1;ctx.strokeRect(0,0,TILE,TILE);
    });

    this.tileSprites={};
    for(let r=0;r<ROWS;r++){
      for(let c=0;c<COLS;c++){
        const key=`${c},${r}`, isPath=this.pathSet.has(key);
        const s=this.add.image(c*TILE,r*TILE,isPath?'path':(c+r)%2===0?'grass_a':'grass_b').setOrigin(0,0);
        if(!isPath){
          this.tileSprites[key]=s; s.setInteractive();
          s.on('pointerover',()=>{ if(this.selectedTowerKey) s.setTint(this.occupiedTiles.has(key)?0xff4444:0x88ff88); });
          s.on('pointerout', ()=>s.clearTint());
        }
      }
    }
    // Path direction arrows
    for(let i=0;i<mapDef.path.length-1;i++){
      const [c1,r1]=mapDef.path[i],[c2,r2]=mapDef.path[i+1];
      const dx=c2-c1,dy=r2-r1;
      this.add.text(c1*TILE+TILE/2-4,r1*TILE+TILE/2-7,dx>0?'›':dx<0?'‹':dy>0?'v':'^',{fontSize:'16px',color:'rgba(255,255,255,0.2)',fontStyle:'bold'});
    }
    const [sc,sr]=mapDef.startTile, [ec,er]=mapDef.endTile;
    this.add.text(sc*TILE+2,sr*TILE+4,'START ▶',{fontSize:'9px',color:'#ffff55',fontStyle:'bold',stroke:'#000',strokeThickness:2});
    this.add.text(ec*TILE+TILE-2,er*TILE+4,'◀ END',{fontSize:'9px',color:'#ff5555',fontStyle:'bold',stroke:'#000',strokeThickness:2}).setOrigin(1,0);

    // Map name watermark top-right
    this.add.text(W-8, 4, mapDef.emoji+'  '+mapDef.name, {
      fontSize:'10px', color:'rgba(255,255,200,0.25)', fontStyle:'italic'
    }).setOrigin(1,0);
  }

  _buildHUD() {

    g.lineStyle(2,0xf0a500,1);g.strokeRect(0,H,W,HUD_H);

    const stats=[['💰','GOLD','#f0c030',118],['❤️','LIVES','#ff8888',202],['⚡','WAVE','#88ddff',286]];
    stats.forEach(([icon,lbl,col,sx])=>{
      const sb=this.add.graphics();
      sb.fillStyle(0x111133,1);sb.fillRoundedRect(sx,H+4,80,62,4);
      sb.lineStyle(1,0x1e2255);sb.strokeRoundedRect(sx,H+4,80,62,4);
      this.add.text(sx+6,H+8,icon+' '+lbl,{fontSize:'8px',color:col,fontStyle:'bold'});
