<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1,minimum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Backyard Bug Battle - Math Edition</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a05;touch-action:none;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none}
#gc{width:100%;height:100%}
#quiz-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.88);z-index:9999;justify-content:center;align-items:center;font-family:Georgia,serif}
#quiz-overlay.active{display:flex}
#quiz-box{background:linear-gradient(135deg,#2E1B0E 0%,#4E342E 100%);border:3px solid #FFD54F;border-radius:16px;padding:22px 24px;max-width:580px;width:94%;max-height:92vh;overflow-y:auto;color:#FFF;position:relative}
#quiz-box h2{text-align:center;color:#FFD54F;font-size:22px;margin-bottom:2px}
.grade-label{text-align:center;color:#A5D6A7;font-size:12px;margin-bottom:6px}
.gold-earned{text-align:center;color:#FFD54F;font-size:15px;margin-bottom:6px}
.q-progress{margin:0 auto 12px;max-width:320px}
.q-progress-label{text-align:center;font-size:11px;color:#8D6E63;margin-bottom:3px}
.q-progress-track{height:8px;background:#3E2723;border-radius:4px;overflow:hidden}
.q-progress-fill{height:100%;background:linear-gradient(90deg,#FFD54F,#FF9800);border-radius:4px;transition:width 0.3s}
.q-category{color:#81C784;font-size:12px;margin-bottom:2px}
.q-text{font-size:18px;margin-bottom:14px;line-height:1.45;color:#FFF}
.q-shape-visual{text-align:center;margin:10px 0;padding:10px;background:rgba(255,255,255,0.06);border-radius:10px}
.q-shape-visual canvas{display:inline-block;border-radius:6px}
.q-options{display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.q-opt{background:#5D4037;border:2px solid #8D6E63;border-radius:12px;padding:16px 20px;font-size:18px;color:#FFF;cursor:pointer;font-family:Georgia,serif;text-align:left;transition:all 0.15s;min-height:52px;display:flex;align-items:center}
.q-opt:hover{background:#6D4C41;border-color:#FFD54F}
.q-opt.correct{background:#2E7D32!important;border-color:#66BB6A!important}
.q-opt.wrong{background:#C62828!important;border-color:#EF5350!important}
.q-feedback{font-size:15px;padding:12px;border-radius:8px;margin-bottom:12px;display:none;line-height:1.4}
.q-feedback.show{display:block}
.q-feedback.right{background:rgba(46,125,50,0.3);color:#A5D6A7}
.q-feedback.wrong-fb{background:rgba(198,40,40,0.3);color:#EF9A9A}
#quiz-btns{display:flex;gap:12px;justify-content:center;margin-top:12px;flex-wrap:wrap}
#quiz-btns button{padding:14px 28px;font-size:18px;font-family:Georgia,serif;border:none;border-radius:12px;cursor:pointer;font-weight:bold;min-height:50px}
#btn-next{background:#E65100;color:#FFF}
#btn-resume{background:#2E7D32;color:#FFF}
.wave-gate-label{text-align:center;color:#FF9800;font-size:14px;font-weight:bold;margin-bottom:8px;padding:6px;background:rgba(255,152,0,0.15);border-radius:8px}
</style>
</head>
<body>
<div id="gc"></div>
<div id="quiz-overlay"><div id="quiz-box"></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/phaser/3.60.0/phaser.min.js"></script>
<script>
'use strict';
const GW=1024,GH=600,FT=85,FB=390,UI_Y=400,BPX=60,BEX=GW-60,FCY=(FT+FB)/2;
const DEFS={ant:{name:'Ant',t:1,cost:20,sup:1,inc:4,hp:35,spd:1.6,dmg:6,as:800,rng:28,arm:'L',vs:null,sz:7,clr:0x8B6914,desc:'Cheap swarmer',proj:'dust'},aphid:{name:'Aphid',t:1,cost:30,sup:1,inc:5,hp:22,spd:1.3,dmg:9,as:1200,rng:120,arm:'L',vs:'A',sz:6,clr:0x7CB342,desc:'Ranged spitter',proj:'glob'},pillbug:{name:'Pill Bug',t:1,cost:35,sup:1,inc:5,hp:70,spd:1.0,dmg:4,as:1000,rng:28,arm:'A',vs:null,sz:9,clr:0x78909C,desc:'Armored tank',proj:'dust'},beetle:{name:'Beetle',t:2,cost:80,sup:2,inc:10,hp:120,spd:1.3,dmg:16,as:900,rng:30,arm:'A',vs:'L',sz:12,clr:0x4E342E,desc:'Armored bruiser',proj:'dust'},spider:{name:'Spider',t:2,cost:70,sup:2,inc:9,hp:55,spd:2.3,dmg:14,as:600,rng:28,arm:'L',vs:'L',sz:10,clr:0x6A1B9A,desc:'Fast assassin',proj:'fang'},firefly:{name:'Firefly',t:2,cost:90,sup:2,inc:11,hp:48,spd:1.8,dmg:18,as:1100,rng:140,arm:'L',vs:'A',sz:9,clr:0xF9A825,desc:'Ranged blaster',proj:'orb'},mantis:{name:'Mantis',t:3,cost:200,sup:4,inc:22,hp:210,spd:1.7,dmg:32,as:700,rng:32,arm:'A',vs:'L',sz:16,clr:0x2E7D32,desc:'Deadly predator',proj:'slash'},wasp:{name:'Wasp',t:3,cost:180,sup:3,inc:20,hp:105,spd:2.6,dmg:25,as:500,rng:28,arm:'L',vs:null,sz:13,clr:0xE65100,desc:'Speed stinger',proj:'sting'},stag:{name:'Stag Beetle',t:4,cost:500,sup:8,inc:40,hp:600,spd:0.9,dmg:65,as:1300,rng:34,arm:'A',vs:'A',sz:22,clr:0x880E4F,desc:'BOSS BUG!',proj:'shockwave'}};
const KEYS=Object.keys(DEFS);
const COUNTER_INFO={ant:'No bonus — economy!',aphid:'vs 🛡️ 1.5x',pillbug:'No bonus. Tank!',beetle:'vs 🏃 1.5x',spider:'vs 🏃 1.5x',firefly:'vs 🛡️ 1.5x',mantis:'vs 🏃 1.5x',wasp:'Pure speed!',stag:'vs 🛡️ 1.5x'};
const LEVELS=[{id:1,name:'The Sidewalk',unlock:['ant','aphid','pillbug'],eHP:600,pHP:800,aiMult:0.4,waveDur:20000,sky1:0x87CEEB,sky2:0xB0E0B0,g1:0x9E9E9E,g2:0x757575,props:['pebble','pebble','leaf'],desc:'Learn the basics!'},{id:2,name:'Garden Patch',unlock:['ant','aphid','pillbug'],eHP:700,pHP:800,aiMult:0.5,waveDur:19000,sky1:0x81D4FA,sky2:0xC5E1A5,g1:0x6D4C41,g2:0x5D4037,props:['flower','flower','pebble'],desc:'Rich soil!'},{id:3,name:'Under the Porch',unlock:['ant','aphid','pillbug','beetle'],eHP:800,pHP:900,aiMult:0.55,waveDur:19000,sky1:0x78909C,sky2:0x546E7A,g1:0x4E342E,g2:0x3E2723,props:['wood','wood','pebble'],desc:'Beetles emerge!'},{id:4,name:'Flower Bed',unlock:['ant','aphid','pillbug','beetle','spider'],eHP:900,pHP:900,aiMult:0.65,waveDur:18000,sky1:0x64B5F6,sky2:0xAED581,g1:0x558B2F,g2:0x33691E,props:['flower','flower','flower','mushroom'],desc:'Spiders join!'},{id:5,name:'The Sandbox',unlock:['ant','aphid','pillbug','beetle','spider','firefly'],eHP:1000,pHP:1000,aiMult:0.75,waveDur:18000,sky1:0xFFF9C4,sky2:0xFFE082,g1:0xD7CCC8,g2:0xBCAAA4,props:['pebble','pebble','shell'],desc:'Fireflies!'},{id:6,name:'Compost Heap',unlock:['ant','aphid','pillbug','beetle','spider','firefly'],eHP:1100,pHP:1000,aiMult:0.85,waveDur:17000,sky1:0xA5D6A7,sky2:0x81C784,g1:0x5D4037,g2:0x4E342E,props:['mushroom','mushroom','leaf','wood'],desc:'Enemy grows!'},{id:7,name:'Rain Puddle',unlock:['ant','aphid','pillbug','beetle','spider','firefly','mantis'],eHP:1200,pHP:1100,aiMult:0.95,waveDur:17000,sky1:0x90A4AE,sky2:0x78909C,g1:0x455A64,g2:0x37474F,props:['puddle','pebble','leaf'],desc:'Mantis appears!'},{id:8,name:'The Woodpile',unlock:['ant','aphid','pillbug','beetle','spider','firefly','mantis','wasp'],eHP:1400,pHP:1200,aiMult:1.1,waveDur:16000,sky1:0xFFCC80,sky2:0xFFB74D,g1:0x6D4C41,g2:0x5D4037,props:['wood','wood','wood','mushroom'],desc:'Wasps angry!'},{id:9,name:'Night Garden',unlock:['ant','aphid','pillbug','beetle','spider','firefly','mantis','wasp'],eHP:1600,pHP:1200,aiMult:1.25,waveDur:16000,sky1:0x263238,sky2:0x1B5E20,g1:0x1B5E20,g2:0x0D3B0D,props:['mushroom','mushroom','flower'],desc:'Darkness!'},{id:10,name:"Queen's Throne",unlock:KEYS.slice(),eHP:2000,pHP:1400,aiMult:1.5,waveDur:15000,sky1:0x880E4F,sky2:0x4A148C,g1:0x311B92,g2:0x1A237E,props:['crystal','crystal','mushroom','flower'],desc:'FINAL!'}];
function RS(c){return(Math.min(255,((c>>16)&0xFF)+70)<<16)|(Math.max(0,((c>>8)&0xFF)-40)<<8)|Math.max(0,(c&0xFF)-30)}
function DK(c,a){return(Math.max(0,((c>>16)&0xFF)-a)<<16)|(Math.max(0,((c>>8)&0xFF)-a)<<8)|Math.max(0,(c&0xFF)-a)}
function LT(c,a){return(Math.min(255,((c>>16)&0xFF)+a)<<16)|(Math.min(255,((c>>8)&0xFF)+a)<<8)|Math.min(255,(c&0xFF)+a)}
const AudioCtx=window.AudioContext||window.webkitAudioContext;let actx=null;
function initAudio(){if(!actx)try{actx=new AudioCtx()}catch(e){}}
function snd(t){if(!actx)return;try{const o=actx.createOscillator(),g=actx.createGain();o.connect(g);g.connect(actx.destination);const n=actx.currentTime;if(t==='hit'){o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(80,n+0.1);g.gain.setValueAtTime(0.12,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.1);o.type='square';o.start(n);o.stop(n+0.1);}else if(t==='die'){o.frequency.setValueAtTime(300,n);o.frequency.exponentialRampToValueAtTime(50,n+0.2);g.gain.setValueAtTime(0.1,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.2);o.type='sawtooth';o.start(n);o.stop(n+0.2);}else if(t==='spawn'){o.frequency.setValueAtTime(400,n);o.frequency.exponentialRampToValueAtTime(600,n+0.08);g.gain.setValueAtTime(0.07,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.1);o.type='sine';o.start(n);o.stop(n+0.1);}else if(t==='wave'){o.frequency.setValueAtTime(500,n);o.frequency.exponentialRampToValueAtTime(800,n+0.12);g.gain.setValueAtTime(0.08,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.25);o.type='sine';o.start(n);o.stop(n+0.25);}else if(t==='coin'){o.frequency.setValueAtTime(800,n);o.frequency.exponentialRampToValueAtTime(1200,n+0.1);g.gain.setValueAtTime(0.08,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.15);o.type='sine';o.start(n);o.stop(n+0.15);}else if(t==='basehit'){o.frequency.setValueAtTime(100,n);o.frequency.exponentialRampToValueAtTime(40,n+0.12);g.gain.setValueAtTime(0.15,n);g.gain.exponentialRampToValueAtTime(0.001,n+0.12);o.type='triangle';o.start(n);o.stop(n+0.12);}}catch(e){}}
let GRADE_BAND='2-3',activeGameScene=null;
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=randInt(0,i);[a[i],a[j]]=[a[j],a[i]];}return a}

// ===== QUESTIONS (same as before) =====
function genQ_23(){const qs=[],pick=()=>qs[randInt(0,qs.length-1)];const sh=[{n:'triangle',s:3},{n:'square',s:4},{n:'rectangle',s:4},{n:'pentagon',s:5},{n:'hexagon',s:6},{n:'octagon',s:8}];const s=sh[randInt(0,5)];qs.push({cat:'Shape ID',q:`How many sides does a ${s.n} have?`,opts:shuffle([s.s,s.s+1,s.s-1||3,s.s+2].map(String)),ans:''+s.s,explain:`A ${s.n} has ${s.s} sides.`,visual:'shape_'+s.n});const pw=randInt(2,8),ph=randInt(2,8),pe=2*(pw+ph);qs.push({cat:'Perimeter',q:`Rectangle: ${pw}×${ph}. Perimeter?`,opts:shuffle([''+pe,''+(pe+2),''+(pw*ph),''+(pe-2)]),ans:''+pe,explain:`${pw}+${ph}+${pw}+${ph}=${pe}`,visual:'rect_'+pw+'_'+ph});const ss=randInt(2,9),sp=ss*4;qs.push({cat:'Perimeter',q:`Square side=${ss}. Perimeter?`,opts:shuffle([''+sp,''+(sp+4),''+(ss*ss),''+(sp-2)]),ans:''+sp,explain:`4×${ss}=${sp}`,visual:'sq_'+ss});qs.push({cat:'Symmetry',q:'Most lines of symmetry?',opts:shuffle(['circle','triangle','rectangle','pentagon']),ans:'circle',explain:'Circle = infinite symmetry!'});const an=randInt(0,2),ad=[{v:randInt(15,85),t:'acute'},{v:90,t:'right'},{v:randInt(95,170),t:'obtuse'}][an];qs.push({cat:'Angles',q:`${ad.v}° angle type?`,opts:shuffle(['acute','right','obtuse','straight']),ans:ad.t,explain:`${ad.v}° = ${ad.t}`});const s3=[{n:'cube',f:6},{n:'sphere',f:0},{n:'cylinder',f:2}][randInt(0,2)];qs.push({cat:'3D Shapes',q:`Flat faces on ${s3.n}?`,opts:shuffle([s3.f,s3.f+2,s3.f+1,8].filter((v,i,a)=>a.indexOf(v)===i).map(String)).slice(0,4),ans:''+s3.f,explain:`${s3.n} = ${s3.f} flat faces`});return pick();}
function genQ_45(){const qs=[],pick=()=>qs[randInt(0,qs.length-1)];const aw=randInt(3,12),ah=randInt(3,12),ar=aw*ah;qs.push({cat:'Area',q:`Rectangle ${aw}×${ah}cm. Area?`,opts:shuffle([ar+' sq cm',(ar+aw)+' sq cm',(2*(aw+ah))+' sq cm',(ar-ah)+' sq cm']),ans:ar+' sq cm',explain:`${aw}×${ah}=${ar}`,visual:'rect_'+aw+'_'+ah});const pw=randInt(4,15),ph=randInt(4,15),pe=2*(pw+ph);qs.push({cat:'Perimeter',q:`Rectangle ${pw}m×${ph}m. Perimeter?`,opts:shuffle([pe+' m',(pw*ph)+' m',(pe+2)+' m',(pw+ph)+' m']),ans:pe+' m',explain:`2×(${pw}+${ph})=${pe}`,visual:'rect_'+pw+'_'+ph});const tb=randInt(4,14),th=randInt(4,14),ta=(tb*th)/2,ts=Number.isInteger(ta)?ta+'':ta.toFixed(1);qs.push({cat:'Triangle Area',q:`Triangle b=${tb}, h=${th}. Area?`,opts:shuffle([ts+' sq cm',(tb*th)+' sq cm',(tb+th)+' sq cm',(ta+tb)+' sq cm']),ans:ts+' sq cm',explain:`½×${tb}×${th}=${ts}`});const a1=randInt(30,80),a2=randInt(30,80),a3=180-a1-a2;if(a3>0&&a3<170)qs.push({cat:'Angles',q:`Triangle: ${a1}°+${a2}°+?=180°`,opts:shuffle([a3+'°',(a3+10)+'°',(a3-10)+'°','180°']),ans:a3+'°',explain:`180-${a1}-${a2}=${a3}`});const vl=randInt(2,8),vw=randInt(2,8),vh=randInt(2,8),vo=vl*vw*vh;qs.push({cat:'Volume',q:`Prism ${vl}×${vw}×${vh}cm. Volume?`,opts:shuffle([vo+' cu cm',(vl*vw)+' cu cm',(2*(vl+vw+vh))+' cu cm',(vo+vl)+' cu cm']),ans:vo+' cu cm',explain:`${vl}×${vw}×${vh}=${vo}`});const cx=randInt(1,9),cy=randInt(1,9);qs.push({cat:'Coordinates',q:`Point ${cx} right, ${cy} up?`,opts:shuffle([`(${cx},${cy})`,`(${cy},${cx})`,`(${cx+1},${cy-1})`,`(${cx},${cy+2})`]),ans:`(${cx},${cy})`,explain:`(x,y)=(${cx},${cy})`});const tt=[{n:'equilateral',d:'3 equal sides'},{n:'isosceles',d:'2 equal sides'},{n:'scalene',d:'no equal sides'},{n:'right',d:'one 90° angle'}][randInt(0,3)];qs.push({cat:'Triangles',q:`${tt.d} = ?`,opts:shuffle(['equilateral','isosceles','scalene','right']),ans:tt.n,explain:`${tt.n}: ${tt.d}`});return pick();}
function genQuestion(){return GRADE_BAND==='2-3'?genQ_23():genQ_45();}

// ===== QUIZ UI =====
const quizOverlay=document.getElementById('quiz-overlay'),quizBox=document.getElementById('quiz-box');
let quizGoldEarned=0,quizCorrect=0,quizTotal=0,quizActive=false,waveGateMode=false,waveGateRequired=0,waveGateAnswered=0,waveGateIncome=0;
function openQuiz(wg,inc){quizActive=true;quizGoldEarned=0;quizCorrect=0;quizTotal=0;waveGateMode=!!wg;waveGateRequired=wg?2:0;waveGateAnswered=0;waveGateIncome=inc||0;quizOverlay.classList.add('active');showNextQuestion();}
function closeQuiz(){quizActive=false;quizOverlay.classList.remove('active');if(activeGameScene){const tot=quizGoldEarned+(waveGateMode?waveGateIncome:0);activeGameScene.addGoldAnimated(tot);activeGameScene.scene.resume();if(tot>0)activeGameScene.showCoinShower(tot);waveGateMode=false;}}
function showNextQuestion(){const q=genQuestion(),rew=GRADE_BAND==='2-3'?15:25,isGate=waveGateMode&&waveGateAnswered<waveGateRequired;
  quizBox.innerHTML=`<h2>📐 Geometry Challenge!</h2>${isGate?'<div class="wave-gate-label">🌊 WAVE GATE — Answer '+waveGateRequired+' to earn income!</div>':''}<div class="grade-label">${GRADE_BAND} Grade | 💰${rew}/correct${waveGateMode?' + 💰'+waveGateIncome+' wave':''}</div><div class="gold-earned">Earned: 💰${quizGoldEarned} | ✅ ${quizCorrect}/${quizTotal}</div><div class="q-progress"><div class="q-progress-label">Q: ${quizTotal}${isGate?' (gate '+waveGateAnswered+'/'+waveGateRequired+')':''}</div><div class="q-progress-track"><div class="q-progress-fill" style="width:${Math.min(100,quizTotal*10)}%"></div></div></div><div class="q-category">${q.cat}</div><div class="q-text">${q.q}</div>${q.visual?'<div class="q-shape-visual"><canvas id="qcanvas" width="200" height="130"></canvas></div>':''}<div class="q-options">${q.opts.map(o=>`<div class="q-opt" data-val="${o}" onclick="handleAnswer(this,'${encodeURIComponent(q.ans)}',${rew})">${o}</div>`).join('')}</div><div class="q-feedback" id="q-fb"></div><div id="quiz-btns"><button id="btn-next" style="display:none" onclick="showNextQuestion()">Next ➡️</button>${!isGate?'<button id="btn-resume" onclick="closeQuiz()">🎮 Resume</button>':''}</div>`;
  if(q.visual)setTimeout(()=>{const cv=document.getElementById('qcanvas');if(cv)drawQV(cv.getContext('2d'),q.visual,cv.width,cv.height);},50);}
function handleAnswer(el,ea,rew){const ans=decodeURIComponent(ea),val=el.dataset.val;document.querySelectorAll('.q-opt').forEach(o=>{o.onclick=null;o.style.pointerEvents='none';});const fb=document.getElementById('q-fb'),nb=document.getElementById('btn-next');quizTotal++;if(waveGateMode)waveGateAnswered++;if(val===ans){el.classList.add('correct');quizCorrect++;quizGoldEarned+=rew;fb.className='q-feedback show right';fb.textContent='✅ Correct! +'+rew+'💰';snd('coin');}else{el.classList.add('wrong');document.querySelectorAll('.q-opt').forEach(o=>{if(o.dataset.val===ans)o.classList.add('correct');});fb.className='q-feedback show wrong-fb';fb.textContent='❌ Answer: '+ans;snd('die');}document.querySelector('.gold-earned').textContent='Earned: 💰'+quizGoldEarned+' | ✅ '+quizCorrect+'/'+quizTotal;const pf=document.querySelector('.q-progress-fill');if(pf)pf.style.width=Math.min(100,quizTotal*10)+'%';nb.style.display='inline-block';if(waveGateMode&&waveGateAnswered>=waveGateRequired&&!document.getElementById('btn-resume')){const b=document.createElement('button');b.id='btn-resume';b.textContent='🎮 Resume';b.onclick=closeQuiz;document.getElementById('quiz-btns').appendChild(b);}}
function drawQV(ctx,key,w,h){ctx.clearRect(0,0,w,h);ctx.fillStyle='#3E2723';ctx.fillRect(0,0,w,h);ctx.strokeStyle='#FFD54F';ctx.lineWidth=2;ctx.font='13px Georgia';if(key.startsWith('rect_')){const p=key.split('_'),rw=+p[1],rh=+p[2],sc=Math.min(140/rw,90/rh,12),dw=rw*sc,dh=rh*sc,rx=(w-dw)/2,ry=(h-dh)/2;ctx.strokeRect(rx,ry,dw,dh);ctx.fillStyle='rgba(129,199,132,0.15)';ctx.fillRect(rx,ry,dw,dh);ctx.fillStyle='#FFD54F';ctx.textAlign='center';ctx.fillText(rw,rx+dw/2,ry-6);ctx.fillText(rh,rx-16,ry+dh/2+5);}else if(key.startsWith('sq_')){const s=+key.split('_')[1],sc=Math.min(90/s,10),ds=s*sc,rx=(w-ds)/2,ry=(h-ds)/2;ctx.strokeRect(rx,ry,ds,ds);ctx.fillStyle='rgba(129,199,132,0.15)';ctx.fillRect(rx,ry,ds,ds);ctx.fillStyle='#FFD54F';ctx.textAlign='center';ctx.fillText(s,rx+ds/2,ry-6);}else if(key.startsWith('shape_')){const nm=key.replace('shape_',''),cx2=w/2,cy2=h/2,r=42;ctx.beginPath();const si={triangle:3,square:4,rectangle:4,pentagon:5,hexagon:6,octagon:8}[nm]||4;for(let i=0;i<si;i++){const a=i*Math.PI*2/si-Math.PI/2;i===0?ctx.moveTo(cx2+r*Math.cos(a),cy2+r*Math.sin(a)):ctx.lineTo(cx2+r*Math.cos(a),cy2+r*Math.sin(a));}ctx.closePath();ctx.stroke();ctx.fillStyle='rgba(129,199,132,0.1)';ctx.fill();ctx.fillStyle='#A5D6A7';ctx.textAlign='center';ctx.fillText(nm,cx2,cy2+r+16);}}

// ===== TEXTURES =====
function genTex(sc){
  KEYS.forEach(key=>{const d=DEFS[key];['p','e'].forEach(team=>{const isP=team==='p',sz=d.sz,w=sz*4+8,h=sz*4+8;
    for(let fr=0;fr<2;fr++){const tK=key+'_'+team+'_'+fr,g=sc.make.graphics({add:false}),cx=w/2,cy=h/2;

  addGoldAnimated(amount){

  // ===== UNIQUE PROJECTILES =====
  fireProjectile(u,target,dir){
    const pType=u.d.proj||'dust';
    const texKey='proj_'+pType;
    if(pType==='dust'){
      // Melee dust puff at impact point
      const p=this.add.image(target.spr.x,target.spr.y,texKey).setDepth(15).setScale(1.5).setAlpha(0.7);
      this.tweens.add({targets:p,scaleX:3,scaleY:3,alpha:0,duration:250,onComplete:()=>p.destroy()});
    }else if(pType==='shockwave'){

      const p=this.add.image(u.spr.x+dir*15,u.spr.y,texKey).setDepth(15).setScale(0.5);
      this.tweens.add({targets:p,x:target.spr.x,y:target.spr.y,scaleX:2.5,scaleY:2.5,alpha:0,duration:300,onComplete:()=>p.destroy()});
    }else if(pType==='slash'){

      const p=this.add.image((u.spr.x+target.spr.x)/2,(u.spr.y+target.spr.y)/2,texKey).setDepth(15).setScale(2).setAngle(dir>0?0:180);
      this.tweens.add({targets:p,scaleX:3,alpha:0,duration:200,onComplete:()=>p.destroy()});
    }else{
      // Flying projectile (glob, orb, fang, sting)
      const p=this.add.image(u.spr.x,u.spr.y,texKey).setDepth(15).setScale(pType==='orb'?1.5:1.2);
      this.tweens.add({targets:p,x:target.spr.x,y:target.spr.y,duration:pType==='orb'?180:120,onComplete:()=>{
        // Impact flash
        const flash=this.add.circle(target.spr.x,target.spr.y,6,pType==='glob'?0x7CB342:pType==='orb'?0xFFD54F:pType==='fang'?0xCE93D8:0xFFCC80,0.5).setDepth(16);
        this.tweens.add({targets:flash,scaleX:2,scaleY:2,alpha:0,duration:150,onComplete:()=>flash.destroy()});
        p.destroy();
      }});
    }
  }

  update(time,delta){if(this.over)return;

  proc(units,enemies,dir,time,dt){for(let i=0;i<units.length;i++){const u=units[i];if(!u.alive)continue;let closest=null,closestD=Infinity;for(let j=0;j<enemies.length;j++){const e=enemies[j];if(!e.alive)continue;const dx=u.spr.x-e.spr.x,dy=u.spr.y-e.spr.y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<closestD){closestD=dist;closest=e;}}const ar=u.d.rng+(closest?closest.d.sz:0)+u.d.sz;if(closest&&closestD<=ar){if(time-u.lastAtk>u.d.as){u.lastAtk=time;let dmg=u.d.dmg,bonus=false;if(u.d.vs==='L'&&closest.d.arm==='L'){dmg=Math.floor(dmg*1.5);bonus=true;}if(u.d.vs==='A'&&closest.d.arm==='A'){dmg=Math.floor(dmg*1.5);bonus=true;}closest.hp-=dmg;if(u.team==='p')this.statDmg+=dmg;this.showDmg(closest.spr.x,closest.spr.y,dmg,bonus);snd('hit');
      // UNIQUE PROJECTILE
      this.fireProjectile(u,closest,dir);
      this.tweens.add({targets:closest.spr,x:closest.spr.x+(dir*3),duration:50,yoyo:true});this.tweens.add({targets:u.spr,scaleX:1.12,scaleY:0.88,duration:55,yoyo:true});
      // HP BAR FLASH WHITE ON DAMAGE
      const origTint=closest.hpFill.fillColor;closest.hpFill.setFillStyle(0xFFFFFF);this.time.delayedCall(80,()=>{if(closest.hpFill&&closest.hpFill.active)closest.hpFill.setFillStyle(closest.team==='p'?0x4CAF50:0xEF5350);});
      closest.hpFill.setDisplaySize(closest.hpW*Math.max(0,closest.hp/closest.mhp),3);}}else{u.spr.x+=u.d.spd*dt*dir;if(closest&&closestD<300){const yd=closest.spr.y-u.spr.y;u.spr.y+=Math.sign(yd)*Math.min(Math.abs(yd),u.d.spd*0.3*dt);}}u.spr.x=Phaser.Math.Clamp(u.spr.x,BPX-10,BEX+10);u.spr.y=Phaser.Math.Clamp(u.spr.y,FT+15,FB-10);}}
  baseAtk(units,enemies,tgt,time){const bx=tgt==='e'?BEX:BPX;for(let i=0;i<units.length;i++){const u=units[i];if(!u.alive)continue;if(Math.abs(u.spr.x-bx)<45){let hasE=false;for(let j=0;j<enemies.length;j++){if(!enemies[j].alive)continue;const dx=u.spr.x-enemies[j].spr.x,dy=u.spr.y-enemies[j].spr.y;if(Math.sqrt(dx*dx+dy*dy)<u.d.rng+enemies[j].d.sz+u.d.sz+20){hasE=true;break;}}if(hasE)continue;if(time-u.lastAtk>u.d.as){u.lastAtk=time;const dmg=Math.floor(u.d.dmg*0.5);snd('basehit');if(tgt==='e'){this.eHP-=dmg;this.cameras.main.shake(70,0.003);this.tweens.add({targets:this.eBaseG,alpha:0.4,duration:60,yoyo:true});this.showDmg(BEX,FCY,dmg,false);}else{this.pHP-=dmg;this.cameras.main.shake(90,0.005);this.tweens.add({targets:this.pBaseG,alpha:0.4,duration:60,yoyo:true});this.showDmg(BPX,FCY,dmg,false);}}}}}
  baseDef(eu,bx,time,bd){for(let i=0;i<eu.length;i++){const u=eu[i];if(!u.alive)continue;if(Math.abs(u.spr.x-bx)<50){if(!u._bht)u._bht=0;if(time-u._bht>2000){u._bht=time;u.hp-=bd;u.hpFill.setDisplaySize(u.hpW*Math.max(0,u.hp/u.mhp),3);this.showDmg(u.spr.x,u.spr.y,bd,false);}}}}

  // ===== BODY FRAGMENT DEATH =====
  cleanup(units,team){for(let i=units.length-1;i>=0;i--){const u=units[i];if(u.hp<=0&&u.alive){u.alive=false;const sx=u.spr.x,sy=u.spr.y;snd('die');

    for(let fi=0;fi<3;fi++){
      const fKey=u.key+'_'+u.team+'_frag'+fi;
      const frag=this.add.image(sx+Phaser.Math.Between(-3,3),sy+Phaser.Math.Between(-3,3),fKey).setDepth(12).setScale(Phaser.Math.FloatBetween(0.8,1.3));
      const angle=Phaser.Math.Between(-200,200);
      this.tweens.add({targets:frag,
        x:frag.x+Phaser.Math.Between(-25,25),
        y:frag.y+Phaser.Math.Between(-30,5),
        angle:angle,alpha:0,scaleX:0.2,scaleY:0.2,
        duration:Phaser.Math.Between(350,600),
        ease:'Cubic.easeOut',
        onComplete:()=>frag.destroy()});
    }
    // Dirt particles
    for(let p=0;p<4;p++){const pt=this.add.image(sx+Phaser.Math.Between(-4,4),sy+Phaser.Math.Between(-3,3),'dirt').setDepth(12).setScale(Phaser.Math.FloatBetween(0.4,1));this.tweens.add({targets:pt,x:pt.x+Phaser.Math.Between(-14,14),y:pt.y+Phaser.Math.Between(-18,-3),alpha:0,scaleX:0.1,scaleY:0.1,duration:Phaser.Math.Between(200,380),onComplete:()=>pt.destroy()});}
    // Remove sprite with quick fade
    this.tweens.add({targets:u.spr,alpha:0,duration:150,onComplete:()=>u.spr.destroy()});
    u.hpBg.destroy();u.hpFill.destroy();u.wt.remove();if(team==='p')this.pSup=Math.max(0,this.pSup-u.d.sup);else this.eSup=Math.max(0,this.eSup-u.d.sup);units.splice(i,1);this.refreshUI();}}}

  endGame(won){this.over=true;activeGameScene=null;this.pUnits.concat(this.eUnits).forEach(u=>{if(u.wt)u.wt.remove();});snd(won?'coin':'die');this.cameras.main.shake(300,won?0.01:0.02);
    if(won&&this.levelId){try{const cur=parseInt(localStorage.getItem('bbb_progress'))||1;if(this.levelId>=cur)localStorage.setItem('bbb_progress',''+(this.levelId+1));}catch(e){}}
    this.time.delayedCall(600,()=>{this.add.rectangle(GW/2,GH/2,GW,GH,0x000000,0.65).setDepth(200);
      this.add.text(GW/2,GH/2-75,(won?'🎉 VICTORY!':'😵 DEFEATED!')+(this.levelId&&won?'\nLevel '+this.levelId+' Done!':''),{fontSize:'28px',fontFamily:'Georgia,serif',color:won?'#66BB6A':'#EF5350',align:'center',fontStyle:'bold',stroke:'#000',strokeThickness:4,lineSpacing:5}).setOrigin(0.5).setDepth(201);
      this.add.text(GW/2,GH/2-25,'Waves:'+this.wave+' Bugs:'+this.statSpawned+' Dmg:'+this.statDmg,{fontSize:'11px',fontFamily:'Georgia,serif',color:'#FFCC80'}).setOrigin(0.5).setDepth(201);
      const by=GH/2+15;
      if(this.levelId){this.add.text(GW/2-110,by,'🔄 Retry',{fontSize:'16px',fontFamily:'Georgia,serif',color:'#FFF',fontStyle:'bold',backgroundColor:'#E65100',padding:{x:10,y:7}}).setOrigin(0.5).setDepth(201).setInteractive({useHandCursor:true}).on('pointerdown',()=>this.scene.start('GameScene',{level:this.levelId,difficulty:'campaign'}));
        if(won&&this.levelId<10)this.add.text(GW/2,by,'▶ Next',{fontSize:'16px',fontFamily:'Georgia,serif',color:'#FFF',fontStyle:'bold',backgroundColor:'#2E7D32',padding:{x:10,y:7}}).setOrigin(0.5).setDepth(201).setInteractive({useHandCursor:true}).on('pointerdown',()=>this.scene.start('GameScene',{level:this.levelId+1,difficulty:'campaign'}));
        this.add.text(GW/2+110,by,'🗺️ Map',{fontSize:'16px',fontFamily:'Georgia,serif',color:'#FFF',fontStyle:'bold',backgroundColor:'#4E342E',padding:{x:10,y:7}}).setOrigin(0.5).setDepth(201).setInteractive({useHandCursor:true}).on('pointerdown',()=>this.scene.start('CampaignScene'));
      }else{this.add.text(GW/2-70,by,'🔄 Again',{fontSize:'16px',fontFamily:'Georgia,serif',color:'#FFF',fontStyle:'bold',backgroundColor:'#2E7D32',padding:{x:10,y:7}}).setOrigin(0.5).setDepth(201).setInteractive({useHandCursor:true}).on('pointerdown',()=>this.scene.start('GameScene',{level:null,difficulty:this.diff}));
        this.add.text(GW/2+70,by,'🏠 Menu',{fontSize:'16px',fontFamily:'Georgia,serif',color:'#FFF',fontStyle:'bold',backgroundColor:'#4E342E',padding:{x:10,y:7}}).setOrigin(0.5).setDepth(201).setInteractive({useHandCursor:true}).on('pointerdown',()=>this.scene.start('MenuScene'));}
    });
  }
}

new Phaser.Game({type:Phaser.AUTO,width:GW,height:GH,parent:'gc',scale:{mode:Phaser.Scale.FIT,autoCenter:Phaser.Scale.CENTER_BOTH},scene:[MenuScene,CampaignScene,GameScene],input:{activePointers:3},render:{pixelArt:false,antialias:true}});
</script>
</body>
