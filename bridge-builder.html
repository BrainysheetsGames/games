<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bridge Builder: Perimeter Panic</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Lilita+One&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none;-webkit-touch-callout:none}
        body,html{width:100%;height:100vh;height:100dvh;overflow:hidden;touch-action:none;font-family:'Fredoka',sans-serif;background:#1a1a2e}
        canvas{display:block;width:100%;height:100%;position:absolute;top:0;left:0}
    </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,DPR,CELL,OX,OY;
const COLS=16,ROWS=12,CLIFF_H=5,INV_H=2.5;

// ── AUDIO ──────────────────────────────────────────────────────────────
const Snd={
    ctx:null,
    init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==='suspended')this.ctx.resume()},
    _p(f,t,d,v,det=0){if(!this.ctx)return;const o=this.ctx.createOscillator(),g=this.ctx.createGain();o.type=t;o.frequency.value=f;o.detune.value=det;g.gain.setValueAtTime(v,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+d);o.connect(g);g.connect(this.ctx.destination);o.start();o.stop(this.ctx.currentTime+d)},
    _n(d,v){if(!this.ctx)return;const b=this.ctx.createBuffer(1,this.ctx.sampleRate*d,this.ctx.sampleRate),ch=b.getChannelData(0);for(let i=0;i<ch.length;i++)ch[i]=Math.random()*2-1;const s=this.ctx.createBufferSource(),g=this.ctx.createGain(),f=this.ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=800;s.buffer=b;g.gain.setValueAtTime(v,this.ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,this.ctx.currentTime+d);s.connect(f);f.connect(g);g.connect(this.ctx.destination);s.start();s.stop(this.ctx.currentTime+d)},
    snap(){this._p(600,'sine',.08,.25);this._p(800,'sine',.06,.15);this._n(.03,.1)},
    pickup(){this._p(400,'sine',.05,.15)},
    rotate(){this._p(500,'triangle',.06,.15);this._p(700,'triangle',.04,.1)},
    error(){this._p(200,'square',.15,.2);this._p(150,'square',.2,.15)},
    crash(){this._n(.6,.4);this._p(80,'sawtooth',.5,.3);setTimeout(()=>{this._p(60,'sawtooth',.4,.25);this._n(.3,.3)},100);setTimeout(()=>this._n(.2,.2),250)},
    splash(){this._n(.4,.3);this._p(200,'sine',.3,.15);this._p(150,'sine',.4,.1)},
    creak(){this._p(120,'sawtooth',.3,.1);this._p(130,'sawtooth',.25,.08)},
    win(){[523,659,784,1047].forEach((n,i)=>setTimeout(()=>{this._p(n,'sine',.25,.2);this._p(n*.5,'triangle',.3,.1)},i*120));setTimeout(()=>this._p(1047,'sine',.5,.25),500)},
    click(){this._p(900,'sine',.03,.15)},
    lockIn(){this._p(880,'sine',.15,.25);setTimeout(()=>this._p(1100,'sine',.2,.25),80);setTimeout(()=>this._p(1320,'sine',.3,.2),160)},
    perimTick(){this._p(600+Math.random()*400,'sine',.04,.08)},
    overPerim(){this._p(200,'sawtooth',.15,.15);this._p(180,'square',.1,.1)},
    cartRoll(){this._n(.05,.03)},
    undo(){this._p(500,'sine',.06,.12);this._p(350,'sine',.08,.1)},
    buy(){this._p(660,'sine',.1,.2);setTimeout(()=>this._p(880,'sine',.15,.2),80)},
    stressHit(){this._n(.15,.3);this._p(100,'square',.15,.2)},
    combo(){this._p(700,'sine',.08,.15);this._p(900,'sine',.1,.12);this._p(1100,'sine',.12,.1)},
    windGust(){this._n(.3,.08)},
};

// ── EASING & TWEENS ────────────────────────────────────────────────────
const ease={
    outBack:t=>1+2.7*Math.pow(t-1,3)+1.7*Math.pow(t-1,2),
    outElastic:t=>t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-.75)*(2*Math.PI)/3)+1,
    outCubic:t=>1-Math.pow(1-t,3),
    outQuad:t=>1-(1-t)*(1-t),
};
const tweens=[];
function tw(o,p,d,e=ease.outCubic,cb=null){const s={};for(const k in p)s[k]=o[k];tweens.push({o,s,end:p,d,el:0,e,cb})}
function updateTweens(dt){for(let i=tweens.length-1;i>=0;i--){const t=tweens[i];t.el+=dt;const p=Math.min(t.el/t.d,1),v=t.e(p);for(const k in t.end)t.o[k]=t.s[k]+(t.end[k]-t.s[k])*v;if(p>=1){if(t.cb)t.cb();tweens.splice(i,1)}}}

// ── PARTICLES ──────────────────────────────────────────────────────────
let particles=[];
function emit(x,y,col,n=12,opts={}){for(let i=0;i<n;i++){const a=opts.angle!=null?opts.angle+(Math.random()-.5)*.5:Math.random()*Math.PI*2,sp=(opts.speed||3)*(.5+Math.random());particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-(opts.upward?2:0),sz:(opts.size||4)*(.5+Math.random()),col:Array.isArray(col)?col[Math.floor(Math.random()*col.length)]:col,life:1,decay:.015+Math.random()*.02,grav:opts.gravity!=null?opts.gravity:.15,shape:opts.shape||'circle',rot:Math.random()*Math.PI*2,rs:(Math.random()-.5)*.3})}}
function updateParticles(){for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=p.grav;p.vx*=.98;p.life-=p.decay;p.rot+=p.rs;if(p.life<=0)particles.splice(i,1)}}
function drawParticles(){for(const p of particles){X.save();X.globalAlpha=p.life;X.translate(p.x,p.y);X.rotate(p.rot);X.fillStyle=p.col;if(p.shape==='star'){X.beginPath();for(let i=0;i<10;i++){const r=i%2===0?p.sz:p.sz*.4,a=Math.PI*i/5-Math.PI/2;i===0?X.moveTo(r*Math.cos(a),r*Math.sin(a)):X.lineTo(r*Math.cos(a),r*Math.sin(a))}X.closePath();X.fill()}else if(p.shape==='square'){X.fillRect(-p.sz/2,-p.sz/2,p.sz,p.sz)}else{X.beginPath();X.arc(0,0,p.sz,0,Math.PI*2);X.fill()}X.restore()}}

// ── THEMES ─────────────────────────────────────────────────────────────
const THEMES={
    meadow:{skyTop:'#1e3a5f',skyMid:'#4a90d9',skyBot:'#87ceeb',water:'#2980b9',waterDeep:'#1a5276',waterFoam:'#aed6f1',cliff:'#6d4c41',cliffTop:'#4caf50',cliffGrass:'#66bb6a',cliffDk:'#4e342e',name:'Meadow'},
    lava:{skyTop:'#1a0a00',skyMid:'#4a1500',skyBot:'#8a3000',water:'#e65100',waterDeep:'#bf360c',waterFoam:'#ff9800',cliff:'#37474f',cliffTop:'#455a64',cliffGrass:'#546e7a',cliffDk:'#263238',name:'Volcano'},
    ice:{skyTop:'#0d1b2a',skyMid:'#1b3a5c',skyBot:'#a8d8ea',water:'#4fc3f7',waterDeep:'#0277bd',waterFoam:'#e1f5fe',cliff:'#90a4ae',cliffTop:'#cfd8dc',cliffGrass:'#eceff1',cliffDk:'#607d8b',name:'Frozen'},
};
let theme=THEMES.meadow;
const COL={plankWood:'#e67e22',plankLight:'#f39c12',plankDark:'#d35400',steelBody:'#78909c',steelLight:'#b0bec5',steelDark:'#546e7a',cartBody:'#c0392b',cartRoof:'#e74c3c',cartWindow:'#ebf5fb',cartWheel:'#2c3e50',gridLine:'rgba(255,255,255,0.08)',perimOk:'#f1c40f',perimGood:'#2ecc71',perimBad:'#e74c3c',gold:'#f1c40f',starGold:'#f1c40f',starEmpty:'#555',uiBg:'rgba(0,0,0,0.7)',obstacle:'#78909c',obsDk:'#546e7a'};

// ── GAME STATE ─────────────────────────────────────────────────────────
let G={scene:'TITLE',level:0,gold:0,currentP:0,targetP:0,spansGap:false,shake:0,shakeX:0,shakeY:0,time:0,
    settings:{showLabels:true,showGrid:true,showPerimAnt:true},
    stars:[],bestTimes:[],levelTimer:0,tutorialStep:0,tutorialLevel:-1,creakTimer:0,
    streak:0,undoStack:[],perimLocked:false,perimGlowAlpha:0,
    shopItems:[{id:'hint',name:'💡 Hint',desc:'Shows ghost outline',cost:100,owned:0},{id:'steel',name:'🔩 Steel Plank',desc:'Extra strong bridge piece',cost:200,owned:0},{id:'tape',name:'🩹 Bridge Tape',desc:'Merge two planks',cost:150,owned:0}],
    stressTest:false,stressWeight:0,stressDrops:[],stressSurvived:0,stressBonusGiven:false,
    bridgeSag:{},windActive:false,windTimer:0,windDir:0,windStr:0,
    earnedGold:0,earnedStars:0,earnedTime:0,earnedTimeLimit:60,earnedCombo:false,failReason:''
};

function saveGame(){try{localStorage.setItem('bb4',JSON.stringify({gold:G.gold,stars:G.stars,bestTimes:G.bestTimes,settings:G.settings,streak:G.streak,shop:G.shopItems.map(s=>s.owned)}))}catch(e){}}
function loadGame(){try{const d=JSON.parse(localStorage.getItem('bb4'));if(d){G.gold=d.gold||0;G.stars=d.stars||[];G.bestTimes=d.bestTimes||[];G.streak=d.streak||0;if(d.settings)G.settings={...G.settings,...d.settings};if(d.shop)d.shop.forEach((v,i)=>{if(G.shopItems[i])G.shopItems[i].owned=v})}}catch(e){}}

// ── LEVELS ─────────────────────────────────────────────────────────────
const LEVELS=[
    {gapStart:5,gapWidth:3,targetP:8,inv:[3],hint:"Drag the plank across the gap!",world:1,name:"First Steps",starTime:30,theme:'meadow'},
    {gapStart:5,gapWidth:4,targetP:10,inv:[4],hint:"A 4-unit plank: perimeter = 10",world:1,name:"Longer Span",starTime:30,theme:'meadow'},
    {gapStart:4,gapWidth:3,targetP:10,inv:[2,2],hint:"Two side-by-side = more perimeter!",world:1,name:"Double Up",starTime:45,theme:'meadow'},
    {gapStart:5,gapWidth:4,targetP:12,inv:[4,1],hint:"Stack a block on top for more perimeter",world:1,name:"Stack Attack",starTime:45,theme:'meadow'},
    {gapStart:4,gapWidth:4,targetP:14,inv:[4,2],hint:"Place extra piece to bump perimeter",world:1,name:"Bumpy Road",starTime:45,theme:'meadow'},
    {gapStart:4,gapWidth:5,targetP:14,inv:[3,2],hint:"Bridge the full gap!",world:2,name:"Mind the Gap",starTime:60,theme:'lava',obstacles:[{x:6,y:5}]},
    {gapStart:4,gapWidth:5,targetP:16,inv:[3,2,1],hint:"Stack to increase perimeter!",world:2,name:"Tower Bridge",starTime:60,theme:'lava'},
    {gapStart:3,gapWidth:5,targetP:18,inv:[3,2,2],hint:"Multiple planks = more edges",world:2,name:"Patchwork",starTime:60,theme:'lava',obstacles:[{x:5,y:5}]},
    {gapStart:4,gapWidth:4,targetP:14,inv:[2,2,2],hint:"Three planks — arrange carefully!",world:2,name:"Trio",starTime:60,theme:'lava'},
    {gapStart:3,gapWidth:6,targetP:18,inv:[4,2,1],hint:"Every piece to span this gap!",world:2,name:"All Hands",starTime:75,theme:'lava'},
    {gapStart:3,gapWidth:6,targetP:22,inv:[4,2,2,1],hint:"Bumpy bridge for max perimeter!",world:3,name:"Zigzag",starTime:90,theme:'ice',wind:true},
    {gapStart:3,gapWidth:6,targetP:20,inv:[3,3,1,1],hint:"Symmetry is your friend",world:3,name:"Mirror",starTime:90,theme:'ice'},
    {gapStart:3,gapWidth:7,targetP:24,inv:[4,3,2,1],hint:"Big gap — plan carefully!",world:3,name:"Grand Canyon",starTime:90,theme:'ice',obstacles:[{x:5,y:4},{x:7,y:5}]},
    {gapStart:3,gapWidth:5,targetP:20,inv:[3,2,1,1,1],hint:"Small pieces = many options",world:3,name:"Mosaic",starTime:90,theme:'ice',wind:true},
    {gapStart:2,gapWidth:8,targetP:28,inv:[4,4,2,1,1],hint:"Master builder challenge!",world:3,name:"Architect",starTime:120,theme:'ice',obstacles:[{x:5,y:4}],wind:true},
];

let levelData=null,planks=[],dragPlank=null,dragOX=0,dragOY=0,lastTap=0;
let cart={x:0,y:0,w:1.8,h:1.2,vx:0,vy:0,active:false,wheelRot:0};
let physicsDebris=[],antProgress=0,perimSegs=[];
let clouds=[],birds=[],bgMountains=[];
let worker={x:0,y:0,emoji:'😊',timer:0};
let buttons=[],obstacles=[];

// ── RESIZE ─────────────────────────────────────────────────────────────
function resize(){DPR=window.devicePixelRatio||1;W=window.innerWidth;H=window.innerHeight;C.width=W*DPR;C.height=H*DPR;C.style.width=W+'px';C.style.height=H+'px';X.setTransform(DPR,0,0,DPR,0,0);CELL=Math.min(W/(COLS+2),(H*.78)/ROWS);if(CELL<18)CELL=18;OX=(W-COLS*CELL)/2;OY=(H-ROWS*CELL)/2-CELL*.5}
window.addEventListener('resize',resize);resize();

function initBg(){clouds=[];for(let i=0;i<6;i++)clouds.push({x:Math.random()*W*1.5,y:20+Math.random()*H*.2,w:60+Math.random()*100,speed:.15+Math.random()*.3,op:.3+Math.random()*.4});birds=[];for(let i=0;i<3;i++)birds.push({x:Math.random()*W,y:40+Math.random()*80,speed:.8+Math.random()*1.2,wing:Math.random()*Math.PI*2});bgMountains=[];for(let i=0;i<8;i++)bgMountains.push({x:i*W/5-W*.1,h:60+Math.random()*100,w:100+Math.random()*150,col:`hsl(${210+Math.random()*20},${20+Math.random()*15}%,${30+Math.random()*15}%)`})}
initBg();

// ── LEVEL LOADING ──────────────────────────────────────────────────────
function loadLevel(idx){
    G.level=idx;G.scene='BUILDING';G.shake=0;G.creakTimer=0;G.levelTimer=0;
    G.undoStack=[];G.perimLocked=false;G.perimGlowAlpha=0;
    G.stressTest=false;G.stressWeight=0;G.stressDrops=[];G.stressSurvived=0;G.stressBonusGiven=false;
    G.bridgeSag={};G.windActive=false;G.windTimer=0;G.windDir=0;G.windStr=0;
    particles=[];physicsDebris=[];cart.active=false;cart.vx=0;cart.vy=0;antProgress=0;
    if(idx<LEVELS.length){levelData={...LEVELS[idx]};theme=THEMES[levelData.theme||'meadow']||THEMES.meadow;obstacles=(levelData.obstacles||[]).map(o=>({...o}))}
    else{const gap=4+Math.floor(Math.random()*4),inv=[gap],extras=1+Math.floor(Math.random()*3);for(let i=0;i<extras;i++)inv.push(1+Math.floor(Math.random()*3));const tA=inv.reduce((a,b)=>a+b,0),baseP=tA<=gap?gap*2+2:(gap*2+2)+extras*2+Math.floor(Math.random()*4)*2;levelData={gapStart:3+Math.floor(Math.random()*2),gapWidth:gap,targetP:baseP,inv,hint:"Endless mode!",world:4,name:`Puzzle #${idx-LEVELS.length+1}`,starTime:60+gap*10,theme:'meadow'};theme=THEMES.meadow;obstacles=[]}
    G.targetP=levelData.targetP;genInv(levelData.inv);updateBridge();
    if(idx<=2&&G.tutorialLevel<idx){G.tutorialStep=0;G.tutorialLevel=idx}
    worker.x=levelData.gapStart-1.5;worker.y=ROWS-CLIFF_H-1.2;worker.emoji='😊';
    buildButtons();
}

function genInv(lengths){
    planks=[];let ix=1,iy=ROWS-INV_H+.3;
    lengths.forEach((len,i)=>{const p={id:i,w:len,h:1,gx:ix,gy:iy,placed:false,homeX:ix,homeY:iy,type:'wood',scaleX:0,scaleY:0,glowAlpha:0};tw(p,{scaleX:1,scaleY:1},.4+i*.1,ease.outBack);planks.push(p);ix+=len+.5;if(ix>COLS-2){ix=1;iy+=1.5}});
}

// ── UNDO ───────────────────────────────────────────────────────────────
function saveUndo(){G.undoStack.push(planks.map(p=>({id:p.id,gx:p.gx,gy:p.gy,w:p.w,h:p.h,placed:p.placed})));if(G.undoStack.length>20)G.undoStack.shift()}
function doUndo(){if(!G.undoStack.length)return;const snap=G.undoStack.pop();snap.forEach(s=>{const p=planks.find(pp=>pp.id===s.id);if(p){p.w=s.w;p.h=s.h;p.placed=s.placed;tw(p,{gx:s.gx,gy:s.gy},.25,ease.outBack)}});Snd.undo();updateBridge()}

// ── BRIDGE LOGIC ───────────────────────────────────────────────────────
function getGrid(){const g=Array(COLS).fill(0).map(()=>Array(ROWS).fill(false));for(const p of planks){if(!p.placed)continue;const bx=Math.round(p.gx),by=Math.round(p.gy);for(let x=0;x<p.w;x++)for(let y=0;y<p.h;y++){const cx=bx+x,cy=by+y;if(cx>=0&&cx<COLS&&cy>=0&&cy<ROWS)g[cx][cy]=true}}return g}

function updateBridge(){
    if(G.scene!=='BUILDING')return;
    const g=getGrid(),gY=ROWS-CLIFF_H;let oldP=G.currentP,p=0;perimSegs=[];
    for(let x=0;x<COLS;x++)for(let y=0;y<gY;y++){if(!g[x][y])continue;
        if(y===0||!g[x][y-1]){p++;perimSegs.push({x1:x,y1:y,x2:x+1,y2:y})}
        if(y===gY-1||!g[x][y+1]){p++;perimSegs.push({x1:x,y1:y+1,x2:x+1,y2:y+1})}
        if(x===0||!g[x-1][y]){p++;perimSegs.push({x1:x,y1:y,x2:x,y2:y+1})}
        if(x===COLS-1||!g[x+1][y]){p++;perimSegs.push({x1:x+1,y1:y,x2:x+1,y2:y+1})}}
    G.currentP=p;
    if(p!==oldP&&p>0){if(p===G.targetP&&oldP!==G.targetP){Snd.lockIn();G.perimLocked=true;G.perimGlowAlpha=1}else if(p>G.targetP&&oldP<=G.targetP){Snd.overPerim();G.perimLocked=false}else{Snd.perimTick();if(p!==G.targetP)G.perimLocked=false}}
    // BFS span
    const sx=levelData.gapStart,ex=levelData.gapStart+levelData.gapWidth-1,vis=Array(COLS).fill(0).map(()=>Array(ROWS).fill(false)),q=[];
    for(let y=0;y<gY;y++)if(g[sx]&&g[sx][y]){q.push({x:sx,y});vis[sx][y]=true}
    G.spansGap=false;while(q.length){const c=q.shift();if(c.x>=ex){G.spansGap=true;break}for(const[dx,dy]of[[0,-1],[0,1],[-1,0],[1,0]]){const nx=c.x+dx,ny=c.y+dy;if(nx>=0&&nx<COLS&&ny>=0&&ny<gY&&g[nx][ny]&&!vis[nx][ny]){vis[nx][ny]=true;q.push({x:nx,y:ny})}}}
    if(p===G.targetP&&G.spansGap)worker.emoji='🤩';else if(p>G.targetP)worker.emoji='😰';else if(p>0)worker.emoji='🤔';else worker.emoji='😊';
}

function isValid(pl,x,y){const gY=ROWS-CLIFF_H;if(x<0||x+pl.w>COLS||y<0||y+pl.h>gY)return false;for(const ob of obstacles)if(x<ob.x+1&&x+pl.w>ob.x&&y<ob.y+1&&y+pl.h>ob.y)return false;for(const o of planks){if(o===pl||!o.placed)continue;const ox=Math.round(o.gx),oy=Math.round(o.gy);if(x<ox+o.w&&x+pl.w>ox&&y<oy+o.h&&y+pl.h>oy)return false}return true}

// ── TESTING ────────────────────────────────────────────────────────────
function startTest(){if(G.scene!=='BUILDING')return;updateBridge();G.scene='TESTING';cart.active=true;cart.x=levelData.gapStart-2.5;cart.y=ROWS-CLIFF_H-cart.h;cart.vx=.06;cart.vy=0;cart.wheelRot=0;if(levelData.wind)G.windActive=true;Snd.click();buildButtons()}
function triggerCreak(){G.scene='CREAK';G.creakTimer=0;Snd.creak();G.shake=5;worker.emoji='😱'}
function triggerCollapse(){G.shake=15;Snd.crash();worker.emoji='😭';for(const p of planks){if(p.placed){physicsDebris.push({x:p.gx*CELL+OX,y:p.gy*CELL+OY,w:p.w*CELL,h:p.h*CELL,vx:(Math.random()-.5)*3,vy:-2-Math.random()*4,ang:0,va:(Math.random()-.5)*.15});emit((p.gx+p.w/2)*CELL+OX,(p.gy+p.h/2)*CELL+OY,[COL.plankDark,COL.plankLight,'#8B4513'],8,{shape:'square',size:6,speed:4})}}planks=planks.filter(p=>!p.placed);cart.vx=0;cart.vy=.5}

function showResult(success){
    if(G.scene==='SUCCESS'||G.scene==='FAIL')return;
    if(success){
        G.scene='SUCCESS';Snd.win();
        const tt=Math.ceil(G.levelTimer),tl=levelData.starTime||60;
        let stars=1;if(G.currentP===G.targetP)stars=2;if(G.currentP===G.targetP&&tt<=tl)stars=3;
        if(stars===3){G.streak++;if(G.streak>=3)Snd.combo()}else G.streak=0;
        const mult=G.streak>=3?1.5:1;
        if(!G.stars[G.level]||stars>G.stars[G.level])G.stars[G.level]=stars;
        if(!G.bestTimes[G.level]||tt<G.bestTimes[G.level])G.bestTimes[G.level]=tt;
        const earned=Math.floor((50+stars*50)*mult);G.gold+=earned;
        G.earnedGold=earned;G.earnedStars=stars;G.earnedTime=tt;G.earnedTimeLimit=tl;G.earnedCombo=G.streak>=3;
        saveGame();
        for(let i=0;i<5;i++)setTimeout(()=>emit(W*.2+Math.random()*W*.6,H*.3,[COL.gold,'#e74c3c','#2ecc71','#3498db'],20,{shape:'star',size:8,speed:5,upward:true}),i*200);
    }else{G.scene='FAIL';G.streak=0;G.failReason=!G.spansGap?"Gap not fully bridged!":`Perimeter: ${G.currentP} (need ${G.targetP})`}
    setTimeout(buildButtons,100);
}

// ── STRESS TEST ────────────────────────────────────────────────────────
function startStressTest(){G.stressTest=true;G.stressWeight=0;G.stressSurvived=0;G.stressDrops=[];G.stressBonusGiven=false;G.bridgeSag={};G.scene='STRESS';buildButtons()}
function updateStress(dt){
    G.stressWeight+=dt*10;
    if(Math.random()<dt*1.5){const gx=levelData.gapStart+Math.random()*levelData.gapWidth;G.stressDrops.push({x:gx,y:-2,vy:0,type:['🪨','⚓','🏋️'][Math.floor(Math.random()*3)],weight:10+Math.random()*20,active:true})}
    const gY=ROWS-CLIFF_H,g=getGrid();
    for(const d of G.stressDrops){if(!d.active)continue;d.vy+=12*dt;d.y+=d.vy*dt;
        const cx=Math.floor(d.x);let landed=false;
        if(cx>=0&&cx<COLS)for(let y=0;y<gY;y++){if(g[cx][y]&&d.y>=y-.5){d.y=y-.8;d.vy=0;d.active=false;landed=true;G.shake=3;Snd.stressHit();G.stressSurvived++;G.bridgeSag[cx]=(G.bridgeSag[cx]||0)+d.weight*.015;emit(d.x*CELL+OX,d.y*CELL+OY,['#aaa','#888'],5,{size:3,speed:2});break}}
        if(!landed&&d.y>gY+2){d.active=false;emit(d.x*CELL+OX,(gY+.5)*CELL+OY,[theme.water,theme.waterFoam],8,{speed:3,upward:true,size:3})}
    }
    for(const k in G.bridgeSag){if(G.bridgeSag[k]>.6){G.stressTest=false;G.scene='STRESS_END';triggerCollapse();setTimeout(buildButtons,500);return}}
    for(const k in G.bridgeSag)G.bridgeSag[k]*=.995;
}

// ── WIND ───────────────────────────────────────────────────────────────
function updateWind(dt){if(!G.windActive)return;G.windTimer+=dt;if(G.windTimer>3+Math.random()*4){G.windTimer=0;G.windDir=Math.random()>.5?1:-1;G.windStr=.5+Math.random()*.5;Snd.windGust();setTimeout(()=>{G.windStr=0},1500+Math.random()*1000)}}

// ── BUTTONS ────────────────────────────────────────────────────────────

        buttons.push({id:'next',x:W/2-80,y:H*.15+360,w:160,h:50,text:'Next ➔',color:'#3498db',shadow:'#2980b9',rad:r,fs:20});

function hitBtn(mx,my){for(const b of buttons)if(mx>=b.x&&mx<=b.x+b.w&&my>=b.y&&my<=b.y+b.h)return b;return null}

// ── INPUT ──────────────────────────────────────────────────────────────
function getPos(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY}}
function toGrid(px,py){return{x:(px-OX)/CELL,y:(py-OY)/CELL}}

function onDown(e){
    Snd.init();if(e.cancelable)e.preventDefault();const{x:mx,y:my}=getPos(e);
    const btn=hitBtn(mx,my);if(btn){Snd.click();handleBtn(btn.id,mx,my);return}
    if(G.scene==='LEVEL_SELECT'){handleLevelClick(mx,my);return}
    if(G.scene==='SHOP'){handleShopClick(mx,my);return}
    if(G.scene!=='BUILDING')return;
    const gp=toGrid(mx,my),now=Date.now(),dbl=now-lastTap<300;lastTap=now;
    for(let i=planks.length-1;i>=0;i--){const p=planks[i];
        if(gp.x>=p.gx&&gp.x<=p.gx+p.w&&gp.y>=p.gy&&gp.y<=p.gy+p.h){
            if(dbl){const tw2=p.w,th=p.h;p.w=th;p.h=tw2;if(!isValid(p,Math.round(p.gx),Math.round(p.gy))){p.w=tw2;p.h=th;Snd.error()}else{Snd.rotate();emit(mx,my,'#fff',4,{size:3,speed:2})}}
            else{saveUndo();dragPlank=p;dragOX=gp.x-p.gx;dragOY=gp.y-p.gy;p.placed=false;planks.splice(i,1);planks.push(p);Snd.pickup()}
            updateBridge();return}}
}
function onMove(e){if(!dragPlank)return;if(e.cancelable)e.preventDefault();const gp=toGrid(getPos(e).x,getPos(e).y);dragPlank.gx=gp.x-dragOX;dragPlank.gy=gp.y-dragOY}
function onUp(){
    if(!dragPlank)return;const sx=Math.round(dragPlank.gx),sy=Math.round(dragPlank.gy);
    if(sy>=ROWS-INV_H){dragPlank.placed=false;tw(dragPlank,{gx:dragPlank.homeX,gy:dragPlank.homeY},.3,ease.outBack);Snd.snap()}
    else if(isValid(dragPlank,sx,sy)){dragPlank.gx=sx;dragPlank.gy=sy;dragPlank.placed=true;dragPlank.scaleX=1.15;dragPlank.scaleY=.85;tw(dragPlank,{scaleX:1,scaleY:1},.3,ease.outElastic);Snd.snap();emit((sx+dragPlank.w/2)*CELL+OX,(sy+dragPlank.h/2)*CELL+OY,['#fff',COL.plankLight],6,{size:3,speed:2})}
    else{dragPlank.placed=false;tw(dragPlank,{gx:dragPlank.homeX,gy:dragPlank.homeY},.3,ease.outBack);Snd.error()}
    dragPlank=null;updateBridge();
}
C.addEventListener('mousedown',onDown);window.addEventListener('mousemove',onMove,{passive:false});window.addEventListener('mouseup',onUp);
C.addEventListener('touchstart',onDown,{passive:false});window.addEventListener('touchmove',onMove,{passive:false});window.addEventListener('touchend',onUp);

function handleBtn(id){
    switch(id){
        case'play':G.scene='LEVEL_SELECT';buildButtons();break;
        case'test':startTest();break;
        case'clear':saveUndo();planks.forEach(p=>{p.placed=false;if(p.h>p.w){const t=p.w;p.w=p.h;p.h=t}tw(p,{gx:p.homeX,gy:p.homeY},.3,ease.outBack)});updateBridge();Snd.error();break;
        case'undo':doUndo();break;
        case'next':loadLevel(G.level+1);break;
        case'retry':loadLevel(G.level);break;
        case'shop':G.scene='SHOP';buildButtons();break;
        case'closeshop':G.scene='BUILDING';buildButtons();break;
        case'levels':G.scene='LEVEL_SELECT';buildButtons();break;
        case'stress':startStressTest();break;
        case'endstress':G.stressTest=false;G.scene='STRESS_END';buildButtons();break;
        case'nextafter':loadLevel(G.level+1);break;
    }
}
function handleLevelClick(mx,my){
    const cols=5,padTop=H*.22,cw=Math.min(70,(W-40)/cols-10),gap=10,totalW=cols*cw+(cols-1)*gap,startX=(W-totalW)/2;
    for(let i=0;i<LEVELS.length;i++){const col=i%cols,row=Math.floor(i/cols),bx=startX+col*(cw+gap),by=padTop+row*(cw+gap+15);
        if(mx>=bx&&mx<=bx+cw&&my>=by&&my<=by+cw){const canPlay=i===0||(G.stars[i-1]&&G.stars[i-1]>0);if(canPlay){loadLevel(i);Snd.click()}else Snd.error();return}}
    const eby=padTop+Math.ceil(LEVELS.length/cols)*(cw+gap+15)+10;
    if(mx>=W/2-80&&mx<=W/2+80&&my>=eby&&my<=eby+50&&G.stars.filter(s=>s>0).length>=5){loadLevel(LEVELS.length);Snd.click()}
}
function handleShopClick(mx,my){
    const pw=Math.min(360,W*.9),px=W/2-pw/2,py=H*.1;
    G.shopItems.forEach((item,i)=>{const iy=py+85+i*75,bx=px+pw-90,by=iy+10;
        if(mx>=bx&&mx<=bx+70&&my>=by&&my<=by+35){if(G.gold>=item.cost){G.gold-=item.cost;item.owned++;Snd.buy();saveGame()}else Snd.error()}});
}

// ── UPDATE ─────────────────────────────────────────────────────────────
function update(dt){
    G.time+=dt;updateTweens(dt);updateParticles();
    for(const c of clouds){c.x+=c.speed;if(c.x>W+200)c.x=-c.w-50}
    for(const b of birds){b.x+=b.speed;b.wing+=dt*8;if(b.x>W+50){b.x=-30;b.y=30+Math.random()*80}}
    if(G.scene==='BUILDING')G.levelTimer+=dt;
    if(G.shake>0){G.shakeX=(Math.random()-.5)*G.shake;G.shakeY=(Math.random()-.5)*G.shake;G.shake*=.92;if(G.shake<.3)G.shake=0}else{G.shakeX=0;G.shakeY=0}
    if(perimSegs.length>0){antProgress+=dt*2;if(antProgress>perimSegs.length)antProgress-=perimSegs.length}
    if(G.perimGlowAlpha>0)G.perimGlowAlpha-=dt*.5;
    worker.timer+=dt;
    for(let i=physicsDebris.length-1;i>=0;i--){const d=physicsDebris[i];d.vy+=12*dt;d.x+=d.vx;d.y+=d.vy;d.ang+=d.va;if(d.y>H+100)physicsDebris.splice(i,1)}
    if(G.scene==='TESTING'&&cart.active)updateCart(dt);
    if(G.scene==='CREAK'){G.creakTimer+=dt;if(G.creakTimer>1.5){triggerCollapse();G.scene='TESTING'}}
    if(G.scene==='STRESS')updateStress(dt);
    if(G.windActive)updateWind(dt);
    for(const k in G.bridgeSag)G.bridgeSag[k]*=.95;
}

function updateCart(dt){
    const wp=G.windStr*G.windDir*.02;cart.x+=cart.vx+wp;cart.wheelRot+=cart.vx*3;
    if(Math.random()<.3)emit((cart.x+.3)*CELL+OX,(cart.y+cart.h)*CELL+OY,['#c4a882','#a89070'],1,{size:2,speed:1,gravity:.05});
    if(Math.random()<.05)Snd.cartRoll();
    const gY=ROWS-CLIFF_H,rCliff=levelData.gapStart+levelData.gapWidth,cCX=cart.x+cart.w/2;
    if(cart.vy===0){
        if(cart.x>rCliff+.5){showResult(true);cart.vx=0;return}
        if(cCX>=levelData.gapStart&&cCX<=rCliff){
            const g=getGrid(),cx=Math.floor(cCX);let sY=null;
            if(cx>=0&&cx<COLS)for(let y=0;y<gY;y++)if(g[cx][y]){sY=y;break}
            if(sY===null){cart.vx=0;cart.vy=.3}
            else{const sag=(G.bridgeSag[cx]||0)*CELL+Math.sin(G.time*4)*.08*CELL;cart.y=sY-cart.h+sag/CELL;G.bridgeSag[cx]=Math.max(G.bridgeSag[cx]||0,.02)}
        }else cart.y=gY-cart.h;
        if(cCX>levelData.gapStart+levelData.gapWidth*.45&&cCX<levelData.gapStart+levelData.gapWidth*.55&&G.spansGap&&G.currentP!==G.targetP)triggerCreak();
    }else{cart.vy+=15*dt;cart.y+=cart.vy;if(cart.y>gY+1.5&&cart.active){cart.active=false;Snd.splash();emit((cart.x+cart.w/2)*CELL+OX,(gY+.5)*CELL+OY,[theme.water,theme.waterFoam,'#fff'],25,{speed:5,upward:true,size:5});G.shake=8;showResult(false)}}
}

// ── RENDERING ──────────────────────────────────────────────────────────
function render(){
    X.clearRect(0,0,W,H);
    if(G.scene==='TITLE'){drawTitle();return}
    if(G.scene==='LEVEL_SELECT'){drawLevelSelect();return}
    if(G.scene==='SHOP'){drawShop();return}
    X.save();X.translate(G.shakeX,G.shakeY);
    drawSky();drawMountains();drawClouds();drawBirds();
    if(G.windStr>.1){X.globalAlpha=G.windStr*.3;X.strokeStyle='rgba(255,255,255,0.5)';X.lineWidth=1;for(let i=0;i<10;i++){const lx=Math.random()*W,ly=50+Math.random()*H*.4;X.beginPath();X.moveTo(lx,ly);X.lineTo(lx+G.windDir*25*G.windStr,ly-3);X.stroke()}X.globalAlpha=1}
    X.save();X.translate(OX,OY);
    drawWater();drawCliffs();drawObstacles();
    if(G.settings.showGrid&&G.scene==='BUILDING')drawGrid();
    drawInvArea();
    for(const p of planks)if(p!==dragPlank)drawPlank(p);
    if(G.scene==='BUILDING'){drawPerimOutline();if(G.settings.showPerimAnt&&perimSegs.length>0)drawPerimAnt()}
    if(cart.active||['TESTING','CREAK','FAIL','STRESS','STRESS_END'].includes(G.scene))drawCart();
    if(G.scene==='STRESS'||G.scene==='STRESS_END')for(const d of G.stressDrops){X.font=`${CELL*.8}px sans-serif`;X.textAlign='center';X.textBaseline='middle';X.fillText(d.type,d.x*CELL,d.y*CELL)}
    for(const d of physicsDebris){X.save();X.translate(d.x-OX+d.w/2,d.y-OY+d.h/2);X.rotate(d.ang);X.fillStyle=COL.plankWood;X.fillRect(-d.w/2,-d.h/2,d.w,d.h);X.fillStyle=COL.plankDark;X.fillRect(-d.w/2,d.h/2-3,d.w,3);X.restore()}
    drawWorker();if(dragPlank)drawPlank(dragPlank,true);
    X.restore();drawParticles();X.restore();
    drawUI();
    if(G.scene==='SUCCESS')drawSuccess();
    if(G.scene==='FAIL')drawFail();
    if(G.scene==='STRESS')drawStressUI();
    if(G.scene==='STRESS_END')drawStressEnd();
    if(G.scene==='BUILDING'&&G.tutorialStep>=0&&G.tutorialLevel===G.level&&G.level<=2)drawTutorial();
    drawButtons();
}

function drawSky(){const g=X.createLinearGradient(0,0,0,H*.7);g.addColorStop(0,theme.skyTop);g.addColorStop(.5,theme.skyMid);g.addColorStop(1,theme.skyBot);X.fillStyle=g;X.fillRect(0,0,W,H)}
function drawMountains(){for(const m of bgMountains){X.fillStyle=m.col;X.beginPath();X.moveTo(m.x,OY+(ROWS-CLIFF_H)*CELL);X.lineTo(m.x+m.w/2,OY+(ROWS-CLIFF_H)*CELL-m.h);X.lineTo(m.x+m.w,OY+(ROWS-CLIFF_H)*CELL);X.fill()}}
function drawClouds(){for(const c of clouds){X.globalAlpha=c.op;X.fillStyle='#fff';X.beginPath();X.arc(c.x,c.y,c.w*.2,0,Math.PI*2);X.arc(c.x+c.w*.2,c.y-c.w*.08,c.w*.25,0,Math.PI*2);X.arc(c.x+c.w*.45,c.y,c.w*.22,0,Math.PI*2);X.fill();X.globalAlpha=1}}
function drawBirds(){X.strokeStyle='#2c3e50';X.lineWidth=2;for(const b of birds){const w=Math.sin(b.wing)*5;X.beginPath();X.moveTo(b.x-8,b.y+w);X.quadraticCurveTo(b.x-3,b.y-4+w,b.x,b.y);X.quadraticCurveTo(b.x+3,b.y-4-w,b.x+8,b.y-w);X.stroke()}}
function drawWater(){const gy=(ROWS-CLIFF_H)*CELL,wh=CLIFF_H*CELL,g=X.createLinearGradient(0,gy,0,gy+wh);g.addColorStop(0,theme.water);g.addColorStop(1,theme.waterDeep);X.fillStyle=g;X.fillRect(0,gy,COLS*CELL,wh);X.fillStyle=theme.waterFoam;X.globalAlpha=.3;for(let i=0;i<COLS*CELL;i+=20){X.beginPath();X.arc(i,gy+Math.sin(G.time*2+i*.08)*3+3,6,0,Math.PI);X.fill()}X.globalAlpha=.15;for(let i=10;i<COLS*CELL;i+=25){X.beginPath();X.arc(i,gy+Math.sin(G.time*1.5+i*.06+1)*2+15,5,0,Math.PI);X.fill()}X.globalAlpha=1;for(let i=0;i<8;i++){X.globalAlpha=(.5+.5*Math.sin(G.time*4+i*2))*.6;X.fillStyle='#fff';X.beginPath();X.arc((i*97+G.time*20)%(COLS*CELL),gy+10+(i*43)%(wh-20),2,0,Math.PI*2);X.fill()}X.globalAlpha=1}
function drawCliffs(){const gy=(ROWS-CLIFF_H)*CELL,ch=CLIFF_H*CELL,lw=levelData.gapStart*CELL;if(lw>0)drawCliffB(0,gy,lw,ch);const rx=(levelData.gapStart+levelData.gapWidth)*CELL,rw=COLS*CELL-rx;if(rw>0)drawCliffB(rx,gy,rw,ch)}
function drawCliffB(x,y,w,h){X.fillStyle=theme.cliff;X.fillRect(x,y,w,h);X.fillStyle=theme.cliffDk;X.fillRect(x,y+h*.4,w,h*.1);X.fillStyle=theme.cliffTop;X.fillRect(x,y,w,CELL*.3);X.fillStyle=theme.cliffGrass;for(let i=0;i<w;i+=CELL*.6){const g=x+i+Math.sin(i)*3,gh=4+Math.sin(G.time*2+i)*2;X.fillRect(g,y-gh,3,gh+2)}}
function drawObstacles(){for(const ob of obstacles){const px=ob.x*CELL,py=ob.y*CELL;X.fillStyle=COL.obstacle;X.beginPath();X.roundRect(px+2,py+2,CELL-4,CELL-4,6);X.fill();X.fillStyle=COL.obsDk;X.fillRect(px+2,py+CELL-8,CELL-4,6);X.strokeStyle='rgba(255,255,255,0.4)';X.lineWidth=2;X.beginPath();X.moveTo(px+CELL*.25,py+CELL*.25);X.lineTo(px+CELL*.75,py+CELL*.75);X.moveTo(px+CELL*.75,py+CELL*.25);X.lineTo(px+CELL*.25,py+CELL*.75);X.stroke()}}
function drawGrid(){const gY=(ROWS-CLIFF_H)*CELL;X.strokeStyle=COL.gridLine;X.lineWidth=1;X.beginPath();for(let i=0;i<=COLS;i++){X.moveTo(i*CELL,0);X.lineTo(i*CELL,gY)}for(let i=0;i<=ROWS-CLIFF_H;i++){X.moveTo(0,i*CELL);X.lineTo(COLS*CELL,i*CELL)}X.stroke();X.fillStyle='rgba(231,76,60,0.05)';X.fillRect(levelData.gapStart*CELL,0,levelData.gapWidth*CELL,gY)}
function drawInvArea(){const iy=(ROWS-INV_H)*CELL;X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(-OX,iy,W+100,INV_H*CELL+100);X.fillStyle='rgba(255,255,255,0.3)';X.font=`bold ${Math.min(13,CELL*.35)}px 'Fredoka',sans-serif`;X.textAlign='left';X.textBaseline='top';X.fillText('PIECES',8,iy+5)}

function drawPlank(p,isDragged=false){
    X.save();let px=p.gx*CELL,py=p.gy*CELL;const pw=p.w*CELL,ph=p.h*CELL;
    if(p.placed&&!isDragged){const cx=Math.round(p.gx),sag=(G.bridgeSag[cx]||0)*CELL;py+=sag}
    X.translate(px+pw/2,py+ph/2);const sx=p.scaleX!=null?p.scaleX:1,sy=p.scaleY!=null?p.scaleY:1;X.scale(sx,sy);
    if(isDragged){X.globalAlpha=.85;X.scale(1.05,1.05);X.fillStyle='rgba(0,0,0,0.3)';X.beginPath();X.roundRect(-pw/2+4,-ph/2+6,pw,ph,4);X.fill()}
    const cols=p.type==='steel'?{b:COL.steelBody,l:COL.steelLight,d:COL.steelDark}:{b:COL.plankWood,l:COL.plankLight,d:COL.plankDark};
    X.fillStyle=cols.b;X.beginPath();X.roundRect(-pw/2,-ph/2,pw,ph,3);X.fill();
    X.fillStyle=cols.l;X.fillRect(-pw/2,-ph/2,pw,4);X.fillRect(-pw/2,-ph/2,4,ph);
    X.fillStyle=cols.d;X.fillRect(-pw/2,ph/2-4,pw,4);X.fillRect(pw/2-4,-ph/2,4,ph);
    X.strokeStyle='rgba(0,0,0,0.12)';X.lineWidth=1;X.beginPath();
    if(p.w>=p.h){for(let i=1;i<p.w;i++){X.moveTo(-pw/2+i*CELL,-ph/2+3);X.lineTo(-pw/2+i*CELL,ph/2-3)}}else{for(let i=1;i<p.h;i++){X.moveTo(-pw/2+3,-ph/2+i*CELL);X.lineTo(pw/2-3,-ph/2+i*CELL)}}X.stroke();
    if(G.settings.showLabels){X.fillStyle='rgba(255,255,255,0.85)';X.font=`bold ${CELL*.4}px 'Fredoka',sans-serif`;X.textAlign='center';X.textBaseline='middle';X.fillText(p.w*p.h,0,1)}
    X.globalAlpha=1;X.restore();
}

function drawPerimOutline(){if(!perimSegs.length)return;const isG=G.currentP===G.targetP&&G.spansGap,isB=G.currentP>G.targetP;X.strokeStyle=isG?COL.perimGood:isB?COL.perimBad:COL.perimOk;if(G.perimGlowAlpha>0&&isG){X.shadowColor=COL.perimGood;X.shadowBlur=20*G.perimGlowAlpha}X.lineWidth=3;X.setLineDash([8,6]);X.lineDashOffset=-G.time*30;X.beginPath();for(const s of perimSegs){X.moveTo(s.x1*CELL,s.y1*CELL);X.lineTo(s.x2*CELL,s.y2*CELL)}X.stroke();X.setLineDash([]);X.shadowBlur=0}
function drawPerimAnt(){if(!perimSegs.length)return;const idx=Math.floor(antProgress)%perimSegs.length,frac=antProgress-Math.floor(antProgress),s=perimSegs[idx],ax=(s.x1+(s.x2-s.x1)*frac)*CELL,ay=(s.y1+(s.y2-s.y1)*frac)*CELL;X.fillStyle='#fff';X.shadowColor='#f1c40f';X.shadowBlur=10;X.beginPath();X.arc(ax,ay,4,0,Math.PI*2);X.fill();X.shadowBlur=0;for(let i=1;i<6;i++){const ti=(idx-i+perimSegs.length)%perimSegs.length,ts=perimSegs[ti];X.globalAlpha=.5-i*.08;X.fillStyle='#f1c40f';X.beginPath();X.arc((ts.x1+ts.x2)/2*CELL,(ts.y1+ts.y2)/2*CELL,3-i*.4,0,Math.PI*2);X.fill()}X.globalAlpha=1}
function drawCart(){X.save();X.translate(cart.x*CELL,cart.y*CELL);const cw=cart.w*CELL,ch=cart.h*CELL;X.fillStyle=COL.cartBody;X.beginPath();X.roundRect(0,ch*.15,cw,ch*.55,5);X.fill();X.fillStyle=COL.cartRoof;X.beginPath();X.roundRect(cw*.3,0,cw*.6,ch*.35,[5,5,0,0]);X.fill();X.fillStyle=COL.cartWindow;X.fillRect(cw*.55,ch*.05,cw*.28,ch*.22);X.fillStyle='#f1c40f';X.beginPath();X.arc(cw-2,ch*.4,3,0,Math.PI*2);X.fill();X.fillStyle='#8B4513';X.fillRect(cw*.02,0,cw*.3,ch*.3);const dW=(wx,wy)=>{X.save();X.translate(wx,wy);X.rotate(cart.wheelRot);X.fillStyle=COL.cartWheel;X.beginPath();X.arc(0,0,ch*.2,0,Math.PI*2);X.fill();X.fillStyle='#7f8c8d';X.beginPath();X.arc(0,0,ch*.12,0,Math.PI*2);X.fill();X.restore()};dW(cw*.2,ch*.75);dW(cw*.78,ch*.75);X.restore()}
function drawWorker(){const wx=worker.x*CELL,wy=worker.y*CELL,bob=Math.sin(G.time*3)*2;X.font=`${CELL*1.1}px sans-serif`;X.textAlign='center';X.textBaseline='bottom';X.fillText(worker.emoji,wx+CELL/2,wy+bob)}

function drawUI(){
    if(!['BUILDING','TESTING','CREAK','STRESS','STRESS_END'].includes(G.scene))return;
    const bH=55;X.fillStyle=COL.uiBg;X.fillRect(0,0,W,bH);

    const wCols=['#3498db','#e74c3c','#81d4fa','#9b59b6'],wIdx=(levelData.world||1)-1;
    X.fillStyle=wCols[wIdx]||'#fff';X.font=`bold 15px 'Fredoka',sans-serif`;X.textAlign='left';X.textBaseline='middle';
    const lvlStr=G.level<LEVELS.length?`W${levelData.world} · Lv ${G.level+1}`:'∞ Endless';

    X.fillStyle='#fff';X.font=`13px 'Fredoka',sans-serif`;X.fillText(levelData.name||'',15,bH*.7);

    if(G.streak>=2){X.fillStyle='#f39c12';X.font=`bold 11px 'Fredoka',sans-serif`;X.fillText(`🔥${G.streak}x`,W-55,bH*.92)}

    X.textAlign='center';X.font=`bold 20px 'Fredoka',sans-serif`;X.fillStyle=isG2?COL.perimGood:isB?COL.perimBad:'#fff';
    X.fillText(`${G.currentP} / ${G.targetP}`,W/2,bH*.35);

    X.beginPath();X.roundRect(bX,bY,bW*Math.min(1,G.currentP/G.targetP),bHt,4);X.fill();X.shadowBlur=0;

}

function drawSuccess(){
    X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(0,0,W,H);
    const pw=Math.min(380,W*.88),ph=390,px=W/2-pw/2,py=H*.15;
    X.fillStyle='#1a2a1a';X.beginPath();X.roundRect(px,py,pw,ph,20);X.fill();X.strokeStyle=COL.perimGood;X.lineWidth=3;X.stroke();
    X.textAlign='center';X.textBaseline='middle';X.fillStyle=COL.perimGood;X.font=`bold 28px 'Lilita One',sans-serif`;X.fillText('BRIDGE HOLDS!',W/2,py+38);
    for(let i=0;i<3;i++){X.fillStyle=i<(G.earnedStars||0)?COL.starGold:COL.starEmpty;X.font='34px sans-serif';X.fillText('★',W/2-42+i*42,py+85)}
    X.font=`15px 'Fredoka',sans-serif`;X.fillStyle='#ecf0f1';X.fillText(`Perimeter: ${G.currentP} / ${G.targetP}`,W/2,py+125);
    const tt=G.earnedTime||0,tl=G.earnedTimeLimit||60;X.fillStyle=tt<=tl?'#2ecc71':'#e74c3c';X.fillText(`Time: ${Math.floor(tt/60)}:${(tt%60).toString().padStart(2,'0')}`,W/2,py+150);
    X.fillStyle=COL.gold;X.font=`bold 18px 'Fredoka',sans-serif`;X.fillText(`+${G.earnedGold||0} Gold${G.earnedCombo?' 🔥 combo!':''}`,W/2,py+183);
    X.font=`12px 'Fredoka',sans-serif`;const cY=py+215;
    [{l:'Bridge holds',e:true},{l:'Exact perimeter',e:G.currentP===G.targetP},{l:`Under ${Math.floor(tl/60)}:${(tl%60).toString().padStart(2,'0')}`,e:tt<=tl}].forEach((c,i)=>{X.fillStyle=c.e?'#2ecc71':'rgba(255,255,255,0.3)';X.textAlign='left';X.fillText(`${c.e?'✓':'✗'} ★ ${c.l}`,W/2-pw*.33,cY+i*20)});
    X.textAlign='center';X.fillStyle='rgba(255,255,255,0.4)';X.font=`13px 'Fredoka',sans-serif`;
    X.fillText(G.earnedStars===3?'Perfect! ✨':G.earnedStars===2?'Great job!':'Bridge complete!',W/2,py+295);
    // Level indicator in success
    X.fillStyle='rgba(255,255,255,0.3)';X.font=`11px 'Fredoka',sans-serif`;
    X.fillText(G.level<LEVELS.length?`World ${levelData.world} · Level ${G.level+1}`:'Endless',W/2,py+315);
}

function drawFail(){X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(0,0,W,H);const pw=Math.min(350,W*.85),ph=220,px=W/2-pw/2,py=H*.25;X.fillStyle='#2a1a1a';X.beginPath();X.roundRect(px,py,pw,ph,20);X.fill();X.strokeStyle=COL.perimBad;X.lineWidth=3;X.stroke();X.textAlign='center';X.textBaseline='middle';X.fillStyle=COL.perimBad;X.font=`bold 26px 'Lilita One',sans-serif`;X.fillText('BRIDGE COLLAPSED!',W/2,py+40);X.fillStyle='#ecf0f1';X.font=`15px 'Fredoka',sans-serif`;X.fillText(G.failReason,W/2,py+90);X.fillStyle='rgba(255,255,255,0.4)';X.font=`13px 'Fredoka',sans-serif`;X.fillText("Try again!",W/2,py+125);X.fillStyle='rgba(255,255,255,0.3)';X.font=`11px 'Fredoka',sans-serif`;X.fillText(G.level<LEVELS.length?`World ${levelData.world} · Level ${G.level+1}`:'Endless',W/2,py+155)}
function drawStressUI(){X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,H-110,W,55);X.textAlign='center';X.textBaseline='middle';X.fillStyle='#f39c12';X.font=`bold 16px 'Fredoka',sans-serif`;X.fillText(`💪 Survived: ${G.stressSurvived} hits`,W/2,H-88);X.fillStyle='rgba(255,255,255,0.4)';X.font=`12px 'Fredoka',sans-serif`;X.fillText('Objects falling on your bridge!',W/2,H-70)}
function drawStressEnd(){
    X.fillStyle='rgba(0,0,0,0.6)';X.fillRect(0,0,W,H);const pw=Math.min(350,W*.85),ph=200,px=W/2-pw/2,py=H*.25;
    X.fillStyle='#2a1a2a';X.beginPath();X.roundRect(px,py,pw,ph,20);X.fill();X.strokeStyle='#e67e22';X.lineWidth=3;X.stroke();
    X.textAlign='center';X.textBaseline='middle';X.fillStyle='#e67e22';X.font=`bold 24px 'Lilita One',sans-serif`;X.fillText('BRIDGE CRUSHED!',W/2,py+35);
    X.fillStyle='#ecf0f1';X.font=`16px 'Fredoka',sans-serif`;X.fillText(`Survived ${G.stressSurvived} hits!`,W/2,py+80);
    if(!G.stressBonusGiven){const bonus=G.stressSurvived*10;G.gold+=bonus;G.stressBonusGiven=true;saveGame();G.stressBonus=bonus}
    if(G.stressBonus>0){X.fillStyle=COL.gold;X.fillText(`+${G.stressBonus} bonus gold`,W/2,py+110)}
}
function drawShop(){
    X.fillStyle='rgba(0,0,0,0.85)';X.fillRect(0,0,W,H);const pw=Math.min(360,W*.9),px=W/2-pw/2,py=H*.1;
    X.fillStyle='#1a1a2e';X.beginPath();X.roundRect(px,py,pw,H*.7,20);X.fill();X.strokeStyle='#f39c12';X.lineWidth=3;X.stroke();
    X.textAlign='center';X.textBaseline='middle';X.fillStyle='#f39c12';X.font=`bold 26px 'Lilita One',sans-serif`;X.fillText('SHOP',W/2,py+32);
    X.fillStyle=COL.gold;X.font=`bold 15px 'Fredoka',sans-serif`;X.fillText(`🪙 ${G.gold}`,W/2,py+58);
    G.shopItems.forEach((item,i)=>{const iy=py+85+i*75;X.fillStyle='rgba(255,255,255,0.05)';X.beginPath();X.roundRect(px+15,iy,pw-30,60,10);X.fill();X.textAlign='left';X.fillStyle='#fff';X.font=`bold 15px 'Fredoka',sans-serif`;X.fillText(item.name,px+25,iy+18);X.fillStyle='rgba(255,255,255,0.5)';X.font=`11px 'Fredoka',sans-serif`;X.fillText(item.desc,px+25,iy+38);X.fillText(`Owned: ${item.owned}`,px+25,iy+52);const bx=px+pw-90,by=iy+10;X.fillStyle=G.gold>=item.cost?'#2ecc71':'#555';X.beginPath();X.roundRect(bx,by,70,35,8);X.fill();X.fillStyle='#fff';X.font=`bold 12px 'Fredoka',sans-serif`;X.textAlign='center';X.fillText(`🪙${item.cost}`,bx+35,by+18)});
    drawButtons();
}
function drawTitle(){
    const t=G.time,g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0f1b2d');g.addColorStop(.5,'#1e3a5f');g.addColorStop(1,'#2c5f8a');X.fillStyle=g;X.fillRect(0,0,W,H);
    for(let i=0;i<30;i++){X.globalAlpha=(.3+.7*Math.sin(t*2+i))*.8;X.fillStyle='#fff';X.beginPath();X.arc((i*137+t*5)%W,(i*89)%(H*.5),1.5,0,Math.PI*2);X.fill()}X.globalAlpha=1;
    X.fillStyle='#2980b9';X.fillRect(0,H*.75,W,H*.25);X.fillStyle='#aed6f1';for(let i=0;i<W;i+=30){X.beginPath();X.arc(i,H*.75+Math.sin(t*2+i*.05)*4,8,0,Math.PI);X.fill()}
    X.fillStyle='#6d4c41';X.fillRect(0,H*.55,W*.25,H*.45);X.fillRect(W*.75,H*.55,W*.25,H*.45);X.fillStyle='#4caf50';X.fillRect(0,H*.55,W*.25,8);X.fillRect(W*.75,H*.55,W*.25,8);
    const bx2=W*.25,bw=W*.5,bY2=H*.55;for(let i=0;i<Math.min(Math.floor((t*.8)%6)+1,5);i++){const ppx=bx2+i*(bw/5),ppw=bw/5;X.fillStyle=COL.plankWood;X.fillRect(ppx+2,bY2-4+Math.sin(t*3+i)*2,ppw-4,20);X.fillStyle=COL.plankLight;X.fillRect(ppx+2,bY2-4+Math.sin(t*3+i)*2,ppw-4,4)}
    X.textAlign='center';X.textBaseline='middle';X.fillStyle='rgba(0,0,0,0.3)';X.font=`bold ${Math.min(48,W*.08)}px 'Lilita One',sans-serif`;X.fillText('BRIDGE BUILDER',W/2+3,H*.18+3);
    const tg=X.createLinearGradient(W/2-150,0,W/2+150,0);tg.addColorStop(0,'#f1c40f');tg.addColorStop(.5,'#e67e22');tg.addColorStop(1,'#f39c12');X.fillStyle=tg;X.fillText('BRIDGE BUILDER',W/2,H*.18);
    X.font=`bold ${Math.min(30,W*.05)}px 'Lilita One',sans-serif`;X.fillStyle='#ecf0f1';X.fillText('PERIMETER PANIC',W/2,H*.28);
    X.font=`${Math.min(16,W*.03)}px 'Fredoka',sans-serif`;X.fillStyle='rgba(255,255,255,0.6)';X.fillText('Build bridges • Learn perimeters • Save the cargo!',W/2,H*.36);
    X.fillStyle='#fff';X.font='24px sans-serif';X.fillText('▼',W/2,H*.55+Math.sin(t*3)*5);
    drawButtons();
}
function drawLevelSelect(){
    const g=X.createLinearGradient(0,0,0,H);g.addColorStop(0,'#0f1b2d');g.addColorStop(1,'#1e3a5f');X.fillStyle=g;X.fillRect(0,0,W,H);
    X.textAlign='center';X.textBaseline='middle';X.fillStyle='#f1c40f';X.font=`bold ${Math.min(34,W*.06)}px 'Lilita One',sans-serif`;X.fillText('SELECT LEVEL',W/2,H*.08);
    X.font=`bold 16px 'Fredoka',sans-serif`;X.fillStyle=COL.gold;X.fillText(`🪙 ${G.gold}`,W/2,H*.14);
    const cols=5,padTop=H*.22,cw=Math.min(70,(W-40)/cols-10),gap=10,totalW=cols*cw+(cols-1)*gap,startX=(W-totalW)/2;
    const wCols=['#3498db','#e74c3c','#81d4fa','#9b59b6'];
    for(let i=0;i<LEVELS.length;i++){const col=i%cols,row=Math.floor(i/cols),bx=startX+col*(cw+gap),by=padTop+row*(cw+gap+15),canPlay=i===0||(G.stars[i-1]&&G.stars[i-1]>0),st=G.stars[i]||0;
        X.fillStyle=canPlay?(st>0?'#2a4a3a':'#2a3a5a'):'#1a1a2a';X.beginPath();X.roundRect(bx,by,cw,cw,10);X.fill();X.strokeStyle=canPlay?(st>0?'#2ecc71':'#4a6a8a'):'#333';X.lineWidth=2;X.stroke();
        X.fillStyle=wCols[(LEVELS[i].world||1)-1];X.fillRect(bx+5,by+3,cw-10,3);
        X.fillStyle=canPlay?'#fff':'#555';X.font=`bold ${cw*.35}px 'Fredoka',sans-serif`;X.textAlign='center';X.fillText(i+1,bx+cw/2,by+cw*.4);
        if(st>0){const sw=cw*.18;for(let s=0;s<3;s++){X.fillStyle=s<st?COL.starGold:COL.starEmpty;X.font=`${sw}px sans-serif`;X.fillText('★',bx+cw*.22+s*sw,by+cw*.82)}}
        if(!canPlay){X.fillStyle='#555';X.font=`${cw*.3}px sans-serif`;X.fillText('🔒',bx+cw/2,by+cw*.65)}}
    const erow=Math.ceil(LEVELS.length/cols),eby=padTop+erow*(cw+gap+15)+10,unlocked=G.stars.filter(s=>s>0).length;
    X.fillStyle=unlocked>=5?'#2a3a5a':'#1a1a2a';X.beginPath();X.roundRect(W/2-80,eby,160,50,12);X.fill();X.strokeStyle=unlocked>=5?'#9b59b6':'#333';X.lineWidth=2;X.stroke();
    X.fillStyle=unlocked>=5?'#fff':'#555';X.font=`bold 15px 'Fredoka',sans-serif`;X.fillText(unlocked>=5?'∞ Endless Mode':`🔒 Clear 5 levels`,W/2,eby+25);
}
function drawTutorial(){
    if(G.level===0&&G.tutorialStep===0){const p=planks[0];if(!p)return;const ppx=p.gx*CELL+OX+p.w*CELL/2,ppy=p.gy*CELL+OY;X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(0,0,W,H);X.clearRect(ppx-p.w*CELL/2-10+G.shakeX,ppy-10+G.shakeY,p.w*CELL+20,p.h*CELL+20);X.fillStyle='#fff';X.font=`bold 17px 'Fredoka',sans-serif`;X.textAlign='center';X.fillText('👆 Drag this plank across the gap!',W/2,ppy-40);X.font=`13px 'Fredoka',sans-serif`;X.fillStyle='rgba(255,255,255,0.6)';X.fillText('Double-tap to rotate',W/2,ppy-18);if(planks.some(p2=>p2.placed))G.tutorialStep=-1}
    else if(G.level<=2&&G.tutorialStep===0){if(planks.some(p2=>p2.placed))G.tutorialStep=-1;else{X.fillStyle='rgba(41,128,185,0.85)';X.beginPath();X.roundRect(W/2-155,H*.33,310,45,15);X.fill();X.fillStyle='#fff';X.textAlign='center';X.font=`bold 14px 'Fredoka',sans-serif`;X.fillText(levelData.hint,W/2,H*.33+24)}}
    else G.tutorialStep=-1;
}
function drawButtons(){for(const b of buttons){X.save();const pulse=b.pulse?1+Math.sin(G.time*4)*.03:1;X.translate(b.x+b.w/2,b.y+b.h/2);X.scale(pulse,pulse);X.fillStyle=b.shadow;X.beginPath();X.roundRect(-b.w/2,-b.h/2+4,b.w,b.h,b.rad);X.fill();X.fillStyle=b.color;X.beginPath();X.roundRect(-b.w/2,-b.h/2,b.w,b.h,b.rad);X.fill();X.fillStyle='#fff';X.font=`bold ${b.fs}px 'Fredoka',sans-serif`;X.textAlign='center';X.textBaseline='middle';X.fillText(b.text,0,0);X.restore()}}

// ── MAIN ───────────────────────────────────────────────────────────────
let lastT=0;
function loop(ts){const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;update(dt);render();requestAnimationFrame(loop)}
loadGame();G.scene='TITLE';buildButtons();requestAnimationFrame(loop);
</script>
