<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Even & Odd Balloon Pop!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: linear-gradient(135deg, #74ebd5 0%, #9face6 100%);
            touch-action: none; /* Prevents zooming and scrolling on touch devices */
        }
        h1, h2, .fredoka {
            font-family: 'Fredoka One', cursive;
        }
        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem;
            pointer-events: none;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: space-around;
            align-items: flex-start;
            z-index: 10;
        }
        .panel {
            background: rgba(255, 255, 255, 0.9);
            border: 4px solid white;
            border-radius: 1rem;
            padding: 0.5rem 1.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        #target-display {
            text-align: center;
            transform: scale(1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #target-display.pulse {
            transform: scale(1.1);
        }
        #target-word {
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            text-shadow: 2px 2px 0px rgba(0,0,0,0.1);
        }
        .text-even { color: #ec4899; } /* Pink */
        .text-odd { color: #3b82f6; }  /* Blue */
        
        #message-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            text-align: center;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        #message-overlay.show {
            opacity: 1;
        }
        .floating-text {
            position: absolute;
            pointer-events: none;
            font-family: 'Fredoka One', cursive;
            font-size: 2rem;
            color: white;
            text-shadow: 2px 2px 0px #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            animation: floatUp 1s ease-out forwards;
            z-index: 15;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(0.5); opacity: 1; }
            50% { transform: translateY(-30px) scale(1.2); opacity: 1; }
            100% { transform: translateY(-60px) scale(1); opacity: 0; }
        }
        
        /* Map Screen Overlay */
        #map-screen {
            position: absolute;
            inset: 0;
            background: #84cc16; /* Grass green */
            background-image: radial-gradient(#65a30d 1px, transparent 1px);
            background-size: 20px 20px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 40;
        }
        #map-container {
            position: relative;
            width: 90%;
            max-width: 600px;
            height: 70vh;
            background: rgba(255,255,255,0.2);
            border-radius: 20px;
            border: 4px solid rgba(255,255,255,0.5);
            overflow: hidden;
        }
        .map-node {
            position: absolute;
            width: 40px;
            height: 40px;
            background: white;
            border: 4px solid #94a3b8;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Fredoka One';
            transform: translate(-50%, -50%);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .map-node.cleared { background: #4ade80; border-color: #16a34a; color: white; }
        .map-node.current { border-color: #f59e0b; box-shadow: 0 0 15px #fcd34d; }
        
        #player-token {
            position: absolute;
            width: 30px;
            height: 30px;
            background: #f43f5e;
            border: 3px solid white;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: all 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 5;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
        }

        #start-screen {
            position: absolute;
            inset: 0;
            background: rgba(15, 23, 42, 0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }
        
        button {
            pointer-events: auto;
            transition: transform 0.1s;
        }
        button:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div id="game-container">
    <!-- UI Layer -->
    <div id="ui-layer">
        <div class="panel">
            <h2 class="text-xl text-gray-600 font-bold">Score</h2>
            <p id="score-display" class="text-3xl fredoka text-indigo-600">0</p>
        </div>
        
        <div id="target-display" class="panel">
            <h2 class="text-lg text-gray-500 font-bold">Pop all the</h2>
            <p id="target-word" class="fredoka text-even">EVEN</p>
            <p class="text-sm text-gray-500 font-bold">Numbers!</p>
        </div>

        <div class="panel">
            <h2 class="text-xl text-gray-600 font-bold">Level</h2>
            <p id="level-display" class="text-3xl fredoka text-emerald-500">1</p>
        </div>

        <!-- Restart Button -->
        <button id="restart-btn" class="panel flex items-center justify-center gap-2 bg-red-100 border-red-300 hover:bg-red-200 cursor-pointer">
            <span class="text-2xl">🔄</span> <span class="text-red-600 font-bold fredoka">Restart</span>
        </button>
    </div>

    <!-- Map Screen -->
    <div id="map-screen">
        <h1 class="text-4xl fredoka text-white mb-4 drop-shadow-md">Adventure Map</h1>
        <div id="map-container">
            <svg id="map-path" width="100%" height="100%" style="position:absolute; top:0; left:0; pointer-events:none;">
                <path id="path-line" fill="none" stroke="#e2e8f0" stroke-width="8" stroke-dasharray="10,10" />
            </svg>
            <div id="map-nodes"></div>
            <div id="player-token">⭐</div>
        </div>
        <button id="next-level-btn" class="mt-6 bg-gradient-to-r from-yellow-400 to-orange-500 text-white text-2xl fredoka py-3 px-8 rounded-full shadow-lg border-b-4 border-orange-600 hover:bg-orange-400 hidden">
            PLAY LEVEL 1!
        </button>
    </div>

    <!-- Feedback Message -->
    <div id="message-overlay">
        <h1 id="message-text" class="text-6xl fredoka text-white drop-shadow-lg" style="text-shadow: 4px 4px 0px rgba(0,0,0,0.2);">Great Job!</h1>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <div class="bg-white p-8 rounded-3xl shadow-2xl max-w-lg text-center border-8 border-indigo-400">
            <h1 class="text-5xl fredoka text-indigo-600 mb-4">Math Pop!</h1>
            <p class="text-xl text-gray-600 mb-6 font-bold">Help clear the sky by popping the right balloons!</p>
            
            <div class="flex justify-center gap-4 mb-8">
                <div class="bg-pink-100 p-4 rounded-xl border-4 border-pink-300">
                    <h3 class="fredoka text-2xl text-pink-500 mb-2">EVEN</h3>
                    <p class="text-lg font-bold text-gray-600">0, 2, 4, 6, 8</p>
                </div>
                <div class="bg-blue-100 p-4 rounded-xl border-4 border-blue-300">
                    <h3 class="fredoka text-2xl text-blue-500 mb-2">ODD</h3>
                    <p class="text-lg font-bold text-gray-600">1, 3, 5, 7, 9</p>
                </div>
            </div>

            <button id="start-btn" class="bg-gradient-to-r from-green-400 to-emerald-500 text-white text-3xl fredoka py-4 px-10 rounded-full shadow-lg border-b-4 border-green-600 hover:bg-green-500">
                PLAY NOW!
            </button>
        </div>
    </div>

    <!-- The Game Canvas -->
    <canvas id="gameCanvas"></canvas>
</div>

<script>
/**
 * Game Configuration & State
 */
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let cw, ch;
let score = 0;
let level = 1;
let currentTarget = 'even'; // 'even' or 'odd'
let isPlaying = false;
let animationId;

const MAX_LEVELS = 20;
const mapNodes = [];

// Entities
let balloons = [];
let darts = [];
let particles = [];
let floatingTexts = [];

// Colors for balloons
const balloonColors = ['#ef4444', '#f97316', '#eab308', '#22c55e', '#3b82f6', '#a855f7', '#ec4899'];

// Mouse/Touch tracking for the cannon
const pointer = { x: 0, y: 0 };
let cannonAngle = 0;

/**
 * Resize Canvas
 */
function resize() {
    cw = window.innerWidth;
    ch = window.innerHeight;
    canvas.width = cw;
    canvas.height = ch;
    // Set default pointer to middle top to aim up initially
    if(pointer.x === 0 && pointer.y === 0) {
        pointer.x = cw / 2;
        pointer.y = ch / 2;
    }
}
window.addEventListener('resize', resize);
resize();

/**
 * Classes
 */
class Balloon {
    constructor(x, y, radius, number, isArmored = false, isGoldenStar = false) {
        this.x = x;
        this.baseY = y;
        this.y = y;
        this.radius = radius;
        this.number = number;
        this.isGoldenStar = isGoldenStar;
        this.color = this.isGoldenStar ? '#fbbf24' : balloonColors[Math.floor(Math.random() * balloonColors.length)];
        this.isEven = this.number % 2 === 0;
        this.isArmored = this.isGoldenStar ? false : isArmored;
        
        // Bobbing animation properties
        this.bobOffset = Math.random() * Math.PI * 2;
        this.bobSpeed = 0.02 + Math.random() * 0.02;
        this.bobAmount = 10 + Math.random() * 15;

        // Floating mechanics (Active on Level 2+)
        let speedMult = Math.min(level * 0.2, 2.5);
        this.vx = (level > 1) ? (Math.random() - 0.5) * 2 * speedMult : 0;
        this.vy = (level > 1) ? (Math.random() - 0.5) * 2 * speedMult : 0;
    }

    update() {
        if (level === 1) {
            this.bobOffset += this.bobSpeed;
            this.y = this.baseY + Math.sin(this.bobOffset) * this.bobAmount;
        } else {
            // Drift and bounce for level 2+
            this.x += this.vx;
            this.y += this.vy;

            // Bounce off walls (keep inside bounds: under UI, above cannon)
            const uiBottom = 120;
            const cannonTop = ch - 80;
            
            if (this.x < this.radius) {
                this.x = this.radius;
                this.vx *= -1;
            } else if (this.x > cw - this.radius) {
                this.x = cw - this.radius;
                this.vx *= -1;
            }

            if (this.y < uiBottom + this.radius) {
                this.y = uiBottom + this.radius;
                this.vy *= -1;
            } else if (this.y > cannonTop - this.radius) {
                this.y = cannonTop - this.radius;
                this.vy *= -1;
            }
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        
        // Draw string
        ctx.beginPath();
        ctx.moveTo(0, this.radius);
        ctx.quadraticCurveTo(5, this.radius + 10, -5, this.radius + 20);
        ctx.quadraticCurveTo(5, this.radius + 30, 0, this.radius + 40);
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.stroke();

        // Draw balloon body
        ctx.beginPath();
        ctx.arc(0, 0, this.radius, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        
        // Shadow/Highlight for 3D effect
        ctx.beginPath();
        ctx.arc(-this.radius * 0.3, -this.radius * 0.3, this.radius * 0.2, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.fill();

        // Little tie at the bottom
        ctx.beginPath();
        ctx.moveTo(0, this.radius - 2);
        ctx.lineTo(-5, this.radius + 5);
        ctx.lineTo(5, this.radius + 5);
        ctx.closePath();
        ctx.fillStyle = this.color;
        ctx.fill();

        // Draw Armor Helmet if armored
        if (this.isArmored) {
            ctx.beginPath();
            ctx.arc(0, -this.radius * 0.1, this.radius * 1.05, Math.PI, 0); 
            ctx.fillStyle = '#94a3b8'; // silver/gray helmet
            ctx.fill();
            // Helmet rim
            ctx.beginPath();
            ctx.ellipse(0, -this.radius * 0.1, this.radius * 1.1, this.radius * 0.2, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#64748b';
            ctx.fill();
            
            // Helmet shine
            ctx.beginPath();
            ctx.arc(-this.radius * 0.4, -this.radius * 0.5, this.radius * 0.15, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fill();
        }

        // Draw Number OR Golden Star (Drawn LAST so it sits on top of the armor)
        if (this.isGoldenStar) {
            ctx.fillStyle = 'white';
            ctx.beginPath();
            const starRadius = this.radius * 0.6;
            for (let i = 0; i < 5; i++) {
                let outerAngle = (-90 + i * 72) * Math.PI / 180;
                let innerAngle = (-54 + i * 72) * Math.PI / 180;
                ctx.lineTo(Math.cos(outerAngle) * starRadius, Math.sin(outerAngle) * starRadius);
                ctx.lineTo(Math.cos(innerAngle) * starRadius * 0.4, Math.sin(innerAngle) * starRadius * 0.4);
            }
            ctx.closePath();
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.fill();
        } else {
            ctx.fillStyle = 'white';
            ctx.font = `bold ${this.radius}px 'Fredoka One', sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = 'rgba(0,0,0,0.3)';
            ctx.shadowBlur = 4;
            ctx.shadowOffsetX = 2;
            ctx.shadowOffsetY = 2;
            ctx.fillText(this.number, 0, 0);
        }
        
        ctx.restore();
    }
}

class Dart {
    constructor(x, y, angle) {
        this.x = x;
        this.y = y;
        this.angle = angle;
        this.speed = 15;
        this.vx = Math.cos(this.angle) * this.speed;
        this.vy = Math.sin(this.angle) * this.speed;
        this.active = true;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        
        // Remove if off screen
        if (this.x < -50 || this.x > cw + 50 || this.y < -50 || this.y > ch + 50) {
            this.active = false;
        }
    }

    draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);
        
        // Draw dart
        ctx.fillStyle = '#fcd34d'; // yellow body
        ctx.fillRect(-10, -3, 20, 6);
        
        // Dart tip
        ctx.beginPath();
        ctx.moveTo(10, -3);
        ctx.lineTo(18, 0);
        ctx.lineTo(10, 3);
        ctx.fillStyle = '#94a3b8'; // silver tip
        ctx.fill();
        
        // Dart flights (feathers)
        ctx.fillStyle = '#ef4444'; // red flights
        ctx.beginPath();
        ctx.moveTo(-10, -3);
        ctx.lineTo(-15, -8);
        ctx.lineTo(-5, -3);
        ctx.fill();
        
        ctx.beginPath();
        ctx.moveTo(-10, 3);
        ctx.lineTo(-15, 8);
        ctx.lineTo(-5, 3);
        ctx.fill();

        ctx.restore();
    }
}

class Particle {
    constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        const angle = Math.random() * Math.PI * 2;
        const speed = Math.random() * 6 + 2;
        this.vx = Math.cos(angle) * speed;
        this.vy = Math.sin(angle) * speed;
        this.life = 1.0;
        this.decay = Math.random() * 0.02 + 0.02;
        this.size = Math.random() * 6 + 4;
    }

    update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.2; // Gravity
        this.life -= this.decay;
    }

    draw() {
        ctx.globalAlpha = Math.max(0, this.life);
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1.0;
    }
}

/**
 * Game Functions
 */
function generateMap() {
    const container = document.getElementById('map-nodes');
    const pathLine = document.getElementById('path-line');
    container.innerHTML = '';
    mapNodes.length = 0;
    
    let pathData = "";

    for (let i = 0; i < MAX_LEVELS; i++) {
        const row = Math.floor(i / 4);
        const col = i % 4;
        const actualCol = row % 2 === 0 ? col : (3 - col);
        
        const xPercent = 20 + actualCol * 20; 
        const yPercent = 90 - (i * (80 / MAX_LEVELS)); 
        
        mapNodes.push({ x: xPercent, y: yPercent });
        
        const node = document.createElement('div');
        node.className = `map-node ${i === 0 ? 'current' : ''}`;
        node.style.left = `${xPercent}%`;
        node.style.top = `${yPercent}%`;
        node.innerText = i + 1;
        node.id = `node-${i + 1}`;
        container.appendChild(node);

        if (i === 0) {
            pathData += `M ${xPercent} ${yPercent} `;
        } else {
            const prev = mapNodes[i-1];
            const cpX = (prev.x + xPercent) / 2;
            pathData += `Q ${cpX} ${prev.y} ${xPercent} ${yPercent} `;
        }
    }
    
    const svg = document.getElementById('map-path');
    svg.setAttribute('viewBox', '0 0 100 100');
    svg.setAttribute('preserveAspectRatio', 'none');
    pathLine.setAttribute('d', pathData);

    updatePlayerTokenPos(1);
}

function updatePlayerTokenPos(targetLevel) {
    const token = document.getElementById('player-token');
    const node = mapNodes[targetLevel - 1];
    if (node) {
        token.style.left = `${node.x}%`;
        token.style.top = `${node.y}%`;
    }
}

function showMapScreen(isFirstTime = false) {
    isPlaying = false;
    document.getElementById('map-screen').style.display = 'flex';
    const btn = document.getElementById('next-level-btn');
    btn.style.display = 'block';
    
    if (level > MAX_LEVELS) {
        document.querySelector('#map-screen h1').innerText = "YOU BEAT THE GAME!!!";
        btn.innerText = "PLAY AGAIN";
        return;
    }

    btn.innerText = `PLAY LEVEL ${level}`;

    if (!isFirstTime) {
        const oldNode = document.getElementById(`node-${level - 1}`);
        if(oldNode) {
            oldNode.classList.remove('current');
            oldNode.classList.add('cleared');
        }
        
        setTimeout(() => {
            const newNode = document.getElementById(`node-${level}`);
            if(newNode) newNode.classList.add('current');
            updatePlayerTokenPos(level);
        }, 500);
    }
}

function spawnWave() {
    balloons = [];
    darts = [];
    particles = [];
    
    // Pick target randomly
    currentTarget = Math.random() > 0.5 ? 'even' : 'odd';
    updateUI();

    const cols = Math.floor(cw / 100); // Responsive columns
    const rows = 3;
    const paddingX = (cw - (cols * 80)) / 2;
    
    let numbers = [];
    
    // Ensure we have at least 3 correct answers
    for(let i=0; i<3; i++) {
        let n;
        do { n = Math.floor(Math.random() * (10 + level)) + 1; } 
        while ((currentTarget === 'even' && n % 2 !== 0) || (currentTarget === 'odd' && n % 2 === 0));
        numbers.push(n);
    }
    
    // Fill the rest randomly
    const totalBalloons = Math.min(cols * rows, 10 + Math.floor(level/2)); // Cap based on level
    while(numbers.length < totalBalloons) {
        numbers.push(Math.floor(Math.random() * (10 + level)) + 1);
    }
    
    // Shuffle numbers
    numbers.sort(() => Math.random() - 0.5);

    let starSpawned = false;

    // Create balloons
    let index = 0;
    for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
            if (index >= numbers.length) break;
            
            // Add some jitter to x and y so it doesn't look like a perfect grid
            const jitterX = (Math.random() - 0.5) * 30;
            const jitterY = (Math.random() - 0.5) * 30;
            
            const x = paddingX + c * 80 + 40 + jitterX;
            const y = 150 + r * 90 + jitterY; // Start below UI
            
            // 30% chance for armor starting level 6
            let isArmored = level >= 6 && Math.random() < 0.3;
            let isGoldenStar = false;
            
            // Spawn a golden star (starting level 5, 25% chance per wave)
            if (level >= 5 && !starSpawned && Math.random() < 0.25) {
                isGoldenStar = true;
                starSpawned = true;
                // Force the star to count as a correct answer behind the scenes
                numbers[index] = currentTarget === 'even' ? 2 : 1;
            }
            
            balloons.push(new Balloon(x, y, 35, numbers[index], isArmored, isGoldenStar));
            index++;
        }
    }
}

function spawnPenaltyBalloons(count) {
    for (let i = 0; i < count; i++) {
        let n;
        // Generate a guaranteed WRONG answer to clutter the screen
        do {
            n = Math.floor(Math.random() * (10 + level)) + 1;
        } while ((currentTarget === 'even' && n % 2 === 0) || (currentTarget === 'odd' && n % 2 !== 0));
        
        let isArmored = level >= 6 && Math.random() < 0.3;
        // Spawn randomly near the top center
        let x = cw / 2 + (Math.random() - 0.5) * 150;
        let y = 100 + Math.random() * 50;
        balloons.push(new Balloon(x, y, 35, n, isArmored));
    }
}

function updateUI() {
    document.getElementById('score-display').innerText = score;
    document.getElementById('level-display').innerText = level;
    
    const targetWord = document.getElementById('target-word');
    const targetDisplay = document.getElementById('target-display');
    
    targetWord.innerText = currentTarget.toUpperCase();
    if (currentTarget === 'even') {
        targetWord.className = 'fredoka text-even';
    } else {
        targetWord.className = 'fredoka text-odd';
    }

    // Pulse animation
    targetDisplay.classList.add('pulse');
    setTimeout(() => targetDisplay.classList.remove('pulse'), 300);
}

function createExplosion(x, y, color) {
    for (let i = 0; i < 20; i++) {
        particles.push(new Particle(x, y, color));
    }
}

function showFloatingText(x, y, text, isGood) {
    const el = document.createElement('div');
    el.className = 'floating-text';
    el.innerText = text;
    el.style.left = `${x}px`;
    el.style.top = `${y}px`;
    if (!isGood) {
        el.style.color = '#ef4444'; // Red for mistakes
    } else {
        el.style.color = '#4ade80'; // Green for good
    }
    document.body.appendChild(el);
    
    setTimeout(() => {
        el.remove();
    }, 1000);
}

function showMessage(msg, color) {
    const overlay = document.getElementById('message-overlay');
    const text = document.getElementById('message-text');
    text.innerText = msg;
    text.style.color = color;
    overlay.classList.add('show');
    
    setTimeout(() => {
        overlay.classList.remove('show');
    }, 2000);
}

function checkWaveComplete() {
    // Check if any correct balloons are left
    const targetsLeft = balloons.filter(b => {
        return (currentTarget === 'even' && b.isEven) || (currentTarget === 'odd' && !b.isEven);
    });

    if (targetsLeft.length === 0) {
        showMessage("Level Cleared!", "#4ade80");
        level++;
        score += 10; // Bonus for clearing
        updateUI();
        setTimeout(() => {
            showMapScreen();
        }, 2000);
    }
}

function fireDart() {
    if (!isPlaying) return;
    
    const cannonX = cw / 2;
    const cannonY = ch - 40; // slightly above bottom
    
    // Recalculate angle just in case
    cannonAngle = Math.atan2(pointer.y - cannonY, pointer.x - cannonX);
    
    darts.push(new Dart(cannonX, cannonY, cannonAngle));
}

function drawCannon() {
    const cannonX = cw / 2;
    const cannonY = ch - 20;
    
    ctx.save();
    ctx.translate(cannonX, cannonY);
    
    // Base
    ctx.beginPath();
    ctx.arc(0, 0, 40, Math.PI, 0);
    ctx.fillStyle = '#475569';
    ctx.fill();

    // Rotate for barrel
    ctx.rotate(cannonAngle);
    
    // Barrel
    ctx.fillStyle = '#64748b';
    ctx.fillRect(0, -15, 60, 30);
    
    // Barrel tip
    ctx.fillStyle = '#334155';
    ctx.fillRect(50, -20, 15, 40);

    ctx.restore();
}

/**
 * Main Game Loop
 */
function gameLoop() {
    if (!isPlaying) return;

    // Clear Canvas
    ctx.clearRect(0, 0, cw, ch);

    // Update & Draw Cannon Target Angle
    const cannonX = cw / 2;
    const cannonY = ch - 20;
    cannonAngle = Math.atan2(pointer.y - cannonY, pointer.x - cannonX);

    // Update & Draw Balloons
    for (let i = balloons.length - 1; i >= 0; i--) {
        let b = balloons[i];
        b.update();
        b.draw();
    }

    // Update & Draw Darts & Check Collisions
    for (let i = darts.length - 1; i >= 0; i--) {
        let d = darts[i];
        d.update();
        d.draw();

        if (!d.active) {
            darts.splice(i, 1);
            continue;
        }

        // Collision Check
        for (let j = balloons.length - 1; j >= 0; j--) {
            let b = balloons[j];
            const dist = Math.hypot(d.x - b.x, d.y - b.y);
            
            if (dist < b.radius + 5) { // Collision hit!
                d.active = false;
                
                if (b.isGoldenStar) {
                    // STAR POWER! Pop this and up to 3 correct balloons!
                    createExplosion(b.x, b.y, '#fbbf24');
                    showFloatingText(b.x, b.y, "STAR POWER!", true);
                    balloons.splice(j, 1);
                    score += 3;
                    
                    // Find all correct balloons
                    let targets = [];
                    for (let k = balloons.length - 1; k >= 0; k--) {
                        let tb = balloons[k];
                        if ((currentTarget === 'even' && tb.isEven) || (currentTarget === 'odd' && !tb.isEven)) {
                            targets.push({index: k, balloon: tb});
                        }
                    }
                    
                    // Shuffle and pick up to 3
                    targets.sort(() => Math.random() - 0.5);
                    let indicesToRemove = [];
                    for (let k = 0; k < Math.min(3, targets.length); k++) {
                        let tb = targets[k].balloon;
                        createExplosion(tb.x, tb.y, tb.color);
                        showFloatingText(tb.x, tb.y, "+1", true);
                        score += 1;
                        indicesToRemove.push(targets[k].index);
                    }
                    
                    // Safely remove the extra popped balloons
                    indicesToRemove.sort((a,b) => b - a);
                    indicesToRemove.forEach(idx => balloons.splice(idx, 1));

                    updateUI();
                    checkWaveComplete();
                    break;
                }
                
                // Check Math Logic
                const isCorrect = (currentTarget === 'even' && b.isEven) || (currentTarget === 'odd' && !b.isEven);
                
                if (isCorrect) {
                    if (b.isArmored) {
                        // Break armor instead of popping
                        b.isArmored = false;
                        showFloatingText(b.x, b.y, "CLINK!", true);
                        createExplosion(b.x, b.y - b.radius, '#94a3b8'); // Gray particles for armor
                        b.y -= 15; // knock back
                    } else {
                        // Good job! pop it
                        createExplosion(b.x, b.y, b.color);
                        score += 1;
                        showFloatingText(b.x, b.y, "+1", true);
                        balloons.splice(j, 1);
                        updateUI();
                        checkWaveComplete();
                    }
                } else {
                    // Wrong!
                    showFloatingText(b.x, b.y, "Oops!", false);
                    if (score > 0) score -= 1; // gentle penalty
                    
                    // Add a tiny bounce effect to the balloon to show it was hit but wrong
                    b.y -= 10;
                    
                    // Spawn penalty balloons if past level 10
                    if (level > 10) {
                        showFloatingText(cw/2, ch/2, "PENALTY!", false);
                        spawnPenaltyBalloons(2);
                    }
                    updateUI();
                }
                break; // Dart destroyed, stop checking other balloons
            }
        }
    }

    // Update & Draw Particles
    for (let i = particles.length - 1; i >= 0; i--) {
        let p = particles[i];
        p.update();
        p.draw();
        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }

    // Draw Cannon on top of everything
    drawCannon();

    animationId = requestAnimationFrame(gameLoop);
}

/**
 * Event Listeners
 */
// Mouse tracking
window.addEventListener('mousemove', (e) => {
    pointer.x = e.clientX;
    pointer.y = e.clientY;
});

// Click to shoot
window.addEventListener('mousedown', (e) => {
    // Only shoot if clicking on the canvas, not UI
    if (e.target === canvas) {
        pointer.x = e.clientX;
        pointer.y = e.clientY;
        fireDart();
    }
});

// Touch support
window.addEventListener('touchstart', (e) => {
    if (e.target === canvas) {
        pointer.x = e.touches[0].clientX;
        pointer.y = e.touches[0].clientY;
        fireDart();
    }
});

window.addEventListener('touchmove', (e) => {
    if (e.target === canvas) {
        pointer.x = e.touches[0].clientX;
        pointer.y = e.touches[0].clientY;
    }
});

// Start Game
document.getElementById('start-btn').addEventListener('click', () => {
    document.getElementById('start-screen').style.display = 'none';
    score = 0;
    level = 1;
    generateMap();
    showMapScreen(true);
});

// Map - Next Level Button
document.getElementById('next-level-btn').addEventListener('click', () => {
    if (level > MAX_LEVELS) {
        level = 1;
        score = 0;
        generateMap();
    }
    document.getElementById('map-screen').style.display = 'none';
    isPlaying = true;
    spawnWave();
    gameLoop();
});

// Restart Level Button
document.getElementById('restart-btn').addEventListener('click', () => {
    if (!isPlaying) return;
    spawnWave(); // Respawns balloons for the current level
    score = Math.max(0, score - 5); // Slight penalty for restarting
    updateUI();
});

</script>
</body>
</html>
